// --- Syntax highlighter ---
function detectLang(hint, code) {
  if (hint) {
    const h = hint.toLowerCase()
    if (['js','javascript','jsx','ts','typescript','tsx','mjs','cjs'].includes(h)) return 'js'
    if (['json','jsonl'].includes(h)) return 'json'
    if (['bash','sh','shell','zsh'].includes(h)) return 'bash'
    if (['css','scss','less'].includes(h)) return 'css'
    if (['html','htm','xml','svg'].includes(h)) return 'html'
    if (['py','python'].includes(h)) return 'py'
    if (['r'].includes(h)) return 'r'
    return h
  }
  // Auto-detect from content
  if (/^\s*\{[\s\S]*\}\s*$/.test(code) || /^\s*\[[\s\S]*\]\s*$/.test(code)) return 'json'
  if (/(?:function\s|const\s|let\s|var\s|=>\s*\{|import\s|export\s|require\()/.test(code)) return 'js'
  if (/(?:\$\(|apt |npm |pip |curl |wget |chmod |mkdir |cd |echo |grep )/.test(code)) return 'bash'
  if (/(?:def\s|import\s.*:$|print\(|class\s.*:$)/.test(code)) return 'py'
  return ''
}

window._highlightSyntax = highlightSyntax
function highlightSyntax(code, lang) {
  // Token-based highlighter: collect all tokens with positions in one pass, then build output.
  // This avoids the bug where chained regexes match inside previously-inserted HTML attributes.
  const tokens = [] // { start, end, cls }

  function scan(re, cls, groupIdx) {
    // groupIdx: which capture group to highlight (default 0 = full match)
    const gi = groupIdx || 0
    re.lastIndex = 0
    let m
    while ((m = re.exec(code)) !== null) {
      const text = gi ? (m[gi] || m[0]) : m[0]
      // Find the actual position of the group within the full match
      const offset = gi ? m[0].indexOf(m[gi]) : 0
      const start = m.index + (offset >= 0 ? offset : 0)
      tokens.push({ start, end: start + text.length, cls })
    }
  }

  if (lang === 'json') {
    scan(/("(?:[^"\\]|\\.)*")\s*:/g, 'sh-key', 1)
    scan(/:\s*("(?:[^"\\]|\\.)*")/g, 'sh-string', 1)
    scan(/\b(true|false|null)\b/g, 'sh-bool')
    scan(/\b(\d+\.?\d*)\b/g, 'sh-number')
  } else if (lang === 'bash') {
    scan(/(#.*)$/gm, 'sh-comment')
    scan(/("(?:[^"\\]|\\.)*"|'[^']*')/g, 'sh-string')
    scan(/\b(if|then|else|elif|fi|for|do|done|while|case|esac|in|function|return|exit|local|export|source|eval)\b/g, 'sh-keyword')
    scan(/\b(echo|cd|ls|rm|cp|mv|mkdir|cat|grep|sed|awk|find|curl|wget|chmod|chown|git|npm|yarn|pip|python|node|make|tar|gzip|ssh|scp)\b/g, 'sh-builtin')
    scan(/(\$\w+|\$\{[^}]+\})/g, 'sh-property')
  } else if (lang === 'css') {
    scan(/(\/\*[\s\S]*?\*\/)/g, 'sh-comment')
    scan(/([.#][\w-]+)(?=\s*[{,])/g, 'sh-tag')
    scan(/([\w-]+)(?=\s*:)/g, 'sh-property')
  } else if (lang === 'html') {
    scan(/(<!--[\s\S]*?-->)/g, 'sh-comment')
    scan(/(&lt;\/?)([\w-]+)/g, 'sh-tag', 2)  // tag names after <
    scan(/([\w-]+)(?==)/g, 'sh-attr')
    scan(/=("(?:[^"\\]|\\.)*"|'[^']*')/g, 'sh-string', 1)
  } else {
    // JS/Python/R and fallback
    scan(/(\/\/.*$)/gm, 'sh-comment')
    scan(/(\/\*[\s\S]*?\*\/)/g, 'sh-comment')
    if (lang === 'py' || lang === 'r') scan(/(#.*$)/gm, 'sh-comment')
    scan(/(`(?:[^`\\]|\\.)*`)/g, 'sh-string')
    scan(/("(?:[^"\\]|\\.)*")/g, 'sh-string')
    scan(/('(?:[^'\\]|\\.)*')/g, 'sh-string')
    scan(/\b(const|let|var|function|class|return|if|else|for|while|do|switch|case|break|continue|new|this|typeof|instanceof|import|export|from|default|async|await|try|catch|finally|throw|yield|of|in|delete|void|extends|super|static|get|set|def|lambda|with|as|elif|pass|raise|except|print)\b/g, 'sh-keyword')
    scan(/\b(true|false|null|undefined|NaN|Infinity|None|True|False|self)\b/g, 'sh-bool')
    scan(/\b(\d+\.?\d*(?:e[+-]?\d+)?)\b/gi, 'sh-number')
    scan(/\b([\w$]+)(?=\s*\()/g, 'sh-function')
    scan(/(=&gt;|=>)/g, 'sh-operator')
  }

  if (tokens.length === 0) return code

  // Sort by start position, longer matches first for ties
  tokens.sort((a, b) => a.start - b.start || (b.end - b.start) - (a.end - a.start))

  // Remove overlapping tokens — first match wins (priority by scan order for same position)
  const kept = []
  let maxEnd = 0
  for (const t of tokens) {
    if (t.start >= maxEnd) {
      kept.push(t)
      maxEnd = t.end
    }
  }

  // Build output
  let result = ''
  let pos = 0
  for (const t of kept) {
    if (t.start > pos) result += code.slice(pos, t.start)
    result += '<span class="' + t.cls + '">' + code.slice(t.start, t.end) + '</span>'
    pos = t.end
  }
  if (pos < code.length) result += code.slice(pos)
  return result
}

function langFromFilePath(path) {
  if (!path) return ''
  const ext = path.split('.').pop().toLowerCase()
  return detectLang(ext, '')
}

// --- Minimal markdown renderer ---
function renderMarkdown(html) {
  // Images: ![alt](url)
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, url) =>
    `<img src="${url}" alt="${alt}" style="max-width:80%;max-height:300px;border-radius:4px;margin:8px auto;display:block;cursor:pointer" onclick="window.open('${url}','_blank')">`)
  // Code blocks with syntax highlighting + folding (lazy highlight for folded blocks)
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, langHint, code) => {
    code = code.replace(/^\n|\n$/g, '')
    const lang = detectLang(langHint, code)
    const lineCount = code.split('\n').length
    const shouldFold = lineCount > 10
    // Skip expensive syntax highlighting for folded blocks — defer to unfold
    const highlighted = (!shouldFold && lang) ? highlightSyntax(code, lang) : code
    const langLabel = lang || langHint || ''

    let header = ''
    if (langLabel || shouldFold) {
      header = `<div class="code-block-header" onclick="(function(e){var w=e.closest('.code-block-wrap'),p=w.querySelector('pre'),c=p.querySelector('code'),t=w.querySelector('.code-block-toggle');if(p.classList.contains('code-collapsed')){p.classList.remove('code-collapsed');t.textContent='collapse';if(c.dataset.lang&&!c.dataset.highlighted){c.innerHTML=window._highlightSyntax(c.textContent,c.dataset.lang);c.dataset.highlighted='1'}}else{p.classList.add('code-collapsed');t.textContent='${lineCount} lines — show all'}})(this)">`
        + (langLabel ? `<span class="code-block-lang">${esc(langLabel)}</span>` : '')
        + (shouldFold ? `<span class="code-block-toggle">${lineCount} lines — show all</span>` : '')
        + `</div>`
    }

    const dataAttrs = shouldFold && lang ? ` data-lang="${esc(lang)}"` : ''
    return `<div class="code-block-wrap">${header}<pre${shouldFold ? ' class="code-collapsed"' : ''}><code${dataAttrs}>${highlighted}</code></pre></div>`
  })
  // Display math: $$...$$ (before inline to avoid conflicts)
  html = html.replace(/\$\$([\s\S]*?)\$\$/g, (_, tex) => {
    try {
      if (typeof katex !== 'undefined') return katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false })
    } catch {}
    return `<div class="math-display">${esc(tex)}</div>`
  })
  // Inline math: $...$  (not greedy, not matching $5 prices)
  html = html.replace(/(?<![\\$\w])\$([^$\n]+?)\$(?![\\$\w\d])/g, (_, tex) => {
    try {
      if (typeof katex !== 'undefined') return katex.renderToString(tex.trim(), { displayMode: false, throwOnError: false })
    } catch {}
    return `<span class="math-inline">${esc(tex)}</span>`
  })
  // Inline code (handles ``double`` and `single` backtick styles)
  html = html.replace(/``([^`]+)``/g, '<code>$1</code>')
  html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>')
  // Headers (## and ###, not # which is too aggressive)
  html = html.replace(/^###\s+(.+)$/gm, '<div style="font-weight:500;font-size:12px;color:var(--text);margin:6px 0 2px">$1</div>')
  html = html.replace(/^##\s+(.+)$/gm, '<div style="font-weight:500;font-size:13px;color:var(--text);margin:8px 0 3px">$1</div>')
  // Blockquotes
  html = html.replace(/^&gt;\s?(.+)$/gm, '<div style="border-left:2px solid var(--accent);padding-left:8px;color:var(--text-dim);margin:2px 0">$1</div>')
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
  // Italic
  html = html.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>')
  // Lists with nested folding: top-level items visible, sub-items in collapsible blocks
  html = html.replace(/((?:^[ ]*(?:\d+\.|[-*])\s+.+$\n?)+)/gm, (block) => {
    const lines = block.split('\n').filter(l => l.trim())
    // Group into top-level items with their nested children
    const groups = [] // [{marker, text, children: [html]}]
    for (const line of lines) {
      const indent = line.match(/^(\s*)/)[1].length
      const m = line.trim().match(/^(\d+\.)\s+(.+)$/) || line.trim().match(/^([-*])\s+(.+)$/)
      if (!m) continue
      if (indent >= 2 && groups.length > 0) {
        groups[groups.length - 1].children.push(
          `<div style="display:flex;gap:4px;margin:1px 0;padding-left:${indent * 4}px"><span style="color:var(--text-dim);font-size:11px;flex-shrink:0">${m[1]}</span><span>${m[2]}</span></div>`
        )
      } else {
        groups.push({ marker: m[1], text: m[2], children: [] })
      }
    }
    return groups.map(g => {
      const countHint = g.children.length > 0
        ? `<span class="nested-toggle" style="color:var(--text-dim);font-size:10px;opacity:0.6;margin-left:4px">(${g.children.length})</span>`
        : ''
      const nested = g.children.length > 0
        ? `<div class="nested-folded">${g.children.join('')}</div>`
        : ''
      return `<div style="display:flex;gap:4px;margin:1px 0"><span style="color:var(--text-dim);font-size:11px;flex-shrink:0">${g.marker}</span><span>${g.text}${countHint}</span></div>${nested}`
    }).join('')
  })
  // Explicit file sharing: [file:/path/to/doc.md] → expandable card
  html = html.replace(/\[file:(\/[\w/._-]+\.md)\]/g, (_, filePath) => {
    const name = filePath.split('/').pop()
    return `<span class="md-file-card" data-path="${filePath}"><span class="md-file-chip">${name}</span><span class="md-file-body"></span></span>`
  })
  // File paths: shorten absolute paths, make .md files into expandable cards
  html = html.replace(/((?:<[^>]*>)|(?:[^<]+))/g, (segment) => {
    if (segment.startsWith('<')) return segment
    return segment.replace(/\/Users\/\w+\/([\w/._-]+)/g, (fullPath, rel) => {
      if (fullPath.endsWith('.md')) {
        const name = rel.split('/').pop()
        return `<span class="md-file-card" data-path="${fullPath}"><span class="md-file-chip">${name}</span><span class="md-file-body"></span></span>`
      }
      return `<span class="file-path" title="${fullPath}">~/${rel}</span>`
    })
  })
  // tlda doc cards: URLs pointing to the tlda viewer render as inline iframe previews
  // Track code depth to skip URL processing inside <code>/<pre> elements
  let _inCode = 0
  html = html.replace(/((?:<[^>]*>)|(?:[^<]+))/g, (segment) => {
    if (segment.startsWith('<')) {
      if (/^<(code|pre)\b/i.test(segment)) _inCode++
      else if (/^<\/(code|pre)>/i.test(segment)) _inCode = Math.max(0, _inCode - 1)
      return segment
    }
    if (_inCode) return segment
    return segment.replace(/\bhttps?:\/\/localhost:51(?:73|74|75|76)\/?[^\s<>"')\]]*\?doc=[^\s<>"')\]]+/g, url => {
      try {
        const u = new URL(url)
        const docName = u.searchParams.get('doc') || 'doc'
        // Inject auth token if not already in URL
        if (_tldaToken && !u.searchParams.has('token')) u.searchParams.set('token', _tldaToken)
        const iframeSrc = u.toString()
        const cardId = 'tlda-' + btoa(url).slice(0, 16)
        return `<div class="tlda-card" data-tlda-src="${esc(iframeSrc)}" data-tlda-id="${cardId}" style="margin:8px auto;border:1px solid var(--border);border-radius:6px;overflow:hidden;width:80%">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:3px 8px;background:rgba(147,112,219,0.08);border-bottom:1px solid var(--border)">
            <span style="font-size:10px;color:var(--accent);font-weight:500">${esc(docName)}</span>
            <a href="${iframeSrc}" target="_blank" style="font-size:9px;color:var(--text-dim);text-decoration:none;border:none">open ↗</a>
          </div>
          <div class="tlda-iframe-slot" style="width:100%;height:250px"></div>
        </div>`
      } catch { return url }
    })
  })
  // URLs: linkify bare http(s) URLs (skip already-linked ones inside tags and code blocks)
  _inCode = 0
  html = html.replace(/((?:<[^>]*>)|(?:[^<]+))/g, (segment) => {
    if (segment.startsWith('<')) {
      if (/^<(code|pre)\b/i.test(segment)) _inCode++
      else if (/^<\/(code|pre)>/i.test(segment)) _inCode = Math.max(0, _inCode - 1)
      return segment
    }
    if (_inCode) return segment
    return segment.replace(/\bhttps?:\/\/[^\s<>"')\]]+/g, url => {
      // Smart URL display: show domain + path tail
      try {
        const u = new URL(url)
        const display = u.hostname + (u.pathname.length > 30 ? '/...' + u.pathname.slice(-20) : u.pathname)
        return `<a href="${url}" target="_blank" title="${url}">${display}</a>`
      } catch {
        return `<a href="${url}" target="_blank">${url}</a>`
      }
    })
  })
  // Inline tlda previews: [tlda] snippet (from source)
  html = html.replace(/\[tlda\]\s*(.*?)\s*\(from ([^)]+)\)/g, (_, snippet, source) => {
    const m = source.match(/^tlda:([^/]+)\/?(.*)/);
    const project = m ? m[1] : '';
    const shapeId = m ? m[2] : '';
    const openUrl = project
      ? `http://localhost:5176/?doc=${encodeURIComponent(project)}${shapeId ? '&focus=' + encodeURIComponent(shapeId) : ''}`
      : '';
    return `<div class="tlda-embed">
      <div class="tlda-embed-source">${esc(source)}</div>
      <div class="tlda-embed-body">
        <div class="tlda-embed-text">${esc(snippet)}</div>
        ${openUrl ? `<a href="${openUrl}" target="_blank" class="tlda-embed-link" title="Open in tlda">open &rarr;</a>` : ''}
      </div>
    </div>`;
  })
  // Inline shared doc previews: [doc:shareId] filename (N lines)
  html = html.replace(/\[doc:([^\]]+)\]\s*([^\n]+)/g, (_, shareId, meta) => {
    const docId = `doc-${shareId}`
    return `<div class="shared-doc" data-share-id="${esc(shareId)}" draggable="true">
      <div class="shared-doc-header">
        <span class="shared-doc-toggle">▶</span>
        <span class="shared-doc-name">${esc(meta.trim())}</span>
        <span class="drag-handle" title="Drag to tlda">⠿</span>
      </div>
      <div class="shared-doc-body" id="${esc(docId)}" style="display:none"></div>
    </div>`;
  })
  // File:line references — make them clickable
  html = html.replace(/(?<![/"'])(\b[\w.-]+\.(md|txt|mjs|js|ts|py|r|tex)):(\d+)\b/gi, (m, file, ext, line) => {
    return `<span class="file-line-ref" data-file="${esc(file)}" data-line="${line}" title="${esc(file)}:${line}">${esc(file)}:${line}</span>`
  })
  return html
}

// --- Widget definitions ---

function createChatWidget(container, params) {
  container._widgetParams = params
  container.innerHTML = `
    <div class="chat-widget" style="position:relative">
      <div class="chat-filter-bar" style="display:none !important"></div>
      <button class="scroll-toggle" title="Auto-scroll">⏸</button>
      <div class="chat-log"></div>
      <div class="chat-drop-overlay">
        <div class="drop-zone" data-action="broadcast-filter"><div class="drop-preview"></div></div>
        <div class="drop-zone" data-action="target-filter"><div class="drop-preview"></div></div>
        <div class="drop-zone" data-action="target-only"><div class="drop-preview"></div></div>
        <div class="drop-zone" data-action="filter-only"><div class="drop-preview"></div></div>
      </div>
      <div class="chat-attachments"></div>
      <div class="chat-input-bar">
        <div class="chat-input-wrap">
          <div class="chat-ghost"></div>
          <span class="chat-target-ghost"></span>
          <div class="pill-menu" style="display:none">
            <div class="pill-menu-item queue-item" data-mode="queue"><span class="pill-dot"></span>Queue</div>
            <div class="pill-menu-item interrupt-item" data-mode="interrupt"><span class="pill-dot"></span>Interrupt</div>
          </div>
          <textarea rows="1" placeholder="" class="chat-input" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
        </div>
        <span class="chat-input-status"></span>
      </div>
    </div>`
  const log = container.querySelector('.chat-log')
  const input = container.querySelector('.chat-input')
  const filterBar = container.querySelector('.chat-filter-bar')
  const indicator = container.querySelector('.filter-indicator')
  const picker = container.querySelector('.label-picker')
  const targetGhost = container.querySelector('.chat-target-ghost')

  // Per-widget state
  container._chatTarget = null
  container._labelFilter = null // DNF: [[label, ...], ...] or null
  container._chatAttachments = []
  container._chatAttachments = []
  requestAnimationFrame(() => {
    const saved = container._panelId ? loadPanelState(container._panelId, 'chatTarget') : null
    const savedLabels = container._panelId ? loadPanelState(container._panelId, 'labelFilter') : null
    container._chatTarget = saved || params.agent || (params.labelFilter ? null : selectedAgent) || null
    // Migrate flat array to DNF if needed
    if (savedLabels && savedLabels.length > 0 && !Array.isArray(savedLabels[0])) {
      container._labelFilter = savedLabels.map(l => [l])
    } else {
      container._labelFilter = savedLabels || params.labelFilter || params.labels || null
    }
    if (!container._streamSource && currentState) updateChatWidget(container, params, currentState)
  })
  container._autoScroll = true

  // ResizeObserver on the chat log — fires AFTER layout settles, so scrollTop is reliable.
  // This is the belt-and-suspenders for scroll anchoring: whenever the log's size changes
  // (content update, tab switch, panel resize), pin to bottom if autoScroll is on.
  const resizeObs = new ResizeObserver(() => {
    if (container._autoScroll !== false && log.scrollHeight > log.clientHeight) {
      log.scrollTop = log.scrollHeight
    }
  })
  resizeObs.observe(log)

  // Activity polling: refresh session data for chat activity cards every 3s (skip for playback)
  if (!params.playback && !container._streamSource) {
    const activityInterval = setInterval(() => {
      if (currentState) updateChatWidget(container, container._widgetParams || params, currentState)
    }, 3000)
    container._activityInterval = activityInterval
  }

  // Play/pause auto-scroll toggle
  const scrollToggle = container.querySelector('.scroll-toggle')
  scrollToggle.addEventListener('click', () => {
    container._autoScroll = !container._autoScroll
    scrollToggle.textContent = container._autoScroll ? '⏸' : '▶'
    scrollToggle.classList.toggle('paused', !container._autoScroll)
    if (container._autoScroll) log.scrollTop = log.scrollHeight
  })

  // Diff gutter — hover to show diffs, click to pin (skip for playback panels)
  if (container._isPlaybackWidget) {
    container._diffGutter = null
  } else {
  const gutter = document.createElement('div')
  gutter.className = 'diff-gutter'
  gutter.innerHTML = '<div class="diff-gutter-icon">◆</div>'
  container.appendChild(gutter)
  container._diffGutter = gutter
  let gutterPinned = false
  gutter.addEventListener('mouseenter', () => {
    if (!gutterPinned) log.classList.add('diffs-visible')
  })
  gutter.addEventListener('mouseleave', () => {
    if (!gutterPinned) log.classList.remove('diffs-visible')
  })
  gutter.addEventListener('click', (e) => {
    e.stopPropagation()
    gutterPinned = !gutterPinned
    gutter.classList.toggle('pinned', gutterPinned)
    if (gutterPinned) {
      log.classList.add('diffs-visible')
    } else {
      log.classList.remove('diffs-visible')
    }
  })
  } // end diff gutter else

  // Preserve unsent text + cursor position across HMR/reloads
  requestAnimationFrame(() => {
    const key = container._panelId ? `fleet-draft-${container._panelId}` : null
    const curKey = key ? key + '-cursor' : null
    if (key) {
      const draft = sessionStorage.getItem(key)
      if (draft) {
        input.value = draft
        const cur = parseInt(sessionStorage.getItem(curKey), 10)
        if (!isNaN(cur)) input.setSelectionRange(cur, cur)
        input.focus()
      }
    }
    input.addEventListener('input', () => {
      if (key) sessionStorage.setItem(key, input.value)
    })
    input.addEventListener('keyup', () => {
      if (curKey) sessionStorage.setItem(curKey, input.selectionStart)
    })
    input.addEventListener('click', () => {
      if (curKey) sessionStorage.setItem(curKey, input.selectionStart)
    })
  })

  // Toggle filter bar expansion
  if (indicator) {
    indicator.addEventListener('click', (e) => {
      e.stopPropagation()
      filterBar.classList.toggle('expanded')
      if (picker) picker.classList.remove('open')
    })
  }

  // Toggle label picker via dot click
  const filterDot = container.querySelector('.filter-dot')
  if (filterDot) {
    filterDot.addEventListener('click', (e) => {
      e.stopPropagation()
      if (picker) picker.classList.toggle('open')
      if (picker?.classList.contains('open')) {
        filterBar.classList.add('expanded')
        renderLabelPicker(container, params)
      }
    })
  }

  // Close picker on outside click
  document.addEventListener('click', (e) => {
    if (filterBar && picker && !filterBar.contains(e.target)) picker.classList.remove('open')
  })

  // Track focus
  container.addEventListener('focusin', () => { lastFocusedChat = container })
  container.addEventListener('click', () => { lastFocusedChat = container })

  // Track user scroll intent via wheel/touch — not the scroll event (which fires on
  // programmatic scrolls too and races with rAF suppress logic). Only user-initiated
  // scrolling should disable autoScroll.
  let _userScrolled = false
  log.addEventListener('wheel', () => { _userScrolled = true }, { passive: true })
  log.addEventListener('touchmove', () => { _userScrolled = true }, { passive: true })
  log.addEventListener('scroll', () => {
    if (!_userScrolled) return
    _userScrolled = false
    const atBottom = log.scrollHeight - log.scrollTop - log.clientHeight < 30
    container._autoScroll = atBottom
    scrollToggle.textContent = atBottom ? '⏸' : '▶'
    scrollToggle.classList.toggle('paused', !atBottom)

    // Infinite scroll handled by IntersectionObserver below
  })

  // Attachment helpers
  function addChatAttachment(item) {
    if (container._chatAttachments.some(a => a.source === item.source)) return
    container._chatAttachments.push(item)
    renderChatAttachments()
  }
  function removeChatAttachment(idx) {
    container._chatAttachments.splice(idx, 1)
    renderChatAttachments()
  }
  function renderChatAttachments() {
    const bar = container.querySelector('.chat-attachments')
    if (!container._chatAttachments.length) {
      bar.className = 'chat-attachments'
      bar.innerHTML = ''
      return
    }
    bar.className = 'chat-attachments active'
    bar.innerHTML = container._chatAttachments.map((a, i) => {
      const typeClass = 'chip-type-' + (a.type || 'session')
      const label = (a.snippet || '').substring(0, 60) || a.source || 'attachment'
      return `<span class="chat-attach-chip">
        <span class="chip-type ${typeClass}">${esc(a.type || '?')}</span>
        <span class="chip-label" title="${esc(a.snippet || '')}">${esc(label)}</span>
        <span class="chip-del" data-attach-idx="${i}">&times;</span>
      </span>`
    }).join('')
    bar.querySelectorAll('.chip-del').forEach(del => {
      del.addEventListener('click', () => removeChatAttachment(parseInt(del.dataset.attachIdx, 10)))
    })
  }
  // Expose for drag-drop from docs widget
  container._addChatAttachment = addChatAttachment

  // Terminal card state
  container._terminalMode = false
  container._terminalInterval = null
  container._terminalCard = null
  container._ghostCompletion = '' // full completion text from terminal
  const inputStatus = container.querySelector('.chat-input-status')
  const ghostEl = container.querySelector('.chat-ghost')

  function setGhost(typed, completion) {
    if (!completion) {
      ghostEl.innerHTML = ''
      input.classList.remove('has-ghost')
      container._ghostCompletion = ''
      return
    }
    container._ghostCompletion = completion
    ghostEl.innerHTML = `<span class="ghost-typed">${esc(typed)}</span><span class="ghost-completion">${esc(completion)}</span>`
    input.classList.add('has-ghost')
  }

  function clearGhost() { setGhost('', '') }

  async function flushQueue(ctr, chatLog, chatInput, chatParams) {
    const buf = ctr._queueBuffer || []
    const targets = ctr._modeTargets ? [...ctr._modeTargets] : []
    ctr._queueMode = false
    ctr._modeTargets = null
    ctr._queueBuffer = []
    ctr.querySelector('.chat-input-bar').classList.remove('queue-mode')
    updatePillMode()
    // Unfade queued messages in the chat log
    for (const el of chatLog.querySelectorAll('.chat-queued')) {
      el.style.opacity = '1'
      el.classList.remove('chat-queued')
    }
    if (buf.length === 0) return
    // Send all queued messages
    if (targets.length === 0 && ctr._chatTarget) targets.push(ctr._chatTarget)
    if (targets.length === 0 && ctr._labelFilter?.length && currentState) {
      (currentState.agents || []).filter(a => agentMatchesDnf(ctr._labelFilter, a)).forEach(a => targets.push(a.id))
    }
    if (targets.length === 0) return
    for (const item of buf) {
      for (const t of targets) {
        const payload = { message: item.msg, to: t }
        if (item.isRaw) payload._raw = true
        if (item.attachments?.length) payload.attachments = item.attachments
        try {
          await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
        } catch (e) { console.error('Queue flush failed:', e) }
      }
    }
    if (currentState) try { updateChatWidget(ctr, ctr._widgetParams, currentState) } catch {}
    if (ctr._autoScroll !== false) chatLog.scrollTop = chatLog.scrollHeight
  }

  function openTerminalCard() {
    const target = container._chatTarget
    if (!target) {
      log.innerHTML += `<div class="chat-line" style="color:var(--orange)">Select an agent first</div>`
      return
    }
    // Close existing terminal card if any
    closeTerminalCard()
    const agentName = currentState ? agentLabel(currentState, target) : target.substring(0, 8)
    const card = document.createElement('div')
    card.className = 'chat-terminal-card'
    card.innerHTML = `<div class="term-card-header"><span class="term-card-agent">${esc(agentName)}</span><span style="opacity:0.4">terminal</span><span class="term-card-close" title="Close terminal">\u2715</span></div><div class="term-card-output">Loading...</div>`
    log.appendChild(card)
    container._terminalCard = card
    container._terminalMode = true
    inputStatus.textContent = 'terminal'
    input.placeholder = `$ ${agentName}`
    if (container._autoScroll !== false) log.scrollTop = log.scrollHeight
    // Close button
    card.querySelector('.term-card-close').addEventListener('click', closeTerminalCard)
    // Start polling
    fetchTerminalCard(target, card).then(() => {
      if (container._autoScroll !== false) log.scrollTop = log.scrollHeight
    })
    container._terminalInterval = setInterval(() => fetchTerminalCard(target, card), 1000)
  }

  async function fetchTerminalCard(agentId, card) {
    const output = card.querySelector('.term-card-output')
    if (!output) return
    try {
      const res = await fetch(`/api/peek?agent=${encodeURIComponent(agentId)}`)
      if (res.ok) {
        const data = await res.json()
        const text = data.text || '(empty)'
        const hash = text.length + ':' + text.slice(0, 100) + text.slice(-100)
        if (output._hash === hash) return
        const firstLoad = !output._hash
        output._hash = hash
        const wasAtBottom = firstLoad || output.scrollHeight - output.scrollTop - output.clientHeight < 30
        output.textContent = text
        if (wasAtBottom) setTimeout(() => { output.scrollTop = output.scrollHeight }, 0)
      }
    } catch {}
  }

  function closeTerminalCard() {
    if (container._terminalInterval) { clearInterval(container._terminalInterval); container._terminalInterval = null }
    if (container._terminalCard) { container._terminalCard.remove(); container._terminalCard = null }
    container._terminalMode = false
    inputStatus.textContent = ''
  }

  function updatePillMode() {
    if (!targetGhost) return
    let prefix = ''
    if (container._queueMode) prefix = '<span style="color:var(--cyan)">queue</span> '
    else if (container._interruptMode) prefix = '<span style="color:var(--orange)">interrupt</span> '
    targetGhost.classList.toggle('has-mode', !!(container._queueMode || container._interruptMode))
    const target = container._chatTarget
    const dnf = container._labelFilter?.length > 0 ? container._labelFilter : null
    if (target && currentState) {
      const label = agentLabel(currentState, target)
      const cls = getNickClass(target, currentState)
      targetGhost.innerHTML = `${prefix}<span class="${cls}">→ ${esc(label)}</span>`
      targetGhost.classList.remove('hidden')
    } else if (dnf && currentState) {
      const matching = (currentState.agents || []).filter(a => agentMatchesDnf(dnf, a))
      const expr = dnf.map(g => g.join(' & ')).join(' | ')
      const countSuffix = matching.length > 1 ? ` (${matching.length})` : ''
      targetGhost.innerHTML = `${prefix}<span style="color:var(--blue)">→ ${esc(expr)}${countSuffix}</span>`
      targetGhost.classList.remove('hidden')
    } else if (prefix) {
      targetGhost.innerHTML = prefix
      targetGhost.classList.remove('hidden')
    }
  }

  async function send() {
    let msg = input.value.trim()
    if (!msg && !container._chatAttachments.length) return
    input.value = ''
    input.style.height = 'auto'
    if (container._panelId) sessionStorage.removeItem(`fleet-draft-${container._panelId}`)
    // /raw: send without markdown rendering
    let isRaw = false
    if (msg.startsWith('/raw ')) { msg = msg.slice(5); isRaw = true }
    // Handle /terminal commands
    if (msg === '/terminal' || msg === '/terminal on') { openTerminalCard(); return }
    if (msg === '/terminal off' || msg === '/terminal close') { closeTerminalCard(); return }
    // /queue — toggle queue mode. Messages held until each target goes idle.
    if (msg === '/queue' || msg.startsWith('/queue ')) {
      if (container._queueMode) {
        // Toggle off — don't flush, just exit mode
        container._queueMode = false
        container._modeTargets = null
        container.querySelector('.chat-input-bar').classList.remove('queue-mode')
        updatePillMode()
        return
      }
      const rest = msg.slice(6).trim()
      let targets = []
      if (rest && currentState) {
        for (const name of rest.split(/\s+/)) {
          const match = (currentState.agents || []).find(a =>
            a.friendly_name === name || a.name === name || a.id === name ||
            (a.friendly_name?.toLowerCase() === name.toLowerCase()) ||
            (a.name?.toLowerCase() === name.toLowerCase())
          )
          if (match) targets.push(match.id)
        }
      }
      if (targets.length === 0 && container._chatTarget) targets.push(container._chatTarget)
      if (targets.length === 0 && container._labelFilter?.length && currentState) {
        targets = (currentState.agents || []).filter(a => agentMatchesDnf(container._labelFilter, a)).map(a => a.id)
      }
      if (targets.length === 0) {
        log.innerHTML += `<div class="chat-line" style="color:var(--orange)">No targets for queue mode</div>`
        if (container._autoScroll !== false) log.scrollTop = log.scrollHeight
        return
      }
      container._queueMode = true
      container._modeTargets = new Set(targets)
      container._queueBuffer = []
      container._queueAgentWasWorking = {}
      for (const t of targets) {
        const agent = (currentState?.agents || []).find(a => a.id === t)
        const ago = agent?.last_seen ? Math.floor((Date.now() - new Date(agent.last_seen).getTime()) / 1000) : Infinity
        container._queueAgentWasWorking[t] = ago < 15
      }
      container.querySelector('.chat-input-bar').classList.add('queue-mode')
      updatePillMode()
      return
    }
    // /interrupt — toggle interrupt mode. Messages sent as interrupts (kitty ESC + chat).
    if (msg === '/interrupt' || msg.startsWith('/interrupt ')) {
      if (container._interruptMode) {
        // Toggle off
        container._interruptMode = false
        container._modeTargets = null
        container.querySelector('.chat-input-bar').classList.remove('interrupt-mode')
        updatePillMode()
        return
      }
      const rest = msg.slice('/interrupt'.length).trim()
      let targets = []
      if (rest && currentState) {
        for (const name of rest.split(/\s+/)) {
          const match = (currentState.agents || []).find(a =>
            a.friendly_name === name || a.name === name || a.id === name ||
            (a.friendly_name?.toLowerCase() === name.toLowerCase()) ||
            (a.name?.toLowerCase() === name.toLowerCase())
          )
          if (match) targets.push(match.id)
        }
      }
      if (targets.length === 0 && container._chatTarget) targets.push(container._chatTarget)
      if (targets.length === 0 && container._labelFilter?.length && currentState) {
        targets = (currentState.agents || []).filter(a => agentMatchesDnf(container._labelFilter, a)).map(a => a.id)
      }
      if (targets.length === 0) {
        log.innerHTML += `<div class="chat-line" style="color:var(--orange)">No targets for interrupt mode</div>`
        if (container._autoScroll !== false) log.scrollTop = log.scrollHeight
        return
      }
      container._interruptMode = true
      container._modeTargets = new Set(targets)
      container.querySelector('.chat-input-bar').classList.add('interrupt-mode')
      updatePillMode()
      return
    }
    if (msg.startsWith('/')) {
      const result = executeCommand(msg)
      if (result) {
        log.innerHTML += `<div class="chat-line" style="color:var(--text-dim)">${esc(result)}</div>`
      }
      return
    }
    const dnfFilter = container._labelFilter && container._labelFilter.length > 0 ? container._labelFilter : null
    const target = container._chatTarget
    // Broadcast: no single target + filter active → send to all matching agents
    if (!target && dnfFilter && currentState) {
      const matchingAgents = (currentState.agents || []).filter(a => agentMatchesDnf(dnfFilter, a))
      if (matchingAgents.length === 0) {
        log.innerHTML += `<div class="chat-line" style="color:var(--orange)">No agents match the current filter</div>`
        input.value = msg
        return
      }
      try {
        const attachments = container._chatAttachments.length ? container._chatAttachments.slice() : null
        const allIds = matchingAgents.map(a => a.id)
        const results = await Promise.all(matchingAgents.map(a => {
          const payload = { message: msg, to: a.id, cc: allIds }
          if (isRaw) payload._raw = true
          if (attachments) payload.attachments = attachments
          return fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          })
        }))
        const failed = results.filter(r => !r.ok)
        if (failed.length) {
          log.innerHTML += `<div class="chat-line" style="color:var(--orange)">Broadcast: ${failed.length}/${results.length} failed</div>`
        }
        trackUI('chat_send', { panelId: container._panelId, to: 'broadcast', textLength: msg.length, hasAttachments: !!attachments })
      } catch (e) { console.error('Broadcast send failed:', e) }
      container._chatAttachments = []
      renderChatAttachments()
      if (container._autoScroll !== false) log.scrollTop = log.scrollHeight
      return
    }
    if (!target) {
      log.innerHTML += `<div class="chat-line" style="color:var(--orange)">Select an agent first (click one in the Agents panel)</div>`
      input.value = msg
      return
    }
    container._autoScroll = true
    // Interrupt mode: send as interrupt (kitty ESC + chat) instead of regular chat
    if (container._interruptMode) {
      const targets = container._modeTargets ? [...container._modeTargets] : [target]
      for (const t of targets) {
        try {
          const body = { agent: t }
          if (msg) body.message = msg
          const res = await fetch('/api/interrupt', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
          const data = await res.json()
          if (data.error) {
            log.innerHTML += `<div class="chat-line" style="color:var(--orange)">Interrupt failed (${esc(t.substring(0,8))}): ${esc(data.error)}</div>`
          }
        } catch (err) {
          log.innerHTML += `<div class="chat-line" style="color:var(--orange)">Interrupt failed: ${esc(err.message)}</div>`
        }
      }
      // Auto-toggle off after sending interrupt
      container._interruptMode = false
      container._modeTargets = null
      container.querySelector('.chat-input-bar').classList.remove('interrupt-mode')
      updatePillMode()
      if (container._autoScroll !== false) log.scrollTop = log.scrollHeight
      return
    }
    // Queue mode: buffer messages locally instead of sending
    if (container._queueMode) {
      if (!container._queueBuffer) container._queueBuffer = []
      container._queueBuffer.push({ msg, isRaw, attachments: container._chatAttachments.slice() })
      // Show queued message faded — unfades on flush
      log.innerHTML += `<div class="chat-line from-user chat-queued" style="opacity:0.3">${renderMarkdown(esc(msg))}</div>`
      container._chatAttachments = []
      renderChatAttachments()
      if (container._autoScroll !== false) log.scrollTop = log.scrollHeight
      return
    }
    // Flush any queued messages first to maintain temporal order
    if (container._queueBuffer?.length) {
      await flushQueue(container, log, input, params)
    }
    {
      // Send as chat — optimistic display + retry on failure
      const payload = { message: msg, to: target }
      if (isRaw) payload._raw = true
      if (container._chatAttachments.length) {
        payload.attachments = container._chatAttachments.slice()
      }
      // Optimistic local render — add to state.messages, SSE deduplicates on arrival
      const localMsg = {
        from: 'web',
        to: target,
        text: msg,
        timestamp: new Date().toISOString(),
        _local: true,
      }
      if (payload.attachments) localMsg.attachments = payload.attachments
      if (!currentState.messages) currentState.messages = []
      currentState.messages.push(localMsg)
      // Re-render chat to show the message immediately (scroll to bottom only if already there)
      updateChatWidget(container, container._params || params, currentState)
      // Fire-and-forget send — mark failed after timeout if no SSE confirmation
      const failTimer = setTimeout(() => {
        if (localMsg._local) {
          localMsg._failed = true
          updateChatWidget(container, container._params || params, currentState)
        }
      }, 5000)
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        })
        if (!res.ok) {
          clearTimeout(failTimer)
          localMsg._failed = true
          updateChatWidget(container, container._params || params, currentState)
          window._failedMessages = window._failedMessages || []
          window._failedMessages.push(payload)
        } else {
          clearTimeout(failTimer)
          trackUI('chat_send', { panelId: container._panelId, to: target, textLength: msg.length, hasAttachments: !!(container._chatAttachments.length) })
          if (currentState) {
            const targetAgent = (currentState.agents || []).find(a => a.id === target)
            if (targetAgent?.compacting) {
              localMsg._voicemail = targetAgent.friendly_name || targetAgent.name || target.substring(0, 8)
              localMsg._voicemailReason = 'compacting'
            } else if (targetAgent && !isActive(targetAgent)) {
              localMsg._voicemail = targetAgent.friendly_name || targetAgent.name || target.substring(0, 8)
              localMsg._voicemailReason = 'unreachable'
            }
          }
        }
      } catch (e) {
        clearTimeout(failTimer)
        localMsg._failed = true
        updateChatWidget(container, container._params || params, currentState)
        window._failedMessages = window._failedMessages || []
        window._failedMessages.push(payload)
      }
    }
    container._chatAttachments = []
    renderChatAttachments()
    if (container._autoScroll !== false) log.scrollTop = log.scrollHeight
  }
  input.addEventListener('keydown', e => {
    e.stopPropagation() // prevent dockview tab bar from intercepting keystrokes
    if (!container._terminalMode) {
      const enterMode = localStorage.getItem('fleet-enter-mode') || (window._fleetSendKey === 'Cmd+Enter' ? 'cmd-enter' : 'enter')
      if (e.key === 'Enter') {
        if (enterMode === 'enter' && !e.shiftKey) {
          e.preventDefault(); send()
        } else if (enterMode === 'cmd-enter' && (e.metaKey || e.ctrlKey)) {
          e.preventDefault(); send()
        }
        // cmd-enter mode: plain Enter inserts newline (default textarea behavior)
      }
      return
    }
    // Terminal mode: buffered input
    const target = container._chatTarget
    if (!target) return
    const refresh = () => { if (container._terminalCard) setTimeout(() => fetchTerminalCard(target, container._terminalCard), 200) }
    // Enter: check for /terminal commands first, then send whole line to kitty
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      const msg = input.value.trim()
      if (msg.startsWith('/terminal')) {
        input.value = ''
        if (msg === '/terminal off' || msg === '/terminal close') closeTerminalCard()
        return
      }
      clearGhost()
      // Clear kitty's line first (ctrl+u) to correct any drift, then send fresh
      fetch('/api/send-key', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agent: target, key: 'ctrl+u' }) })
        .then(() => fetch('/api/send-text', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agent: target, text: msg, enter: true })
        })).then(refresh).catch(() => {})
      input.value = ''
      return
    }
    // Tab: ghost text word-at-a-time completion
    if (e.key === 'Tab') {
      e.preventDefault()
      if (container._ghostCompletion) {
        const ghost = container._ghostCompletion
        const wordEnd = ghost.search(/\s/)
        const nextWord = wordEnd === -1 ? ghost : ghost.substring(0, wordEnd + 1)
        input.value += nextWord
        const remaining = ghost.substring(nextWord.length)
        if (remaining) {
          setGhost(input.value, remaining)
        } else {
          clearGhost()
        }
        return
      }
      // No ghost — send current text + tab to kitty, peek for completion
      const partial = input.value
      const sendTab = partial
        ? fetch('/api/send-text', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ agent: target, text: partial, enter: false }) })
            .then(() => fetch('/api/send-key', { method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ agent: target, key: 'tab' }) }))
        : fetch('/api/send-key', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ agent: target, key: 'tab' }) })
      sendTab.then(() => {
        refresh()
        setTimeout(async () => {
          try {
            const res = await fetch(`/api/peek?agent=${encodeURIComponent(target)}`)
            if (!res.ok) return
            const data = await res.json()
            const text = data.text || ''
            const lines = text.split('\n')
            let promptLine = ''
            for (let i = lines.length - 1; i >= 0; i--) {
              if (/[❯$%>]\s/.test(lines[i])) { promptLine = lines[i]; break }
            }
            if (!promptLine) return
            const m = promptLine.match(/[❯$%>]\s(.*)$/)
            if (!m) return
            const completed = m[1].trim()
            const current = input.value
            if (completed && completed.startsWith(current) && completed !== current) {
              setGhost(current, completed.substring(current.length))
            } else if (completed && completed !== current) {
              input.value = completed
            }
            // Clear kitty's prompt (we'll re-send the full line on Enter)
            fetch('/api/send-key', { method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ agent: target, key: 'ctrl+u' }) })
              .then(refresh).catch(() => {})
          } catch {}
        }, 400)
      }).catch(() => {})
      return
    }
    // Escape → send to kitty
    if (e.key === 'Escape') {
      e.preventDefault()
      clearGhost()
      fetch('/api/send-key', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agent: target, key: 'escape' }) }).then(refresh).catch(() => {})
      return
    }
    // Ctrl+C etc → send to kitty
    if (e.ctrlKey && e.key.length === 1) {
      e.preventDefault()
      clearGhost()
      fetch('/api/send-key', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agent: target, key: `ctrl+${e.key.toLowerCase()}` }) }).then(refresh).catch(() => {})
      input.value = ''
      return
    }
    // Regular typing: just let it go in the textfield, clear ghost
    if (e.key.length === 1 && !e.metaKey) {
      clearGhost()
      // Don't preventDefault — character appears in textfield
    }
  })
  // Force-disable autocorrect (Safari ignores HTML attributes sometimes)
  input.setAttribute('autocorrect', 'off')
  input.setAttribute('autocapitalize', 'off')
  input.setAttribute('spellcheck', 'false')
  function autoResize() { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 120) + 'px' }
  input.addEventListener('input', () => {
    autoResize()
    // Hide target ghost when text is long enough to overlap
    if (targetGhost) targetGhost.classList.toggle('hidden', input.value.length > 30)
  })

  container._queueMode = false
  container._queueBuffer = []
  container._interruptMode = false

  // Pill menu — click target ghost to toggle queue/interrupt modes
  const pillMenu = container.querySelector('.pill-menu')
  if (targetGhost && pillMenu) {
    targetGhost.addEventListener('click', e => {
      e.stopPropagation()
      // Don't open if no target
      if (!container._chatTarget && !(container._labelFilter?.length > 0)) return
      const showing = pillMenu.style.display !== 'none'
      if (showing) { pillMenu.style.display = 'none'; return }
      // Update active states
      pillMenu.querySelector('.queue-item').classList.toggle('active', !!container._queueMode)
      pillMenu.querySelector('.interrupt-item').classList.toggle('active', !!container._interruptMode)
      pillMenu.style.display = ''
    })
    pillMenu.addEventListener('click', e => {
      const item = e.target.closest('.pill-menu-item')
      if (!item) return
      e.stopPropagation()
      const mode = item.dataset.mode
      pillMenu.style.display = 'none'
      // Synthesize the slash command by injecting it and calling send
      if (mode === 'queue') {
        input.value = '/queue'
        send()
      } else if (mode === 'interrupt') {
        input.value = '/interrupt'
        send()
      }
    })
    // Close pill menu on outside click
    document.addEventListener('click', () => { pillMenu.style.display = 'none' })
  }

  // Image paste support
  input.addEventListener('paste', async e => {
    const items = [...(e.clipboardData?.items || [])]
    const imgItem = items.find(i => i.type.startsWith('image/'))
    if (!imgItem) return
    e.preventDefault()
    const blob = imgItem.getAsFile()
    if (!blob) return
    log.innerHTML += `<div class="chat-line" style="color:var(--text-dim)">Uploading image...</div>`
    if (container._autoScroll !== false) log.scrollTop = log.scrollHeight
    try {
      const buf = await blob.arrayBuffer()
      const res = await fetch('/api/upload', { method: 'POST', body: buf })
      const data = await res.json()
      if (data.error) { log.innerHTML += `<div class="chat-line" style="color:var(--orange)">Upload failed: ${esc(data.error)}</div>`; return }
      const caption = input.value.trim()
      input.value = (caption ? caption + ' ' : '') + `![image](${data.url})`
      send()
    } catch (err) { log.innerHTML += `<div class="chat-line" style="color:var(--orange)">Upload failed: ${esc(err.message)}</div>` }
  })

  // Drop support: images, chat attachments, and tlda annotations
  const inputBar = container.querySelector('.chat-input-bar')
  const chatWidget = container.querySelector('.chat-widget')
  const dropArea = chatWidget || inputBar

  dropArea.addEventListener('dragover', e => {
    const types = e.dataTransfer?.types || []
    if (types.includes('Files') || types.includes('application/x-chat-attachment') || types.includes('application/x-tlda-note') || types.includes('text/plain')) {
      e.preventDefault()
      inputBar.style.outline = '2px solid var(--accent)'
    }
  })
  dropArea.addEventListener('dragleave', e => {
    if (!dropArea.contains(e.relatedTarget)) inputBar.style.outline = ''
  })
  dropArea.addEventListener('drop', async e => {
    inputBar.style.outline = ''
    // Check for chat attachment (from search results, pinned refs)
    const jsonData = e.dataTransfer?.getData('application/x-chat-attachment')
    if (jsonData) {
      e.preventDefault()
      try { addChatAttachment(JSON.parse(jsonData)) } catch {}
      input.focus()
      return
    }
    // Check for tlda annotation drop (custom MIME or text/plain with marker)
    let tldaData = e.dataTransfer?.getData('application/x-tlda-note')
    if (!tldaData) {
      const plain = e.dataTransfer?.getData('text/plain')
      if (plain) try { const p = JSON.parse(plain); if (p._tlda) tldaData = plain } catch {}
    }
    if (tldaData) {
      e.preventDefault()
      try {
        const note = JSON.parse(tldaData)
        if (!note._fleet) {
          addChatAttachment({
            type: 'tlda',
            snippet: (note.tabs ? note.tabs[note.activeTab || 0] : note.text || '').substring(0, 200),
            source: note.sourceDoc ? `tlda:${note.sourceDoc}/${note.sourceShapeId || ''}` : 'tlda',
            timestamp: ''
          })
          input.focus()
          return
        }
      } catch {}
    }
    // Image file drop
    const file = [...(e.dataTransfer?.files || [])].find(f => f.type.startsWith('image/'))
    if (!file) return
    e.preventDefault()
    log.innerHTML += `<div class="chat-line" style="color:var(--text-dim)">Uploading image...</div>`
    if (container._autoScroll !== false) log.scrollTop = log.scrollHeight
    try {
      const buf = await file.arrayBuffer()
      const res = await fetch('/api/upload', { method: 'POST', body: buf })
      const data = await res.json()
      if (data.error) { log.innerHTML += `<div class="chat-line" style="color:var(--orange)">Upload failed: ${esc(data.error)}</div>`; return }
      const caption = input.value.trim()
      input.value = (caption ? caption + ' ' : '') + `![image](${data.url})`
      send()
    } catch (err) { log.innerHTML += `<div class="chat-line" style="color:var(--orange)">Upload failed: ${esc(err.message)}</div>` }
  })
}

function renderLabelPicker(container, params) {
  const picker = container.querySelector('.label-picker')
  if (!picker || !currentState) return
  const allLabels = new Set()
  for (const a of (currentState.agents || [])) {
    for (const l of (a.labels || [])) allLabels.add(l)
  }
  const labels = [...allLabels].sort()
  picker.innerHTML = labels.map(l => {
    const c = labelColor(l)
    return `<span class="label-chip" data-label="${esc(l)}" style="color:${c};border:1px solid ${c}60;background:${c}15">${esc(l)}</span>`
  }).join('')
  if (labels.length === 0) {
    picker.innerHTML = '<span style="color:var(--text-dim);font-size:11px">No labels found</span>'
  }

  // Clear button
  const dnf = container._labelFilter
  if (dnf && dnf.length > 0) {
    const clearBtn = document.createElement('span')
    clearBtn.style.cssText = 'color:var(--text-dim);border:1px solid var(--border);padding:1px 6px;border-radius:3px;cursor:pointer;font-size:10px;margin-left:auto'
    clearBtn.textContent = 'clear'
    clearBtn.addEventListener('click', () => {
      container._labelFilter = null
      if (container._panelId) savePanelState(container._panelId, 'labelFilter', null)
      if (currentState) updateChatWidget(container, params, currentState)
    })
    picker.appendChild(clearBtn)
  }

  // Drag + click on picker chips
  picker.querySelectorAll('.label-chip').forEach(chip => {
    let dragging = false
    chip.style.touchAction = 'none' // required for pointer capture
    chip.addEventListener('pointerdown', (e) => {
      e.preventDefault()
      chip.setPointerCapture(e.pointerId)
      const startX = e.clientX, startY = e.clientY
      dragging = false
      const onMove = (me) => {
        if (!dragging && (Math.abs(me.clientX - startX) > 4 || Math.abs(me.clientY - startY) > 4)) {
          dragging = true
          chip.releasePointerCapture(e.pointerId)
          startLabelDrag(me, chip.dataset.label)
          chip.removeEventListener('pointermove', onMove)
          chip.removeEventListener('pointerup', onUp)
        }
      }
      const onUp = () => {
        chip.removeEventListener('pointermove', onMove)
        chip.removeEventListener('pointerup', onUp)
      }
      chip.addEventListener('pointermove', onMove)
      chip.addEventListener('pointerup', onUp)
    })
    // Click = quick add as new OR clause
    chip.addEventListener('click', () => {
      if (dragging) return
      const label = chip.dataset.label
      const dnf = container._labelFilter || []
      if (!dnf.some(g => g.includes(label))) {
        container._labelFilter = [...dnf, [label]]
      }
      if (container._panelId) savePanelState(container._panelId, 'labelFilter', container._labelFilter)
      if (currentState) updateChatWidget(container, container._widgetParams || params, currentState)
    })
  })
}

function renderFilterExpression(container, params) {
  const expr = container.querySelector('.filter-expression')
  const dot = container.querySelector('.filter-dot')
  const summary = container.querySelector('.filter-summary')
  if (!expr) return

  const dnf = container._labelFilter
  const hasFilter = dnf && dnf.length > 0

  const filterBar = container.querySelector('.chat-filter-bar')
  if (filterBar) filterBar.classList.toggle('has-filter', hasFilter)
  dot.classList.toggle('active', hasFilter)
  if (hasFilter) {
    summary.textContent = dnf.map(g => g.length > 1 ? `(${g.join(' & ')})` : g[0]).join(' | ')
  } else {
    summary.textContent = 'all'
  }

  if (!hasFilter) {
    expr.innerHTML = '<span style="color:var(--text-dim);font-size:10px">Drop labels here to filter</span><span class="filter-drop-new" style="flex:1">+</span>'
    return
  }

  let html = ''
  dnf.forEach((group, gi) => {
    if (gi > 0) html += '<span class="filter-or-sep">or</span>'
    html += `<div class="filter-and-group" data-group-idx="${gi}">`
    group.forEach(label => {
      const c = labelColor(label)
      html += `<span class="filter-chip" style="color:${c};border:1px solid ${c}60;background:${c}15">`
      html += `${esc(label)}<span class="filter-chip-x" data-group="${gi}" data-label="${esc(label)}">&times;</span>`
      html += `</span>`
    })
    html += '</div>'
  })
  html += '<span class="filter-drop-new">+</span>'
  expr.innerHTML = html

  // Remove handlers
  expr.querySelectorAll('.filter-chip-x').forEach(x => {
    x.addEventListener('click', (e) => {
      e.stopPropagation()
      const gi = parseInt(x.dataset.group, 10)
      const label = x.dataset.label
      const dnf = container._labelFilter || []
      if (dnf[gi]) {
        dnf[gi] = dnf[gi].filter(l => l !== label)
        if (dnf[gi].length === 0) dnf.splice(gi, 1)
        container._labelFilter = dnf.length > 0 ? [...dnf] : null
        if (container._panelId) savePanelState(container._panelId, 'labelFilter', container._labelFilter)
        if (currentState) updateChatWidget(container, params, currentState)
      }
    })
  })
}

// Noise tools to filter out of activity stream
const ACTIVITY_NOISE = new Set([
  'wait_for_task', 'my_task', 'task_list', 'register', 'register_manager',
  'task_check', 'unregister_manager', 'task_done',
  'mcp__fleet__wait_for_task', 'mcp__fleet__my_task', 'mcp__fleet__task_list',
  'mcp__fleet__register', 'mcp__fleet__register_manager', 'mcp__fleet__task_check',
  'mcp__fleet__task_done',
  'ToolSearch',
])
// Fleet tool calls that should render as chat messages instead of tool cards
const CHAT_TOOLS = new Set([
  'chat', 'delegate', 'mcp__fleet__chat', 'mcp__fleet__delegate',
])

function humanizeToolName(name) {
  let n = (name || '').replace(/^mcp__/, '').replace(/__/g, '/')
  const shorts = { 'fleet/chat': 'chat', 'fleet/delegate': 'delegate', 'fleet/task_done': 'done',
    'fleet/interrupt': 'interrupt', 'fleet/label_agent': 'label', 'fleet/respawn': 'respawn',
    'fleet/spawn': 'spawn', 'fleet/name_agent': 'name', 'fleet/search_logs': 'search_logs' }
  return shorts[n] || n
}

// Render a compact inline diff for Edit tool calls
function renderEditDiff(input) {
  if (!input?.old_string || !input?.new_string) return ''
  const oldLines = input.old_string.split('\n')
  const newLines = input.new_string.split('\n')
  // Cap display at 12 lines per side
  const maxLines = 12
  const oldShow = oldLines.slice(0, maxLines)
  const newShow = newLines.slice(0, maxLines)
  const oldTrunc = oldLines.length > maxLines ? `\n… +${oldLines.length - maxLines} lines` : ''
  const newTrunc = newLines.length > maxLines ? `\n… +${newLines.length - maxLines} lines` : ''
  const uid = 'diff-' + Math.random().toString(36).slice(2, 8)
  return `<div class="edit-diff" id="${uid}">
    <div class="diff-side diff-old"><div class="diff-label">−</div><pre>${esc(oldShow.join('\n') + oldTrunc)}</pre></div>
    <div class="diff-side diff-new"><div class="diff-label">+</div><pre>${esc(newShow.join('\n') + newTrunc)}</pre></div>
  </div>`
}

function toolArgSummary(input, toolName) {
  if (!input) return ''
  const n = (toolName || '').toLowerCase()
  // Fleet-specific: show the meaningful args
  if (n === 'name') return `${input.agent} → ${input.friendly_name}`
  if (n === 'label') return `${input.agent}: ${(input.labels || []).join(', ')}`
  if (n === 'delegate') return `${input.agent}: ${input.description || ''}`
  if (n === 'interrupt') return `${input.agent}${input.message ? ' — ' + input.message : ''}`
  if (n === 'chat') return `→${input.to || 'manager'}: ${input.message || ''}`
  if (input.to) return input.to
  if (input.agent) return input.agent
  if (input.file_path) return input.file_path.split('/').slice(-2).join('/')
  if (input.path) return input.path.split('/').slice(-2).join('/')
  if (input.command) return input.command
  if (input.pattern) return input.pattern
  if (input.message) return input.message
  if (input.query) return input.query
  return ''
}

// Content-focused detail for activity cards: shows *what* a tool does, not just where
function toolContentDetail(name, input) {
  if (!input) return ''
  const n = (name || '').toLowerCase()
  if (n === 'edit') {
    // Show a snippet of the new content or the old→new change
    const ns = input.new_string || ''
    const os = input.old_string || ''
    if (ns && os) {
      // Show first meaningful line of the new content
      const newLines = ns.split('\n').filter(l => l.trim())
      const snippet = newLines[0]?.trim() || ''
      const addCount = ns.split('\n').length
      const delCount = os.split('\n').length
      return snippet ? `+${addCount}/-${delCount}: ${snippet}` : `+${addCount}/-${delCount}`
    }
    return ''
  }
  if (n === 'write') {
    const content = input.content || ''
    const lines = content.split('\n')
    const firstLine = lines.find(l => l.trim())?.trim() || ''
    return firstLine ? `${lines.length} lines: ${firstLine}` : `${lines.length} lines`
  }
  if (n === 'read') {
    // Just the filename is fine — content not available at call time
    return ''
  }
  if (n === 'bash') {
    const cmd = input.command || ''
    // Show the actual command, which is already in arg
    return ''
  }
  if (n === 'grep') {
    const pat = input.pattern || ''
    const path = input.path ? input.path.split('/').slice(-2).join('/') : ''
    return path ? `/${pat}/ in ${path}` : ''
  }
  if (n === 'glob') {
    const pat = input.pattern || ''
    const path = input.path ? input.path.split('/').slice(-2).join('/') : ''
    return path ? `${pat} in ${path}` : ''
  }
  if (n === 'agent') {
    const desc = input.description || input.prompt || ''
    return desc
  }
  return ''
}

// Extract activity events from shared session cache (populated by terminal's fetchSession)
const _activityExtracted = new Map() // agentId -> { events, hash }

function getActivityEvents(agentId) {
  const cached = window._sessionCache?.[agentId]
  if (!cached?.data) return []
  const prev = _activityExtracted.get(agentId)
  if (prev && prev.hash === cached.hash) return prev.events

  // Extract tool + text events as activity items
  const items = []
  for (const ev of cached.data.events) {
    if (ev.type !== 'assistant' || !ev.blocks) continue
    for (const b of ev.blocks) {
      if (b.type === 'tool_use') {
        if (ACTIVITY_NOISE.has(b.name)) continue
        // Convert fleet chat/delegate tool calls to chat messages (no card break)
        if (CHAT_TOOLS.has(b.name)) {
          const inp = b.input || {}
          const text = inp.message || inp.description || ''
          if (text) {
            items.push({
              from: agentId,
              to: inp.to || inp.agent || 'manager',
              text,
              timestamp: ev.timestamp,
              _fromSession: true,
            })
          }
          continue
        }
        const name = humanizeToolName(b.name)
        if (!name) continue
        const arg = toolArgSummary(b.input, name)
        const detail = toolContentDetail(name, b.input)
        items.push({
          _activity: true,
          from: agentId,
          timestamp: ev.timestamp,
          _toolName: name,
          _toolArg: arg,
          _toolDetail: detail,
          _toolInput: b.input,
          _ctxPct: ev.usage ? Math.round((ev.usage.input / 200000) * 100) : null,
        })
      } else if (b.type === 'text' && b.text && b.text.length > 20) {
        // Include substantive text blocks (skip short fragments)
        items.push({
          _activity: true,
          _isText: true,
          from: agentId,
          timestamp: ev.timestamp,
          _text: b.text,
          _ctxPct: ev.usage ? Math.round((ev.usage.input / 200000) * 100) : null,
        })
      }
    }
  }
  _activityExtracted.set(agentId, { events: items, hash: cached.hash })
  return items
}

// Dedup consecutive identical tool calls + collapse Read→Edit, merge consecutive Reads
function dedupTools(toolItems) {
  // Pre-pass: collect files that get edited, so we can strip them from Read merges
  const editedFiles = new Set()
  for (const t of toolItems) {
    if ((t._toolName || '').toLowerCase() === 'edit' && t._toolArg) editedFiles.add(t._toolArg)
  }

  const result = []
  for (let i = 0; i < toolItems.length; i++) {
    const t = toolItems[i]
    const key = (t._toolName || '') + ':' + (t._toolArg || '')
    const prev = result.length ? result[result.length - 1] : null
    const name = (t._toolName || '').toLowerCase()
    // Drop Read if the same file gets edited anywhere in this group
    if (name === 'read' && editedFiles.has(t._toolArg)) continue
    // Merge consecutive Reads of different files into one line
    if (name === 'read' && prev && (prev._toolName || '').toLowerCase() === 'read' && prev._toolArg !== t._toolArg) {
      if (!prev._mergedArgs) prev._mergedArgs = [prev._toolArg]
      prev._mergedArgs.push(t._toolArg)
      prev._toolArg = prev._mergedArgs.map(a => (a || '').split('/').pop()).join(', ')
      prev._count++
      continue
    }
    if (prev && prev._key === key) {
      prev._count++
    } else {
      result.push({ ...t, _key: key, _count: 1 })
    }
  }
  return result
}

// Render a group of consecutive activity events from the same agent as one card
function renderActivityGroup(group, state) {
  const m = group[group.length - 1] // most recent for header
  const nick = agentLabel(state, m.from)
  const fromCls = getNickClass(m.from, state)
  const agent = (state.agents || []).find(a => a.id === m.from)
  const ctxPct = m._ctxPct ?? agent?.context_pct
  const ctxHtml = ctxPct != null ? `<span class="activity-ctx">${ctxPct}%</span>` : ''

  const tools = group.filter(t => t._toolName)
  const lastTool = tools.length ? tools[tools.length - 1] : null
  const texts = group.filter(t => t._isText)
  const lastText = texts.length ? texts[texts.length - 1] : null

  // Collapsed header: last text or tool summary with count
  let headerSummary = ''
  if (lastText) {
    headerSummary = esc(lastText._text.split('\n')[0])
  } else if (lastTool) {
    const extra = tools.length > 1 ? ` <span class="activity-more">(+${tools.length - 1} more)</span>` : ''
    headerSummary = `${esc(lastTool._toolName)}: ${esc(lastTool._toolArg || '')}${extra}`
  }

  // Badge overlay: agent name + ctx% + count — floats right on first line of detail
  const badge = `<span class="activity-badge">`
    + `<span class="activity-agent ${fromCls}">${esc(nick)}</span> `
    + (group.length > 1 ? `<span class="activity-count">${group.length}</span> ` : '')
    + `<span class="activity-signal"></span>`
    + ctxHtml
    + `</span>`

  // Build detail: text blocks + tool run cards
  // Split group into segments: consecutive tools become a tool-run card, text blocks are inline
  const segments = []
  let currentTools = []
  for (const t of group) {
    if (t._isText) {
      if (currentTools.length) { segments.push({ type: 'tools', items: currentTools }); currentTools = [] }
      segments.push({ type: 'text', item: t })
    } else {
      currentTools.push(t)
    }
  }
  if (currentTools.length) segments.push({ type: 'tools', items: currentTools })

  let lineNum = 1
  const detailHtml = segments.map(seg => {
    if (seg.type === 'text') {
      const t = seg.item
      const lines = (t._text || '').split('\n').slice(0, 8)
      const text = lines.join('\n').slice(0, 600)
      const truncated = (t._text || '').length > 600 || (t._text || '').split('\n').length > 8
      return `<div class="activity-text-block">${esc(text)}${truncated ? ' …' : ''}</div>`
    }
    // Tool run card: draggable, foldable, with line numbers and dedup
    const deduped = dedupTools(seg.items)
    const toolLines = deduped.map(t => {
      const num = lineNum++
      const countHtml = t._count > 1 ? `<span class="tool-count">×${t._count}</span>` : ''
      const arg = t._toolArg ? esc(t._toolArg) : ''
      const detail = t._toolDetail ? `<div class="tool-detail">${esc(t._toolDetail)}</div>` : ''
      const isEdit = (t._toolName || '').toLowerCase() === 'edit' && t._toolInput?.old_string && t._toolInput?.new_string
      const hasDiff = isEdit ? ' has-diff' : ''
      const diffHtml = isEdit ? renderEditDiff(t._toolInput) : ''
      return `<div class="tool-line${hasDiff}" data-line="${num}">`
        + `<span class="tool-linenum">${num}</span>`
        + `${countHtml}`
        + `<span class="tool-name">${esc(t._toolName || '')}</span>`
        + (arg ? `<span class="tool-sep">:</span> <span class="tool-arg">${arg}</span>` : '')
        + detail
        + `</div>`
        + diffHtml
    }).join('')
    const cardId = 'tr-' + Math.random().toString(36).slice(2, 8)
    return `<div class="tool-run-card" draggable="true" data-card-id="${cardId}">
      <div class="tool-run-body">${toolLines}</div>
    </div>`
  }).join('')

  return `<div class="chat-activity-card will-fold" draggable="true" data-agent="${esc(m.from)}" data-ts="${esc(m.timestamp || '')}">
    <div class="activity-header">
      <span class="activity-agent ${fromCls}">${esc(nick)}</span>
      <span class="activity-last-tool">${headerSummary}</span>
      ${group.length > 1 ? `<span class="activity-count">${group.length}</span>` : ''}
      <span class="activity-signal"></span>
      ${ctxHtml}
    </div>
    ${badge}
    <div class="activity-detail"><div class="activity-detail-inner">${detailHtml}</div></div>
  </div>`
}

function renderChatLine(m, state) {
  const nick = agentLabel(state, m.from)
  const fromCls = getNickClass(m.from, state)
  const ts = timeShort(m.timestamp)
  const text = m._raw ? esc(m.text) : renderMarkdown(esc(m.text))
  const sender = (state.agents || []).find(a => a.id === m.from)
  const senderAgo = sender?.last_seen ? (Date.now() - new Date(sender.last_seen).getTime()) / 1000 : null
  const dimStyle = senderAgo === null ? '' : senderAgo > 600 ? 'opacity:0.4' : senderAgo > 120 ? 'opacity:0.65' : ''
  const isFromUser = !sender
  const userAliases = new Set(['web', 'skip', 'human'])
  const isAmbient = !isFromUser && !userAliases.has(m.to) && !userAliases.has(m.from)
  const receipt = isFromUser ? (m.read ? '<span style="color:var(--text-dim);font-size:10px;margin-left:4px" title="Read">✓</span>' : '') : ''
  // Multi-target: show all cc recipients
  let toHtml
  if (m.cc && m.cc.length > 1) {
    toHtml = m.cc.map(id => `<span class="${getNickClass(id, state)}">${esc(agentLabel(state, id))}</span>`).join('<span style="color:var(--text-dim)">,</span>')
  } else {
    const toNick = agentLabel(state, m.to)
    const toCls = getNickClass(m.to, state)
    toHtml = `<span class="${toCls}">${esc(toNick)}</span>`
  }
  // Render attachments as interactive refs
  function renderAttachChip(a) {
    const agentId = (a.source || '').split(':')[1] || ''
    const agentName = agentId ? agentLabel(state, agentId) : ''
    const cardId = (a.source || '').split(':')[2] || ''
    const toolCount = (a.snippet || '').split('\n').filter(Boolean).length
    const ts = a.timestamp ? timeShort(a.timestamp) : ''
    const chipLabel = [agentName, `${toolCount} tool${toolCount !== 1 ? 's' : ''}`, ts].filter(Boolean).join(' \u00b7 ')
    // Render preview as styled tool lines (like the original card)
    const rawText = a.text || a.snippet || ''
    const previewHtml = rawText.split('\n').filter(Boolean).map(line => {
      // Parse "NUM [×COUNT] TOOLNAME[: ARG]"
      const m = line.match(/^(\d+)\s*(?:(×\d+)\s+)?(\S+?)(?::\s*(.*))?$/)
      if (m) {
        return `<div class="tool-line"><span class="tool-linenum">${esc(m[1])}</span>${m[2] ? `<span class="tool-count">${esc(m[2])}</span>` : ''}<span class="tool-name">${esc(m[3])}</span>${m[4] ? `<span class="tool-sep">:</span> <span class="tool-arg">${esc(m[4])}</span>` : ''}</div>`
      }
      return `<div style="padding:2px 0;color:var(--text)">${esc(line)}</div>`
    }).join('')
    return `<span class="tool-ref" data-card-id="${esc(cardId)}" data-source="${esc(a.source || '')}"><span style="font-weight:600">${esc(a.type || 'ref')}</span> ${esc(chipLabel)}<span class="tool-ref-preview">${previewHtml}</span></span>`
  }
  let attachHtml = ''
  if (m.attachments && m.attachments.length) {
    attachHtml = m.attachments.map(renderAttachChip).join(' ')
    attachHtml = ' ' + attachHtml
  }
  // Strip flattened attachment text and auto-generate chips from legacy messages
  const rawText = m.text || ''
  const hasAttachBlock = /\[[\w-]+\] [\s\S]+?\(from .+?\)/.test(rawText)
  let displayText = text
  if (hasAttachBlock) {
    const cleaned = rawText.replace(/\n?\n?\[[\w-]+\] [\s\S]+?\(from .+?\)/g, '').trim()
    displayText = renderMarkdown(esc(cleaned))
    if (!m.attachments || !m.attachments.length) {
      m.attachments = [...rawText.matchAll(/\[([\w-]+)\] ([\s\S]+?)\(from (.+?)\)/g)]
        .map(mx => ({ type: mx[1], snippet: mx[2].trim(), source: mx[3].trim() }))
      attachHtml = m.attachments.map(renderAttachChip).join(' ')
      attachHtml = ' ' + attachHtml
    }
  }
  // Failed local messages: show with failure indicator
  if (m._failed) {
    return `<div class="chat-line from-user" data-msg-ts="${esc(m.timestamp || '')}" data-msg-from="${esc(m.from || '')}"><span class="chat-ts">${ts}</span> <span class="chat-nick"><span class="${fromCls}">${esc(nick)}:</span></span> ${displayText} <span style="color:var(--orange);font-size:10px">⚠ not sent</span></div>`
  }
  // Voicemail: queued for compacting/unreachable agent
  if (m._voicemail) {
    const vmColor = m._voicemailReason === 'unreachable' ? 'var(--red, #e55)' : 'var(--orange)'
    const vmLabel = m._voicemailReason || 'queued'
    return `<div class="chat-line from-user chat-queued" style="opacity:0.5;border-left:2px solid ${vmColor};padding-left:8px;margin-left:4px" data-msg-ts="${esc(m.timestamp || '')}" data-msg-from="${esc(m.from || '')}"><span class="chat-ts">${ts}</span> <span class="chat-nick"><span class="${fromCls}">${esc(nick)}:</span></span> ${displayText} <span style="color:${vmColor};font-size:10px;font-style:italic">${vmLabel}</span></div>`
  }
  // Retracted messages: show struck-through with dim styling
  if (m._retracted) {
    return `<div class="chat-line from-user" style="opacity:0.3;text-decoration:line-through"><span class="chat-ts">${ts}</span> <span class="chat-nick"><span class="${fromCls}">${esc(nick)}:</span></span> ${displayText}</div>`
  }
  // Retract button for recent user messages (within 5 min)
  const msgAge = Date.now() - new Date(m.timestamp).getTime()
  const retractBtn = isFromUser && msgAge < 300000
    ? `<span class="chat-retract" data-ts="${esc(m.timestamp)}" title="Retract">\u232B</span>`
    : ''
  const lineClass = `chat-line${isFromUser ? ' from-user' : ''}${isAmbient ? ' ambient' : ''}`
  // Simplify nick display: skip →target when user is sender or receiver
  const nickHtml = isAmbient
    ? `<span class="chat-nick"><span class="${fromCls}">${esc(nick)}</span><span style="color:var(--text-dim)">&rarr;</span>${toHtml}:</span>`
    : `<span class="chat-nick"><span class="${fromCls}">${esc(nick)}:</span></span>`
  // Long message: scrollable container instead of collapse
  const rawLineCount = (m.text || '').split('\n').length
  const isLongMsg = rawLineCount > 20
  let bodyText = isLongMsg ? `<span class="message-body message-long">${displayText}</span>` : displayText
  let line
  if (isAmbient) {
    line = `<div class="${lineClass}" style="${dimStyle}" data-msg-ts="${esc(m.timestamp || '')}" data-msg-from="${esc(m.from || '')}"><span class="chat-ts" draggable="true">${ts}</span> ${nickHtml} ${bodyText}${attachHtml}</div>`
  } else {
    line = `<div class="${lineClass}" style="${dimStyle}" data-msg-ts="${esc(m.timestamp || '')}" data-msg-from="${esc(m.from || '')}"><span class="chat-ts" draggable="true">${ts}</span> ${nickHtml} ${bodyText}${receipt}${attachHtml}${retractBtn}</div>`
  }
  if (m._interrupt) {
    const age = Date.now() - new Date(m.timestamp).getTime()
    const cls = age < 10000 ? 'chat-interrupt-line fresh' : 'chat-interrupt-line'
    line += `<hr class="${cls}" data-ts="${m.timestamp}">`
  }
  return line
}

let CHAT_PAGE_SIZE = 100

function repositionTldaIframes(container, log) {
  if (!container._tldaOverlay) return
  const overlay = container._tldaOverlay
  const overlayRect = overlay.getBoundingClientRect()
  const activeIds = new Set()

  log.querySelectorAll('.tlda-card[data-tlda-id]').forEach(card => {
    const slot = card.querySelector('.tlda-iframe-slot')
    if (!slot) return
    const id = card.dataset.tldaId
    activeIds.add(id)
    let iframe = container._tldaFrames.get(id)
    if (!iframe) {
      iframe = document.createElement('iframe')
      iframe.src = card.dataset.tldaSrc
      iframe.style.cssText = 'position:absolute;border:none;pointer-events:auto'
      iframe.loading = 'lazy'
      overlay.appendChild(iframe)
      container._tldaFrames.set(id, iframe)
    }
    slot.style.cssText = 'width:100%;height:250px'
    const slotRect = slot.getBoundingClientRect()
    iframe.style.left = (slotRect.left - overlayRect.left) + 'px'
    iframe.style.top = (slotRect.top - overlayRect.top) + 'px'
    iframe.style.width = slotRect.width + 'px'
    iframe.style.height = '250px'
    iframe.style.display = ''
  })
  for (const [id, iframe] of container._tldaFrames) {
    if (!activeIds.has(id)) iframe.style.display = 'none'
  }
}

function updateChatWidget(container, params, state) {
  const log = container.querySelector('.chat-log')
  if (!log) return
  // Skip re-render when panel is hidden (prevents scroll position loss)
  if (container.offsetHeight === 0) {
    container._pendingUpdate = true
    return
  }
  // Filter out legacy server-side _activity messages (now handled client-side via session cache)
  let msgs = (state.messages || []).filter(m => !m._activity)

  // Dedup broadcast messages: same sender + same text within 5s → show once
  // Skip in playback mode — events are already clean
  if (!container._streamSource) {
    const dominated = new Set()
    for (let i = 0; i < msgs.length; i++) {
      if (dominated.has(i)) continue
      const m = msgs[i]
      for (let j = i + 1; j < msgs.length; j++) {
        if (dominated.has(j)) continue
        const n = msgs[j]
        if (n.from === m.from && n.text === m.text &&
            Math.abs(new Date(n.timestamp) - new Date(m.timestamp)) < 5000) {
          dominated.add(j)
        }
      }
    }
    if (dominated.size) msgs = msgs.filter((_, i) => !dominated.has(i))
  }

  // In playback mode, filter by chat target if set
  if (container._streamSource && container._chatTarget) {
    const tgt = container._chatTarget
    // Build set of IDs matching the target (could be friendly name, UUID, or alias)
    const tgtIds = new Set([tgt])
    // Use state.agents (runtime nameMap) not playback.agents (static) — name_change events update names
    const agents = state.agents || []
    for (const a of agents) {
      if (a.friendly_name === tgt || a.id?.startsWith(tgt)) tgtIds.add(a.id)
    }
    msgs = msgs.filter(m => tgtIds.has(m.from) || tgtIds.has(m.to))
  }

  // In playback mode, convert tool_call events to activity cards (same as live UI)
  if (container._streamSource) {
    const chatTypes = new Set(['chat', 'delegate', 'user_text', 'task_done', 'marker'])
    msgs = msgs.filter(m => {
      if (!m._evType) return true
      if (chatTypes.has(m._evType)) return true
      if (m._evType === 'tool_call' && m._tool) {
        if (ACTIVITY_NOISE.has(m._tool)) return false
        m._activity = true
        m._toolName = humanizeToolName(m._tool)
        m._toolArg = toolArgSummary(m._input, m._toolName)
