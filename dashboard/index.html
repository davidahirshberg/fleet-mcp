        m._toolDetail = toolContentDetail(m._toolName, m._input)
        m._toolInput = m._input
        return true
      }
      return false // filter out tool_result, assistant_text
    })
  }

  // DNF filter evaluation
  const dnf = container._labelFilter
  let filtered = msgs
  let _filterEmpty = false
  if (dnf && dnf.length > 0) {
    const matchingAgentIds = new Set()
    for (const a of (state.agents || [])) {
      if (agentMatchesDnf(dnf, a)) matchingAgentIds.add(a.id)
    }
    if (matchingAgentIds.size === 0) {
      filtered = []
      _filterEmpty = true
    } else {
      filtered = msgs.filter(m => matchingAgentIds.has(m.from) || matchingAgentIds.has(m.to))
    }
  } else if (container._chatTarget && !container._streamSource) {
    // When targeting a specific agent (no label filter), only show messages to/from that agent
    // Skip in playback mode — already filtered above with friendly name resolution
    const target = container._chatTarget
    filtered = msgs.filter(m => m.from === target || m.to === target)
  }

  // Merge activity events from session data (fetched client-side)
  // Determine which agents to fetch activity for
  // Activity cards: show for current chat targets only
  const chatTargets = new Set()
  if (dnf && dnf.length > 0) {
    // Label filter: all matching agents are targets
    for (const a of (state.agents || [])) {
      if (agentMatchesDnf(dnf, a)) chatTargets.add(a.id)
    }
  } else if (container._chatTarget) {
    chatTargets.add(container._chatTarget)
  }
  const activeAgents = (state.agents || []).filter(a => {
    const ago = a.last_seen ? (Date.now() - new Date(a.last_seen).getTime()) / 1000 : Infinity
    // When targeting a specific agent, always show their activity (don't gate on last_seen)
    if (chatTargets.has(a.id)) return true
    // For untargeted view (all agents), only show recently active ones
    if (ago > 600) return false
    return chatTargets.size === 0
  })

  // Merge activity events — fetch session data for active agents
  // Skip only when rendering playback state (synth state from a recording)
  const isPlaybackRender = container._streamSource && state === container._streamSource.synthState
  let activityEvents = []
  if (!isPlaybackRender) {
    for (const a of activeAgents) {
      // Trigger lightweight fetch if cache is stale or missing (no terminal needed)
      const cached = window._sessionCache?.[a.id]
      if (!cached || Date.now() - cached.fetchedAt > 3000) {
        fetchSessionLite(a.id) // fire-and-forget; next update cycle picks up results
      }
      const evts = getActivityEvents(a.id)
      if (evts.length) activityEvents = activityEvents.concat(evts)
    }
  }

  // Drop session-extracted chat messages that duplicate fleet messages
  if (activityEvents.length && filtered.length) {
    const fleetTexts = new Set(filtered.map(m => (m.from || '') + ':' + (m.text || '').slice(0, 60)))
    activityEvents = activityEvents.filter(m => {
      if (m._fromSession && m.text) return !fleetTexts.has((m.from || '') + ':' + m.text.slice(0, 60))
      return true
    })
  }

  // Inject compacting/unreachable as inline timeline events (positioned by timestamp)
  if (!container._streamSource) {
    const target = container._chatTarget
    const allAgents = state.agents || []
    // Compacting agents
    let compactingAgents = allAgents.filter(a => a.compacting && a.compacting_since)
    // Only show for targeted agent or agents matching the label filter
    if (target) {
      compactingAgents = compactingAgents.filter(a => a.id === target)
    } else if (chatTargets.size > 0) {
      compactingAgents = compactingAgents.filter(a => chatTargets.has(a.id))
    }
    for (const a of compactingAgents) {
      activityEvents.push({ _compacting: true, _chatBreak: true, from: a.id, timestamp: a.compacting_since })
    }
    // Unreachable agents (>10min no heartbeat)
    if (target) {
      const a = allAgents.find(a => a.id === target)
      if (a && !a.compacting && a.last_seen && !isActive(a)) {
        activityEvents.push({ _unreachable: true, _chatBreak: true, from: a.id, timestamp: a.unreachable_since || a.last_seen })
      }
    }
  }

  // Combine and sort by timestamp (skip sort in playback — events already ordered)
  // Stable sort: tag each item with original index as tiebreaker so equal timestamps
  // never reorder across renders. Activity events sort before messages at same timestamp.
  let withActivity
  if (activityEvents.length) {
    const combined = [...filtered, ...activityEvents]
    for (let k = 0; k < combined.length; k++) combined[k]._sortIdx = k
    combined.sort((a, b) => {
      const ta = a.timestamp || ''
      const tb = b.timestamp || ''
      if (ta !== tb) return ta < tb ? -1 : 1
      // Same timestamp: activity before messages
      const aa = a._activity || a._chatBreak ? 0 : 1
      const ab = b._activity || b._chatBreak ? 0 : 1
      if (aa !== ab) return aa - ab
      // Final tiebreaker: original array order
      return a._sortIdx - b._sortIdx
    })
    withActivity = combined
  } else {
    withActivity = filtered
  }

  // Lazy scroll: only render last N messages, load more on scroll-to-top
  if (!container._chatVisibleCount) container._chatVisibleCount = CHAT_PAGE_SIZE
  const total = withActivity.length
  const visibleCount = Math.min(container._chatVisibleCount, total)
  const startIdx = total - visibleCount
  const visible = withActivity.slice(startIdx)
  const hasMore = startIdx > 0

  // Hash-based render skip: avoid rebuilding DOM when content hasn't changed
  const msgCount = visible.length
  const lastMsg = visible[visible.length - 1]
  const lastText = lastMsg?.text || ''
  // Typing animation: only show in the chat panel targeting the right agent
  const typingObj = state._typing  // { text, to } or null
  const typingForThis = typingObj && container._streamSource &&
    (!container._chatTarget || container._chatTarget === typingObj.to)
    ? typingObj.text : undefined
  const lastActivity = lastMsg?._activity ? (lastMsg._toolName || '') : ''
  const targetKey = container._chatTarget || 'all'
  const structHash = targetKey + ':' + msgCount + ':' + (hasMore ? 1 : 0) + ':' + (lastMsg?.timestamp || '') + ':' + (lastMsg?.from || '') + ':' + lastActivity
  const fullHash = structHash + ':' + lastText.length + ':' + (typingForThis || '')

  if (log._chatHash === fullHash) {
    // Still update typing even if messages unchanged
    const input = container.querySelector('.chat-input')
    if (input && container._streamSource) {
      if (typingForThis != null) { input.value = typingForThis; input.style.color = 'var(--text)'; input.placeholder = '' }
      else { input.value = '' }
    }
    return
  }

  // Incremental update: if only the last message text changed (cinematic streaming),
  // patch just that element instead of rebuilding entire innerHTML
  if (log._chatStructHash === structHash && log.children.length > 0) {
    const lastLine = log.querySelector('.chat-line:last-of-type')
    if (lastLine) {
      const nickEnd = lastLine.querySelector('.chat-nick')
      if (nickEnd) {
        // Remove everything after .chat-nick and re-insert just the text
        let sibling = nickEnd.nextSibling
        while (sibling) { const next = sibling.nextSibling; sibling.remove(); sibling = next }
        const rendered = renderMarkdown(esc(lastText))
        const sender = (state.agents || []).find(a => a.id === lastMsg?.from)
        const isFromUser = !sender
        const receipt = isFromUser ? (lastMsg?.read ? '<span style="color:var(--text-dim);font-size:10px;margin-left:4px" title="Read">✓</span>' : '') : ''
        nickEnd.insertAdjacentHTML('afterend', ` ${rendered}${receipt}`)
      }
      log._chatHash = fullHash
      if (container._autoScroll !== false) {
        requestAnimationFrame(() => { log.scrollTop = log.scrollHeight })
      }
      const input = container.querySelector('.chat-input')
      if (input && container._streamSource) {
        if (typingForThis != null) { input.value = typingForThis; input.style.color = 'var(--text)'; input.placeholder = '' }
        else { input.value = '' }
      }
      return
    }
  }
  log._chatStructHash = structHash
  log._chatHash = fullHash

  // Full rebuild — group consecutive activity events by agent, render chat lines individually
  // Stale messages link: show at top when all messages are loaded
  const staleLink = !hasMore && total > 0 ? `<div class="chat-stale-link">Older messages in search →</div>` : ''
  let renderedLines = staleLink + (hasMore ? `<div class="chat-load-more" data-total="${total}">↑ ${startIdx} older messages — click to load</div>` : '')
  let i = 0
  while (i < visible.length) {
    const m = visible[i]
    if (m._compacting) {
      const nick = agentLabel(state, m.from)
      const cls = getNickClass(m.from, state)
      const ts = timeShort(m.timestamp)
      renderedLines += `<div class="chat-line" style="color:var(--orange);font-style:italic;font-size:11px;opacity:0.6"><span class="chat-ts">${ts}</span> <span class="${cls}">${esc(nick)}</span> compacting...</div>`
      i++; continue
    }
    if (m._unreachable) {
      const nick = agentLabel(state, m.from)
      const cls = getNickClass(m.from, state)
      const ts = timeShort(m.timestamp)
      renderedLines += `<div class="chat-line" style="color:var(--red, #e55);font-style:italic;font-size:11px;opacity:0.6"><span class="chat-ts">${ts}</span> <span class="${cls}">${esc(nick)}</span> unreachable</div>`
      i++; continue
    }
    if (m._chatBreak) { i++; continue } // skip break markers (they split activity groups)
    if (m._activity) {
      // Group consecutive activity events from the same agent into one card.
      // Any non-activity item (chat message, status indicator) breaks the group —
      // this keeps cards positioned chronologically in the timeline.
      const agentId = m.from
      const group = [m]
      let j = i + 1
      while (j < visible.length) {
        const v = visible[j]
        if (v._activity && v.from === agentId) {
          group.push(v)
          j++
        } else {
          break
        }
      }
      i = j
      renderedLines += `<div class="chat-activity-inline-wrap">${renderActivityGroup(group, state)}</div>`
      continue
    } else {
      renderedLines += renderChatLine(m, state)
      i++
    }
  }
  // Show empty state when filter matches no agents
  if (_filterEmpty) {
    const filterDesc = dnf.map(g => g.join(' + ')).join(' | ')
    renderedLines = `<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:12px;opacity:0.6">No agents match <span style="color:var(--accent)">${esc(filterDesc)}</span></div>`
  }
  const linesHtml = renderedLines

  // Status indicators are now injected inline in the timeline (see activityEvents injection above)

  const prevScroll = log.scrollTop
  const wasBottom = container._autoScroll !== false
  const savedTermCard = container._terminalCard && log.contains(container._terminalCard) ? container._terminalCard : null
  // Preserve tlda iframes: iframes reload on ANY DOM reparenting.
  // Solution: iframes live in an overlay that's never destroyed by innerHTML.
  // The overlay sits over the log; iframes are positioned to match placeholder slots.
  if (!container._tldaOverlay) {
    container._tldaOverlay = document.createElement('div')
    container._tldaOverlay.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;z-index:1'
    log.parentElement.style.position = 'relative'
    log.parentElement.appendChild(container._tldaOverlay)
    container._tldaFrames = new Map()
    // Reposition iframes on scroll
    log.addEventListener('scroll', () => {
      if (container._tldaReposPending) return
      container._tldaReposPending = true
      requestAnimationFrame(() => {
        container._tldaReposPending = false
        repositionTldaIframes(container, log)
      })
    })
  }
  log.innerHTML = linesHtml
  if (savedTermCard) log.appendChild(savedTermCard)
  // Reposition tlda iframes after layout settles, then scroll
  requestAnimationFrame(() => {
    repositionTldaIframes(container, log)
    if (wasBottom) {
      log.scrollTop = log.scrollHeight
    } else {
      log.scrollTop = prevScroll
    }
  })

  // Set up load-more click handler
  const loadMoreEl = log.querySelector('.chat-load-more')
  if (loadMoreEl) {
    loadMoreEl.onclick = () => {
      if (container._loadingMore) return
      container._loadingMore = true
      container._chatVisibleCount = (container._chatVisibleCount || CHAT_PAGE_SIZE) + CHAT_PAGE_SIZE
      container._autoScroll = false
      const sh = log.scrollHeight
      updateChatWidget(container, params, state)
      // Restore scroll position after prepend
      requestAnimationFrame(() => {
        log.scrollTop = log.scrollHeight - sh + prevScroll
        container._loadingMore = false
      })
    }
    // Infinite scroll: IntersectionObserver triggers load when sentinel is near viewport
    if (container._loadMoreObserver) container._loadMoreObserver.disconnect()
    container._loadMoreObserver = new IntersectionObserver(entries => {
      if (entries[0]?.isIntersecting && !container._loadingMore) loadMoreEl.click()
    }, { root: log, rootMargin: '200px 0px 0px 0px' })
    container._loadMoreObserver.observe(loadMoreEl)
  } else {
    if (container._loadMoreObserver) { container._loadMoreObserver.disconnect(); container._loadMoreObserver = null }
  }

  // Stale messages link: open search tab with current filter prefilled
  const staleLinkEl = log.querySelector('.chat-stale-link')
  if (staleLinkEl) {
    staleLinkEl.onclick = () => {
      const target = container._chatTarget
      const prefill = target ? agentLabel(state, target) : ''
      executeCommand('/tab search')
      // Prefill the new search panel after it renders
      requestAnimationFrame(() => {
        const searchInputs = document.querySelectorAll('.search-input')
        const newest = searchInputs[searchInputs.length - 1]
        if (newest && prefill) {
          newest.value = prefill
          newest.dispatchEvent(new Event('input'))
        }
      })
    }
  }

  // Animate fresh interrupt lines: remove .fresh after 2 frames to trigger fade transition
  requestAnimationFrame(() => requestAnimationFrame(() => {
    log.querySelectorAll('.chat-interrupt-line.fresh').forEach(hr => hr.classList.remove('fresh'))
  }))

  // Activity cards: auto-fold non-pinned cards that have a newer real message after them
  // Restore pinned state from container._pinnedActivityAgents
  if (!container._pinnedActivityAgents) container._pinnedActivityAgents = new Set()
  // Helper: walk siblings after an element, stepping out of inline-wrap containers
  function nextLogSibling(el) {
    if (el.nextElementSibling) return el.nextElementSibling
    // If inside an inline-wrap, step out to the wrap's next sibling
    if (el.parentElement?.classList.contains('chat-activity-inline-wrap')) {
      return el.parentElement.nextElementSibling
    }
    return null
  }
  // Check if a user message follows this card (possibly after stepping out of wrap)
  function hasUserMessageAfter(startEl) {
    let next = nextLogSibling(startEl)
    while (next) {
      if (next.classList.contains('chat-line') && next.classList.contains('from-user')) return true
      if (next.classList.contains('chat-activity-card')) return false
      if (next.classList.contains('chat-activity-inline-wrap')) return false
      if (next.classList.contains('chat-line')) { next = next.nextElementSibling; continue }
      next = next.nextElementSibling
    }
    return false
  }
  const cards = log.querySelectorAll('.chat-activity-card')
  // Build set of last card per agent — these are "live" and shouldn't auto-collapse
  const lastCardPerAgent = new Map()
  cards.forEach(card => { lastCardPerAgent.set(card.dataset.agent, card) })
  cards.forEach(card => {
    const agentId = card.dataset.agent
    const isLast = lastCardPerAgent.get(agentId) === card
    // Restore pinned state
    if (container._pinnedActivityAgents.has(agentId)) {
      card.classList.add('pinned')
      card.classList.remove('will-fold', 'collapsed')
    } else if (isLast) {
      // Latest activity card for this agent — keep expanded (live activity)
      card.classList.remove('will-fold', 'collapsed')
    } else {
      if (hasUserMessageAfter(card)) {
        card.classList.add('collapsed')
        card.classList.remove('will-fold')
      }
    }

    // Click to toggle pin
    card.onclick = (e) => {
      e.stopPropagation()
      if (card.classList.contains('pinned')) {
        card.classList.remove('pinned')
        container._pinnedActivityAgents.delete(agentId)
        // Re-evaluate fold
        if (hasUserMessageAfter(card)) card.classList.add('collapsed')
      } else {
        card.classList.add('pinned')
        card.classList.remove('collapsed', 'will-fold')
        container._pinnedActivityAgents.add(agentId)
      }
    }
  })

  // Scroll expanded activity card details to the bottom (show latest activity)
  log.querySelectorAll('.chat-activity-card:not(.collapsed) .activity-detail').forEach(detail => {
    detail.scrollTop = detail.scrollHeight
  })

  // Tool-ref click: scroll to the original tool-run card
  log.querySelectorAll('.tool-ref[data-card-id]').forEach(ref => {
    ref.addEventListener('click', e => {
      e.stopPropagation()
      const cardId = ref.dataset.cardId
      if (!cardId) return
      const target = log.querySelector(`.tool-run-card[data-card-id="${cardId}"]`)
      if (target) {
        // Unfold parent activity card if collapsed
        const activity = target.closest('.chat-activity-card')
        if (activity?.classList.contains('collapsed')) {
          activity.classList.remove('collapsed', 'will-fold')
          activity.classList.add('pinned')
          const aid = activity.dataset.agent
          if (aid) container._pinnedActivityAgents.add(aid)
        }
        target.scrollIntoView({ behavior: 'smooth', block: 'center' })
        target.style.outline = '1px solid var(--yellow)'
        setTimeout(() => { target.style.outline = '' }, 2000)
      }
    })
  })

  // Markdown file cards: click chip to fetch and render inline
  log.querySelectorAll('.md-file-chip').forEach(chip => {
    chip.addEventListener('click', async e => {
      e.stopPropagation()
      const card = chip.closest('.md-file-card')
      if (!card) return
      if (card.classList.contains('expanded')) {
        card.classList.remove('expanded')
        return
      }
      const body = card.querySelector('.md-file-body')
      if (body._loaded) {
        card.classList.add('expanded')
        return
      }
      body.textContent = 'Loading...'
      card.classList.add('expanded')
      try {
        const res = await fetch(`/api/file?path=${encodeURIComponent(card.dataset.path)}`)
        const data = await res.json()
        if (data.error) { body.textContent = data.error; return }
        // File info: short path + sender (from parent chat-line)
        const filePath = card.dataset.path
        const shortPath = filePath.replace(/^\/Users\/\w+\//, '~/')
        const chatLine = card.closest('.chat-line')
        const sender = chatLine?.dataset.msgFrom
        const senderName = sender && state ? agentLabel(state, sender) : ''
        const infoHtml = `<span class="md-file-info">${esc(shortPath)}${senderName ? ' · ' + esc(senderName) : ''}</span>`
        body.innerHTML = infoHtml + renderMarkdown(esc(data.content))
        body._loaded = true
      } catch (err) {
        body.textContent = 'Failed to load: ' + err.message
      }
    })
  })

  // Click any message with nested lists to toggle abbreviated/full
  log.querySelectorAll('.chat-line').forEach(line => {
    if (!line.querySelector('.nested-folded')) return
    line.style.cursor = 'pointer'
    line.addEventListener('click', e => {
      if (e.target.closest('a, code, .chat-ts, .chat-retract, .tool-ref, .shared-doc, .md-file-card')) return
      line.classList.toggle('expanded')
    })
  })

  // Retract button click
  log.querySelectorAll('.chat-retract').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation()
      const ts = btn.dataset.ts
      if (!ts) return
      try {
        const res = await fetch('/api/retract', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ timestamp: ts, from: 'web' }),
        })
        if (res.ok) {
          const line = btn.closest('.chat-line')
          if (line) { line.style.opacity = '0.3'; line.style.textDecoration = 'line-through' }
          btn.remove()
        }
      } catch {}
    })
  })

  // Message drag (from timestamp) and shift-click selection
  log.querySelectorAll('.chat-line .chat-ts[draggable]').forEach(ts => {
    ts.addEventListener('dragstart', e => {
      const line = ts.closest('.chat-line')
      if (!line) return
      // Collect selected messages or just this one
      const selected = log.querySelectorAll('.chat-line.msg-selected')
      const lines = selected.length > 0 && line.classList.contains('msg-selected')
        ? [...selected] : [line]
      const payload = lines.map(l => {
        const nick = l.querySelector('.chat-nick')?.textContent?.replace(/[→:]/g, ' ').trim() || ''
        const ts = l.querySelector('.chat-ts')?.textContent || ''
        // Get plain text content (strip HTML)
        const clone = l.cloneNode(true)
        clone.querySelectorAll('.chat-ts, .chat-nick, .chat-retract').forEach(el => el.remove())
        const text = clone.textContent.trim()
        return `[${ts}] ${nick}: ${text}`
      }).join('\n')
      e.dataTransfer.setData('text/plain', payload)
      e.dataTransfer.setData('application/x-chat-attachment', JSON.stringify({
        type: 'messages',
        count: lines.length,
        snippet: payload.slice(0, 200),
        source: 'chat'
      }))
      e.dataTransfer.effectAllowed = 'copy'
    })
  })
  // Shift-click to select range, click to toggle single
  log.querySelectorAll('.chat-line[data-msg-ts]').forEach(line => {
    line.addEventListener('click', e => {
      if (e.target.closest('.chat-retract, a, .tool-ref, .shared-doc, code')) return
      if (!e.target.closest('.chat-ts')) return // only select via timestamp click
      if (e.altKey && container._lastClickedMsg) {
        // Range select
        const all = [...log.querySelectorAll('.chat-line[data-msg-ts]')]
        const startIdx = all.indexOf(container._lastClickedMsg)
        const endIdx = all.indexOf(line)
        if (startIdx >= 0 && endIdx >= 0) {
          const [lo, hi] = startIdx < endIdx ? [startIdx, endIdx] : [endIdx, startIdx]
          all.forEach((l, i) => l.classList.toggle('msg-selected', i >= lo && i <= hi))
        }
      } else {
        line.classList.toggle('msg-selected')
        if (!line.classList.contains('msg-selected')) {
          // Deselected — clear all
          log.querySelectorAll('.chat-line.msg-selected').forEach(l => l.classList.remove('msg-selected'))
        }
      }
      container._lastClickedMsg = line
    })
  })

  if (container._autoScroll !== false && log.scrollHeight > 0) {
    // Mark messages as seen per-agent when auto-scrolled to bottom (user is watching)
    const userId = state?.user || 'user'
    const userAliases = ['web', 'skip', 'human', 'user', userId]
    const toUser = filtered.filter(m => userAliases.includes(m.to))
    for (const m of toUser) {
      if (m.from) setAgentSeenTs(m.from, m.timestamp)
    }
  }

  const input = container.querySelector('.chat-input')
  if (input) {
    // Playback typing animation — show text being typed in input box
    if (typingForThis != null) {
      input.value = typingForThis
      input.style.color = 'var(--text)'
      input.placeholder = ''
    } else if (container._streamSource) {
      input.value = ''
      input.placeholder = ''
    } else {
      input.placeholder = ''
    }
    // Show agent status indicator (compacting / unreachable)
    const statusEl = container.querySelector('.chat-input-status')
    if (statusEl && !container._terminalMode) {
      const target = container._chatTarget
      const targetAgent = target ? (state.agents || []).find(a => a.id === target) : null
      // Status indicators now rendered as inline chat lines, not input overlay
      statusEl.textContent = ''
      statusEl.style.color = ''
    }
    // Update ghost target pill (right-aligned inside textarea)
    const ghost = container.querySelector('.chat-target-ghost')
    if (ghost) {
      const target = container._chatTarget
      const dnf = container._labelFilter && container._labelFilter.length > 0 ? container._labelFilter : null
      const inputVal = input.value || ''
      // Mode prefix for pill
      let modePrefix = ''
      if (container._queueMode) modePrefix = '<span style="color:var(--cyan)">queue</span> '
      else if (container._interruptMode) modePrefix = '<span style="color:var(--orange)">interrupt</span> '
      ghost.classList.toggle('has-mode', !!(container._queueMode || container._interruptMode))
      if (target) {
        const label = agentLabel(state, target)
        const agent = (state.agents || []).find(a => a.id === target)
        const cls = getNickClass(target, state)
        ghost.innerHTML = `${modePrefix}<span class="${cls}">→ ${esc(label)}</span>`
        ghost.classList.toggle('hidden', inputVal.length > 30)
      } else if (dnf) {
        const matching = (state.agents || []).filter(a => agentMatchesDnf(container._labelFilter, a))
        const expr = dnf.map(g => g.join(' & ')).join(' | ')
        const countSuffix = matching.length > 1 ? ` (${matching.length})` : ''
        ghost.innerHTML = `${modePrefix}<span style="color:var(--blue)">→ ${esc(expr)}${countSuffix}</span>`
        ghost.classList.toggle('hidden', inputVal.length > 30)
      } else {
        ghost.innerHTML = modePrefix || ''
        ghost.classList.toggle('hidden', !modePrefix)
      }
    }
  }


  // Render filter expression and picker
  renderFilterExpression(container, params)
  const picker = container.querySelector('.label-picker')
  if (picker?.classList.contains('open')) renderLabelPicker(container, params)
}

function createAgentsWidget(container, params) {
  container._agentSort = { col: 'seen', asc: true } // default: most recently seen first
  container._foldState = new Map() // managerId -> boolean (true = folded)
  container.innerHTML = '<div class="agents-list"></div>'
}

function updateAgentsWidget(container, params, state) {
  const list = container.querySelector('.agents-list')
  if (!list) return
  // Clean up orphaned hover previews (left behind when agents table re-renders mid-hover)
  document.querySelectorAll('.agent-terminal-preview').forEach(el => el.remove())
  // Skip re-render during active or pending drag to preserve pointer capture
  if (dragLabel || dragAgent || dragGhost || _preDrag || container._resizing) return
  // Hash-based skip: only rebuild if agents, tasks, or messages materially changed
  const agents0 = state.agents || []
  const hasSleep = agents0.some(a => a._sleep)
  const sleepTick = hasSleep ? Math.floor(Date.now() / 1000) : 0
  const agentHash = agents0.map(a => a.id + ':' + (a.friendly_name || '') + ':' + (a.labels?.join(',') || '') + ':' + (a.context_pct ?? '') + ':' + (a.compacting ? 'C' : '') + ':' + (a._sleep?.until || '')).join('|') + ':' + sleepTick
  const taskHash = (state.tasks || []).filter(t => t.status !== 'done').map(t => t.agent + ':' + t.status + ':' + (t.description || '').slice(0, 30)).join('|')
  const seenHash = Object.keys(chatSeenByAgent).sort().map(k => k.slice(0,8) + ':' + chatSeenByAgent[k]).join(',')
  const msgHash = (state.messages || []).length + ':' + selectedAgent + ':' + seenHash
  const foldHash = [...(container._foldState || new Map()).entries()].map(([k,v]) => k.slice(0,8) + ':' + v).join(',')
  const fullHash = agentHash + '||' + taskHash + '||' + msgHash + '||' + foldHash
  if (list._agentsHash === fullHash) return
  list._agentsHash = fullHash
  const sort = container._agentSort || { col: 'seen', asc: true }
  const userId = state?.user || 'user'
  const userAliases = new Set(['web', 'skip', 'human', 'user', userId])
  const agents = (state.agents || []).slice().map(a => {
    const name = a.friendly_name || a.name || a.id?.substring(0, 8)
    const ago = a.last_seen ? Math.floor((Date.now() - new Date(a.last_seen).getTime()) / 1000) : Infinity
    const allTasks = (state.tasks || []).filter(t => t.agent === a.id && t.status !== 'done')
    const realTask = allTasks.find(t => !t.synthetic)
    const syntheticTask = allTasks.find(t => t.synthetic)
    const task = realTask || syntheticTask || null
    // Unseen messages FROM this agent TO the user (newer than per-agent seen ts)
    const unseenMsgs = (state.messages || []).filter(m => m.from === a.id && userAliases.has(m.to) && m.timestamp > getAgentSeenTs(a.id))
    return { ...a, _name: name, _ago: ago, _task: task, _allTasks: allTasks, _syntheticTask: syntheticTask, _unseen: unseenMsgs.length, _unseenMsgs: unseenMsgs }
  })

  // Sort
  const cmp = (a, b) => {
    let v = 0
    if (sort.col === 'name') v = a._name.localeCompare(b._name)
    else if (sort.col === 'seen') v = a._ago - b._ago
    else if (sort.col === 'ctx') v = (a.context_pct ?? -1) - (b.context_pct ?? -1)
    else if (sort.col === 'task') v = (a._task?.description || '').localeCompare(b._task?.description || '')
    else if (sort.col === 'labels') v = (a.labels || []).join(',').localeCompare((b.labels || []).join(','))
    return sort.asc ? v : -v
  }
  agents.sort(cmp)

  // Build team relationships from delegated_by
  const foldState = container._foldState || new Map()
  const teams = new Map() // managerId -> [agent enriched objects]
  const assigned = new Set()
  const activeTasks = (state.tasks || []).filter(t => t.status !== 'done')
  for (const t of activeTasks) {
    if (!t.delegated_by) continue
    const manager = agents.find(a => a.id === t.delegated_by && a.is_manager)
    if (!manager) continue
    const member = agents.find(a => a.id === t.agent)
    if (!member || member.id === manager.id) continue
    if (!teams.has(manager.id)) teams.set(manager.id, [])
    if (!teams.get(manager.id).find(m => m.id === member.id)) {
      teams.get(manager.id).push(member)
      assigned.add(member.id)
    }
  }

  // Re-sort with team grouping: managers first, then their teams, then unaffiliated
  const sorted = []
  const managersWithTeams = agents.filter(a => teams.has(a.id))
  const unaffiliated = agents.filter(a => !teams.has(a.id) && !assigned.has(a.id))
  for (const mgr of managersWithTeams) {
    mgr._isTeamLead = true
    mgr._isFolded = foldState.get(mgr.id) || false
    sorted.push(mgr)
    const members = teams.get(mgr.id) || []
    members.sort(cmp)
    for (const m of members) {
      m._isTeamMember = true
      m._teamLeadId = mgr.id
      m._hidden = mgr._isFolded
      sorted.push(m)
    }
  }
  // Managers without teams
  for (const a of agents) {
    if (a.is_manager && !teams.has(a.id) && !assigned.has(a.id) && !sorted.includes(a)) {
      sorted.push(a)
    }
  }
  for (const a of unaffiliated) {
    if (!sorted.includes(a)) sorted.push(a)
  }

  // When a manager is folded, sum up team member unseen counts
  for (const mgr of managersWithTeams) {
    if (mgr._isFolded) {
      const members = teams.get(mgr.id) || []
      const teamUnseen = members.reduce((sum, m) => sum + m._unseen, 0)
      if (teamUnseen > 0) mgr._teamUnseen = teamUnseen
    }
  }

  // Use sorted order for rendering
  const displayAgents = sorted

  // Check for duplicate kitty windows (stale registrations)
  const winMap = new Map()
  for (const a of agents) {
    if (a.kitty_win) {
      if (!winMap.has(a.kitty_win)) winMap.set(a.kitty_win, [])
      winMap.get(a.kitty_win).push(a._name)
    }
  }
  const dupes = [...winMap.entries()].filter(([, names]) => names.length > 1)
  const warnings = dupes.map(([win, names]) =>
    `<div style="background:var(--orange)20;color:var(--orange);padding:4px 8px;font-size:11px;border-radius:3px;margin-bottom:4px">
      ⚠ kitty:${win} shared by: ${names.join(', ')} — stale registration?
    </div>`
  ).join('')

  const arrow = (col) => sort.col === col ? `<span class="sort-arrow">${sort.asc ? '▲' : '▼'}</span>` : ''
  const resizeHandle = '<span class="col-resize"></span>'

  const rows = displayAgents.filter(a => !a._hidden).map(a => {
    const active = isActive(a)
    const compacting = a.compacting
    const dotClass = compacting ? 'compacting' : a._ago < 120 ? 'fresh' : a._ago < 600 ? 'stale' : 'dead'
    const seenText = a._ago === Infinity ? '' : a._ago < 60 ? `${a._ago}s` : a._ago < 3600 ? `${Math.floor(a._ago/60)}m` : `${Math.floor(a._ago/3600)}h`
    const dotTip = compacting ? 'Compacting context — agent is temporarily unavailable'
      : a._ago === Infinity ? 'No heartbeat — MCP may not be connected'
      : a._ago < 120 ? `Active — last MCP call ${seenText} ago`
      : a._ago < 600 ? `Stale — last MCP call ${seenText} ago`
      : `Dead — last MCP call ${seenText} ago`
    const badges = []
    if (compacting) {
      badges.push(`<span class="agent-badge compacting-badge">compacting...</span>`)
    }
    if (a._sleep) {
      const remaining = Math.max(0, Math.ceil((new Date(a._sleep.until) - Date.now()) / 1000))
      const sleepText = a._sleep.reason ? `waiting ${remaining}s for ${a._sleep.reason}` : `waiting ${remaining}s`
      badges.push(`<span class="agent-badge" style="color:var(--text-dim);opacity:0.6">${esc(sleepText)}</span>`)
    }
    if (a._task && !a._task.synthetic) {
      const leadsMatch = a._task.description?.match(/^leads?\s+([\w-]+)$/i)
      if (leadsMatch) {
        const teamLabel = leadsMatch[1].trim()
        badges.push(`<span class="label-chip leads-team" data-label="${esc(teamLabel)}" data-team-label="${esc(teamLabel)}" style="color:var(--text-dim);opacity:0.5;cursor:default">leads <span style="color:${labelColor(teamLabel)}">${esc(teamLabel)}</span></span>`)
      } else {
        badges.push(`<span class="agent-badge">${esc(a._task.description?.substring(0, 30) || 'working')}</span>`)
      }
    } else if (a._task?.synthetic) {
      // Only synthetic task, no real task — already shown as msg badge above, skip text
    }
    // Task list tooltip (hover on task cell shows all tasks)
    const taskTooltipHtml = a._allTasks.length > 1 ? a._allTasks.map(t => {
      const status = t.status || 'unknown'
      const syn = t.synthetic ? ' (msg)' : ''
      return `<div style="padding:2px 0;font-size:11px"><span class="task-status ${status}" style="font-size:9px;padding:1px 4px">${status}</span> ${esc(t.description || '')}${syn}</div>`
    }).join('') : ''
    const labelChips = (a.labels || []).map(l => {
      const c = labelColor(l)
      return `<span class="label-chip" data-label="${esc(l)}" style="color:${c};opacity:0.5">${esc(l)}<span class="label-x">×</span></span>`
    }).join('')
    const sel = selectedAgent === a.id ? 'background:rgba(147,112,219,0.1);' : ''
    const rowOpacity = !active ? 'opacity:0.45;' : a._isTeamMember ? 'opacity:0.85;' : ''
    const indent = a._isTeamMember ? 'padding-left:24px;' : ''
    const foldToggle = a._isTeamLead ? `<span class="team-fold-toggle" data-manager-id="${esc(a.id)}" style="cursor:pointer;opacity:0.4;margin-right:3px;font-size:10px">${a._isFolded ? '▸' : '▾'}</span>` : ''
    const teamUnseenBadge = a._teamUnseen ? `<span class="agent-msg-badge" style="opacity:0.6;margin-left:2px" title="${a._teamUnseen} unseen from team">+${a._teamUnseen}</span>` : ''
    return `<tr class="agent-item${a._isTeamMember ? ' team-member' : ''}${a._isTeamLead ? ' team-lead' : ''}" style="${sel}${rowOpacity}" data-agent-id="${esc(a.id)}"${a._teamLeadId ? ` data-team-lead="${esc(a._teamLeadId)}"` : ''}>
      <td style="${indent}">${foldToggle}<span class="agent-name ${getNickClass(a.id, state)}" data-agent-label="${esc(a._name)}">${esc(a._name)}</span>${a._ago < 30 ? '<span class="agent-working-icon" title="Working">&gt;_</span>' : ''}${teamUnseenBadge}${a._unseen ? `<span class="agent-msg-badge" draggable="true" data-agent-id="${esc(a.id)}" data-agent-name="${esc(a._name)}">${a._unseen}<span class="agent-msg-tooltip"><div class="agent-msg-tooltip-inner">${a._unseenMsgs.map(m => {
        const t = new Date(m.timestamp)
        const timeStr = t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
        const fromNick = agentLabel(state, m.from)
        const toNick = agentLabel(state, m.to)
        const fromCls = getNickClass(m.from, state)
        const toCls = getNickClass(m.to, state)
        return `<div class="msg-item"><div class="msg-header"><span class="msg-nick"><span class="${fromCls}">${esc(fromNick)}</span><span style="color:var(--text-dim)">&rarr;</span><span class="${toCls}">${esc(toNick)}</span></span><span class="msg-time">${timeStr}</span></div><div class="msg-text">${renderMarkdown(esc(m.text || ''))}</div></div>`
      }).join('')}</div></span></span>` : ''}</td>
      <td><span class="agent-seen ${dotClass}" title="${dotTip}">${seenText}</span></td>
      <td class="agent-ctx-cell">${a.context_pct != null ? `<span class="agent-ctx" style="opacity:${a.context_pct > 80 ? '0.9' : a.context_pct > 60 ? '0.6' : '0.4'}">${a.context_pct}%</span>` : ''}</td>
      <td class="agent-msg-col">${a._syntheticTask ? `<span class="agent-msg-task-badge">${(() => { const n = parseInt(a._syntheticTask.description?.match(/(\d+)\s+message/)?.[1]) || 1; return n > 1 ? `<span style="opacity:0.4;font-size:9px">${n}×</span>` : '' })()}✉<span class="agent-msg-task-tooltip"><div class="agent-msg-tooltip-inner">${(() => { const msgs = (state.messages || []).filter(m => m.to === a.id && !m.read); return msgs.slice(-5).map(m => { const fromNick = agentLabel(state, m.from); const fromCls = getNickClass(m.from, state); const t = new Date(m.timestamp); const timeStr = t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); return `<div class="msg-item"><div class="msg-header"><span class="msg-nick"><span class="${fromCls}">${esc(fromNick)}</span></span><span class="msg-time">${timeStr}</span></div><div class="msg-text">${renderMarkdown(esc(m.text?.slice(0, 150) || ''))}</div></div>` }).join('') || '<div style="color:var(--text-dim);font-size:11px">No pending messages</div>' })()}</div></span></span>` : `<span class="agent-msg-task-badge" style="visibility:hidden">0✉</span>`}</td>
      <td class="agent-task-cell" style="position:relative">${badges.join(' ')}${!a._task && a.last_action ? `<span class="agent-last-action" title="${esc(a.last_action)}">${esc(a.last_action.substring(0, 40))}</span>` : ''}${taskTooltipHtml ? `<div class="agent-task-tooltip">${taskTooltipHtml}</div>` : ''}</td>
      <td><span style="display:flex;flex-wrap:wrap;gap:2px;align-items:center">${labelChips}<span class="label-add-btn" title="Add label">+</span></span></td>
    </tr>`
  }).join('')

  list.innerHTML = warnings + `<table class="agents-table">
    <thead><tr>
      <th data-sort="name">Name${arrow('name')}${resizeHandle}</th>
      <th data-sort="seen">Seen${arrow('seen')}${resizeHandle}</th>
      <th data-sort="ctx">Ctx${arrow('ctx')}${resizeHandle}</th>
      <th class="agent-msg-col-header" style="width:24px;padding:0"></th>
      <th data-sort="task">Task${arrow('task')}${resizeHandle}</th>
      <th data-sort="labels">Labels${arrow('labels')}</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`

  // Badge hover: mark messages as seen
  list.querySelectorAll('.agent-msg-badge').forEach(badge => {
    const tooltip = badge.querySelector('.agent-msg-tooltip')
    if (!tooltip) return
    let hoverTimeout = null
    const showTooltip = () => {
      const rect = badge.getBoundingClientRect()
      tooltip.style.left = rect.left + 'px'
      tooltip.style.top = (rect.bottom) + 'px'
      // Clamp to viewport
      tooltip.classList.add('visible')
      const tRect = tooltip.getBoundingClientRect()
      if (tRect.right > window.innerWidth) tooltip.style.left = (window.innerWidth - tRect.width - 8) + 'px'
      if (tRect.bottom > window.innerHeight) {
        tooltip.style.top = (rect.top - tRect.height) + 'px'
      }
    }
    const hideTooltip = () => {
      clearTimeout(hoverTimeout)
      hoverTimeout = setTimeout(() => {
        tooltip.classList.remove('visible')
        // Mark this agent's messages as seen after reading
        const agentId = badge.dataset.agentId
        if (agentId) {
          const agentMsgs = (state.messages || []).filter(m => m.from === agentId && m.timestamp > getAgentSeenTs(agentId))
          if (agentMsgs.length > 0) {
            const latest = agentMsgs.reduce((max, m) => m.timestamp > max ? m.timestamp : max, getAgentSeenTs(agentId))
            setAgentSeenTs(agentId, latest)
          }
          badge.style.opacity = '0.3'
          updateTabBadges(state)
        }
      }, 150)
    }
    badge.addEventListener('mouseenter', showTooltip)
    badge.addEventListener('mouseleave', hideTooltip)
    tooltip.addEventListener('mouseenter', () => clearTimeout(hoverTimeout))
    tooltip.addEventListener('mouseleave', hideTooltip)
  })

  // Sort header clicks
  list.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.sort
      if (sort.col === col) sort.asc = !sort.asc
      else { sort.col = col; sort.asc = true }
      container._agentSort = sort
      updateAgentsWidget(container, params, state)
    })
  })

  // Column resize drag handles — persist widths across re-renders
  const colWidths = container._colWidths || {}
  const table = list.querySelector('.agents-table')
  const ths = list.querySelectorAll('th[data-sort]')
  if (Object.keys(colWidths).length && table) {
    table.style.tableLayout = 'fixed'
  }
  ths.forEach(th => {
    const col = th.dataset.sort
    if (colWidths[col]) th.style.width = colWidths[col]
  })
  list.querySelectorAll('.col-resize').forEach(handle => {
    // Block clicks from bubbling to sort handler
    handle.addEventListener('click', (e) => { e.stopPropagation(); e.preventDefault() })
    handle.addEventListener('mousedown', (e) => {
      e.preventDefault()
      e.stopPropagation()
      const th = handle.parentElement
      const col = th.dataset.sort
      const tbl = th.closest('table')
      // Snapshot all column widths before switching to fixed layout
      const allThs = tbl.querySelectorAll('th[data-sort]')
      const snapWidths = []
      allThs.forEach(t => snapWidths.push([t, t.offsetWidth]))
      tbl.style.tableLayout = 'fixed'
      snapWidths.forEach(([t, w]) => { t.style.width = w + 'px' })
      const startX = e.clientX
      const startW = th.offsetWidth
      // Pause re-renders during drag
      container._resizing = true
      document.body.style.cursor = 'col-resize'
      document.body.style.userSelect = 'none'
      const onMove = (me) => {
        me.preventDefault()
        const newW = Math.max(30, startW + (me.clientX - startX))
        th.style.width = newW + 'px'
        if (col) { container._colWidths = container._colWidths || {}; container._colWidths[col] = newW + 'px' }
      }
      const onUp = () => {
        container._resizing = false
        document.body.style.cursor = ''
        document.body.style.userSelect = ''
        // Save all current widths so they persist across re-renders
        allThs.forEach(t => {
          const c = t.dataset.sort
          if (c) { container._colWidths = container._colWidths || {}; container._colWidths[c] = t.style.width }
        })
        document.removeEventListener('mousemove', onMove)
        document.removeEventListener('mouseup', onUp)
      }
      document.addEventListener('mousemove', onMove)
      document.addEventListener('mouseup', onUp)
    })
  })

  // Team fold toggles
  list.querySelectorAll('.team-fold-toggle').forEach(toggle => {
    toggle.addEventListener('click', (e) => {
      e.stopPropagation()
      const managerId = toggle.dataset.managerId
      const current = foldState.get(managerId) || false
      foldState.set(managerId, !current)
      container._foldState = foldState
      list._agentsHash = '' // force re-render
      updateAgentsWidget(container, params, state)
    })
  })

  // Agent name hover: mini chat preview (recent messages to/from this agent)
  list.querySelectorAll('.agent-name').forEach(nameEl => {
    let previewEl = null
    let hoverTimer = null
    const row = nameEl.closest('.agent-item')
    if (!row) return
    nameEl.addEventListener('mouseenter', (e) => {
      const agentId = row.dataset.agentId
      if (!agentId) return
      hoverTimer = setTimeout(() => {
        const allMsgs = (state.messages || []).filter(m =>
          (m.from === agentId || m.to === agentId) && !m._activity
        )
        const recent = allMsgs.slice(-6)
        if (!recent.length) return
        const agent = (state.agents || []).find(a => a.id === agentId)
        const label = agent?.friendly_name || agent?.name || agentId.substring(0, 8)
        const msgHtml = recent.map(m => {
          const fromNick = agentLabel(state, m.from)
          const toNick = agentLabel(state, m.to)
          const fromCls = getNickClass(m.from, state)
          const toCls = getNickClass(m.to, state)
          const t = new Date(m.timestamp)
          const timeStr = t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
          const text = m.text ? renderMarkdown(esc(m.text.length > 200 ? m.text.slice(0, 200) + '…' : m.text)) : ''
          return `<div class="atp-msg"><span class="${fromCls}" style="font-weight:500">${esc(fromNick)}</span><span style="color:var(--text-dim)">&rarr;</span><span class="${toCls}" style="font-weight:500">${esc(toNick)}</span> <span style="color:var(--text-dim);font-size:9px">${timeStr}</span><div style="margin-top:1px">${text}</div></div>`
        }).join('')
        previewEl = document.createElement('div')
        previewEl.className = 'agent-terminal-preview agent-chat-preview'
        previewEl.innerHTML = msgHtml
        document.body.appendChild(previewEl)
        const rect = nameEl.getBoundingClientRect()
        previewEl.style.left = (rect.right + 8) + 'px'
        previewEl.style.top = rect.top + 'px'
        const pRect = previewEl.getBoundingClientRect()
        if (pRect.right > window.innerWidth - 8) previewEl.style.left = (rect.left - pRect.width - 8) + 'px'
        if (pRect.left < 8) previewEl.style.left = '8px'
        if (pRect.bottom > window.innerHeight - 8) previewEl.style.top = (window.innerHeight - pRect.height - 8) + 'px'
        if (pRect.top < 8) previewEl.style.top = '8px'
      }, 300)
    })
    nameEl.addEventListener('mouseleave', () => {
      clearTimeout(hoverTimer)
      if (previewEl) { previewEl.remove(); previewEl = null }
    })
  })

  // Working icon hover: mini activity card preview
  list.querySelectorAll('.agent-working-icon').forEach(icon => {
    let previewEl = null
    let hoverTimer = null
    const row = icon.closest('.agent-item')
    if (!row) return
    icon.addEventListener('mouseenter', (e) => {
      const agentId = row.dataset.agentId
      if (!agentId) return
      hoverTimer = setTimeout(() => {
        fetchSessionLite(agentId)
        const evts = getActivityEvents(agentId)
        if (!evts.length) return
        // Show last ~8 tool steps, same format as inline activity cards
        const toolEvts = evts.filter(e => e._activity && e._toolName).slice(-8)
        if (!toolEvts.length) return
        const agent = (state.agents || []).find(a => a.id === agentId)
        const label = agent?.friendly_name || agent?.name || agentId.substring(0, 8)
        const steps = dedupTools(toolEvts).map(t => {
          const detail = t._toolDetail ? `<div style="color:var(--text-dim);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px">${esc(t._toolDetail)}</div>` : ''
          return `<div class="tool-step"><span style="color:var(--text)">${esc(t._toolName)}</span>${t._toolArg ? ` <span style="color:var(--text-dim);overflow:hidden;text-overflow:ellipsis">${esc(t._toolArg)}</span>` : ''}${detail}</div>`
        }).join('')
        const lastEvt = toolEvts[toolEvts.length - 1]
        const ctxPct = lastEvt?._ctxPct != null ? `<span class="activity-ctx">${lastEvt._ctxPct}%</span>` : ''
        previewEl = document.createElement('div')
        previewEl.className = 'agent-terminal-preview'
        previewEl.style.padding = '0'
        previewEl.innerHTML = `<div class="chat-activity-card" style="margin:0;border:none">
          <div class="activity-header"><span class="activity-agent ${getNickClass(agentId, state)}">${esc(label)}</span>${ctxPct}</div>
          <div class="activity-detail" style="max-height:250px">${steps}</div>
        </div>`
        document.body.appendChild(previewEl)
        const rect = icon.getBoundingClientRect()
        previewEl.style.left = (rect.right + 8) + 'px'
        previewEl.style.top = rect.top + 'px'
        const pRect = previewEl.getBoundingClientRect()
        if (pRect.right > window.innerWidth - 8) previewEl.style.left = (rect.left - pRect.width - 8) + 'px'
        if (pRect.left < 8) previewEl.style.left = '8px'
        if (pRect.bottom > window.innerHeight - 8) previewEl.style.top = (window.innerHeight - pRect.height - 8) + 'px'
        if (pRect.top < 8) previewEl.style.top = '8px'
      }, 300)
    })
    icon.addEventListener('mouseleave', () => {
      clearTimeout(hoverTimer)
      if (previewEl) { previewEl.remove(); previewEl = null }
    })
  })

  // Label chip drag from agents list
  list.querySelectorAll('.label-chip').forEach(chip => {
    chip.style.touchAction = 'none' // required for pointer capture
    chip.addEventListener('pointerdown', (e) => {
      e.preventDefault()
      _preDrag = true  // block widget re-renders until drag resolves
      chip.setPointerCapture(e.pointerId)
      const startX = e.clientX, startY = e.clientY
      const onMove = (me) => {
        if (Math.abs(me.clientX - startX) > 4 || Math.abs(me.clientY - startY) > 4) {
          chip.releasePointerCapture(e.pointerId)
          const agentId = chip.closest('.agent-item')?.dataset.agentId
          startLabelDrag(me, chip.dataset.label, agentId)
          chip.removeEventListener('pointermove', onMove)
          chip.removeEventListener('pointerup', onUp)
        }
      }
      const onUp = () => {
        _preDrag = false
        chip.removeEventListener('pointermove', onMove)
        chip.removeEventListener('pointerup', onUp)
      }
      chip.addEventListener('pointermove', onMove)
      chip.addEventListener('pointerup', onUp)
    })
  })

  // Label × click — remove label from agent
  list.querySelectorAll('.label-x').forEach(x => {
    x.addEventListener('pointerdown', (e) => { e.stopPropagation(); e.preventDefault() })
    x.addEventListener('click', async (e) => {
      e.stopPropagation()
      const chip = x.closest('.label-chip')
      const agentId = x.closest('.agent-item')?.dataset.agentId
      if (!chip || !agentId) return
      const label = chip.dataset.label
      const agent = currentState?.agents?.find(a => a.id === agentId)
      if (!agent) return
      const newLabels = (agent.labels || []).filter(l => l !== label)
      try { await fetch('/api/label', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ agent: agentId, labels: newLabels }) }) } catch {}
    })
  })

  // Label + button — inline add with ghost-text autocomplete
  list.querySelectorAll('.label-add-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation()
      const agentId = btn.closest('.agent-item')?.dataset.agentId
      if (!agentId) return
      const wrap = document.createElement('span')
      wrap.className = 'label-add-wrap'
      const ghost = document.createElement('span')
      ghost.className = 'label-add-ghost'
      const inp = document.createElement('input')
      inp.type = 'text'
      inp.autocomplete = 'off'
      wrap.appendChild(ghost)
      wrap.appendChild(inp)
      btn.replaceWith(wrap)
      inp.focus()

      // Collect all labels across all agents for autocomplete
      const allLabels = [...new Set((currentState?.agents || []).flatMap(a => a.labels || []))]
      const agent = currentState?.agents?.find(a => a.id === agentId)
      const agentLabels = agent?.labels || []

      function updateGhost() {
        const typed = inp.value
        if (!typed) { ghost.innerHTML = ''; return }
        const lower = typed.toLowerCase()
        const match = allLabels.find(l => l.toLowerCase().startsWith(lower) && l.toLowerCase() !== lower && !agentLabels.includes(l))
        if (match) {
          ghost.innerHTML = `<span class="ghost-typed">${esc(typed)}</span><span class="ghost-completion">${esc(match.substring(typed.length))}</span>`
        } else {
          ghost.innerHTML = ''
        }
      }

      inp.addEventListener('input', updateGhost)

      let finished = false
      const finish = async (save) => {
        if (finished) return
        finished = true
        let label = inp.value.trim()
        if (save && label) {
          // Accept ghost suggestion if it matches
          const lower = label.toLowerCase()
          const match = allLabels.find(l => l.toLowerCase().startsWith(lower) && !agentLabels.includes(l))
          if (match && match.toLowerCase().startsWith(lower)) label = match.toLowerCase() === lower ? match : label
          if (!agentLabels.includes(label)) {
            const newLabels = [...agentLabels, label]
            try { await fetch('/api/label', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ agent: agentId, labels: newLabels }) }) } catch {}
          }
        }
        // Remove inline input, restore + button
        const newBtn = document.createElement('span')
        newBtn.className = 'label-add-btn'
        newBtn.title = 'Add label'
        newBtn.textContent = '+'
        wrap.replaceWith(newBtn)
      }

      inp.addEventListener('keydown', (ke) => {
        if (ke.key === 'Enter') { ke.preventDefault(); finish(true) }
        if (ke.key === 'Escape') { ke.preventDefault(); finish(false) }
        if (ke.key === 'Tab' && ghost.textContent) {
          ke.preventDefault()
          const lower = inp.value.toLowerCase()
          const match = allLabels.find(l => l.toLowerCase().startsWith(lower) && !agentLabels.includes(l))
          if (match) { inp.value = match; ghost.innerHTML = '' }
        }
      })
      inp.addEventListener('blur', () => finish(true))
    })
  })

  // Label × click — remove label from agent
  list.querySelectorAll('.label-x').forEach(x => {
    x.addEventListener('pointerdown', (e) => { e.stopPropagation(); e.preventDefault() })
    x.addEventListener('click', async (e) => {
      e.stopPropagation()
      const chip = x.closest('.label-chip')
      const agentId = x.closest('.agent-item')?.dataset.agentId
      if (!chip || !agentId) return
      const label = chip.dataset.label
      const agent = currentState?.agents?.find(a => a.id === agentId)
      if (!agent) return
      const newLabels = (agent.labels || []).filter(l => l !== label)
      try { await fetch('/api/label', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ agent: agentId, labels: newLabels }) }) } catch {}
    })
  })

  // Label + button — inline add with ghost-text autocomplete
  list.querySelectorAll('.label-add-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation()
      const agentId = btn.closest('.agent-item')?.dataset.agentId
      if (!agentId) return
      const wrap = document.createElement('span')
      wrap.className = 'label-add-wrap'
      const ghost = document.createElement('span')
      ghost.className = 'label-add-ghost'
      const inp = document.createElement('input')
      inp.type = 'text'
      inp.autocomplete = 'off'
      wrap.appendChild(ghost)
      wrap.appendChild(inp)
      btn.replaceWith(wrap)
      inp.focus()

      // Collect all labels across all agents for autocomplete
      const allLabels = [...new Set((currentState?.agents || []).flatMap(a => a.labels || []))]
      const agent = currentState?.agents?.find(a => a.id === agentId)
      const agentLabels = agent?.labels || []

      function updateGhost() {
        const typed = inp.value
        if (!typed) { ghost.innerHTML = ''; return }
        const lower = typed.toLowerCase()
        const match = allLabels.find(l => l.toLowerCase().startsWith(lower) && l.toLowerCase() !== lower && !agentLabels.includes(l))
        if (match) {
          ghost.innerHTML = `<span class="ghost-typed">${esc(typed)}</span><span class="ghost-completion">${esc(match.substring(typed.length))}</span>`
        } else {
          ghost.innerHTML = ''
        }
      }

      inp.addEventListener('input', updateGhost)

      let finished = false
      const finish = async (save) => {
        if (finished) return
        finished = true
        let label = inp.value.trim()
        if (save && label) {
          const lower = label.toLowerCase()
          const match = allLabels.find(l => l.toLowerCase().startsWith(lower) && !agentLabels.includes(l))
          if (match && match.toLowerCase().startsWith(lower)) label = match.toLowerCase() === lower ? match : label
          if (!agentLabels.includes(label)) {
            const newLabels = [...agentLabels, label]
            try { await fetch('/api/label', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ agent: agentId, labels: newLabels }) }) } catch {}
          }
        }
        const newBtn = document.createElement('span')
        newBtn.className = 'label-add-btn'
        newBtn.title = 'Add label'
        newBtn.textContent = '+'
        wrap.replaceWith(newBtn)
      }

      inp.addEventListener('keydown', (ke) => {
        if (ke.key === 'Enter') { ke.preventDefault(); finish(true) }
        if (ke.key === 'Escape') { ke.preventDefault(); finish(false) }
        if (ke.key === 'Tab' && ghost.textContent) {
          ke.preventDefault()
          const lower = inp.value.toLowerCase()
          const match = allLabels.find(l => l.toLowerCase().startsWith(lower) && !agentLabels.includes(l))
          if (match) { inp.value = match; ghost.innerHTML = '' }
        }
      })
      inp.addEventListener('blur', () => finish(true))
    })
  })

  // Double-click agent name to rename
  list.querySelectorAll('.agent-name').forEach(nameEl => {
    nameEl.addEventListener('dblclick', (e) => {
      e.stopPropagation()
      const agentId = nameEl.closest('.agent-item')?.dataset.agentId
      if (!agentId) return
      const oldName = nameEl.textContent
      const inp = document.createElement('input')
      inp.type = 'text'
      inp.value = oldName
      inp.style.cssText = 'background:var(--bg);color:var(--text);border:1px solid var(--accent);border-radius:3px;padding:1px 4px;font:inherit;width:' + Math.max(80, nameEl.offsetWidth + 20) + 'px'
      nameEl.replaceWith(inp)
      inp.focus()
      inp.select()
      let finished = false
      const finish = async (save) => {
        if (finished) return
        finished = true
        const newName = inp.value.trim()
        if (save && newName && newName !== oldName) {
          try { await fetch('/api/rename', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ agent: agentId, name: newName }) }) } catch {}
        }
        inp.replaceWith(nameEl)
        if (save && newName) { nameEl.textContent = newName; nameEl.dataset.agentLabel = newName }
      }
      inp.addEventListener('keydown', (ke) => {
        if (ke.key === 'Enter') { ke.preventDefault(); finish(true) }
        if (ke.key === 'Escape') { ke.preventDefault(); finish(false) }
      })
      inp.addEventListener('blur', () => finish(true))
    })
  })

  // Double-click agent name to rename
  list.querySelectorAll('.agent-name').forEach(nameEl => {
    nameEl.addEventListener('dblclick', (e) => {
      e.stopPropagation()
      const agentId = nameEl.closest('.agent-item')?.dataset.agentId
      if (!agentId) return
      const oldName = nameEl.textContent
      const inp = document.createElement('input')
      inp.type = 'text'
      inp.value = oldName
      inp.style.cssText = 'background:var(--bg);color:var(--text);border:1px solid var(--accent);border-radius:3px;padding:1px 4px;font:inherit;width:' + Math.max(80, nameEl.offsetWidth + 20) + 'px'
      nameEl.replaceWith(inp)
      inp.focus()
      inp.select()
      let finished = false
      const finish = async (save) => {
        if (finished) return
        finished = true
        const newName = inp.value.trim()
        if (save && newName && newName !== oldName) {
          try { await fetch('/api/rename', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ agent: agentId, name: newName }) }) } catch {}
        }
        inp.replaceWith(nameEl)
        if (save && newName) { nameEl.textContent = newName; nameEl.dataset.agentLabel = newName }
      }
      inp.addEventListener('keydown', (ke) => {
        if (ke.key === 'Enter') { ke.preventDefault(); finish(true) }
        if (ke.key === 'Escape') { ke.preventDefault(); finish(false) }
      })
      inp.addEventListener('blur', () => finish(true))
    })
  })

  // Agent name drag — uses agent's display name as the label
  list.querySelectorAll('.agent-name').forEach(nameEl => {
    nameEl.style.touchAction = 'none'
    nameEl.style.cursor = 'grab'
    nameEl.addEventListener('pointerdown', (e) => {
      e.preventDefault()
      _preDrag = true
      nameEl.setPointerCapture(e.pointerId)
      const startX = e.clientX, startY = e.clientY
      const onMove = (me) => {
        if (Math.abs(me.clientX - startX) > 4 || Math.abs(me.clientY - startY) > 4) {
          nameEl.releasePointerCapture(e.pointerId)
          const agentId = nameEl.closest('.agent-item')?.dataset.agentId
          const label = nameEl.dataset.agentLabel
          startLabelDrag(me, label, agentId)
          nameEl.removeEventListener('pointermove', onMove)
          nameEl.removeEventListener('pointerup', onUp)
        }
      }
      const onUp = () => {
        _preDrag = false
        nameEl.removeEventListener('pointermove', onMove)
        nameEl.removeEventListener('pointerup', onUp)
      }
      nameEl.addEventListener('pointermove', onMove)
      nameEl.addEventListener('pointerup', onUp)
    })
  })

  // "leads <team>" hover — highlight team member rows
  list.querySelectorAll('.leads-team').forEach(el => {
    el.addEventListener('mouseenter', () => {
      const teamLabel = el.dataset.teamLabel
      const managerId = el.closest('.agent-item')?.dataset.agentId
      list.querySelectorAll('.agent-item').forEach(row => {
        const id = row.dataset.agentId
        if (id === managerId) return
        const labels = row.querySelector('.label-chip[data-label="' + CSS.escape(teamLabel) + '"]')
        const task = currentState?.tasks?.find(t => t.agent === id && t.status !== 'done' && t.delegated_by === managerId)
        if (labels || task) row.style.background = 'rgba(147,112,219,0.07)'
      })
    })
    el.addEventListener('mouseleave', () => {
      list.querySelectorAll('.agent-item').forEach(row => row.style.background = '')
    })
  })
}

function createTasksWidget(container, params) {

function updateTasksWidget(container, params, state) {
  const list = container.querySelector('.tasks-list')
  if (!list) return
  const tasks = (state.tasks || []).filter(t => t.status !== 'done')
  // Hash-based skip
  const hash = tasks.map(t => t.id + ':' + t.status + ':' + t.agent).join('|')
  if (list._tasksHash === hash) return
  list._tasksHash = hash
  list.innerHTML = tasks.map(t => {
    const agent = agentLabel(state, t.agent)
    return `<div class="task-item">
      <span class="task-status ${t.status}">${t.status}</span>
      <strong>${esc(agent)}</strong>: ${esc(t.description || '')}
    </div>`
  }).join('')
}

// --- Terminal output parser & renderer ---

const MUTATION_TOOLS = new Set(['Edit', 'Update', 'Write', 'Bash', 'NotebookEdit'])
const INFO_TOOLS = new Set(['Read', 'Searched', 'Glob', 'Grep', 'Search'])

function parseTerminalOutput(text) {
  const lines = text.split('\n')
  const sections = []
  let i = 0

  while (i < lines.length) {
    const line = lines[i]

    // Banner: lines starting with block chars
    if (/^[\s]*[▐▛▝▜▘█▙▟▗▖▞▚▀▄▌▍▎▏░▒▓]/.test(line)) {
      const start = i
      while (i < lines.length && /^[\s]*[▐▛▝▜▘█▙▟▗▖▞▚▀▄▌▍▎▏░▒▓]/.test(lines[i])) i++
      sections.push({ type: 'banner', lines: lines.slice(start, i) })
      continue
    }

    // Status bar: lines of mostly ─ characters or context/esc lines
    if (/^[─\s▪]{6,}$/.test(line) || /^\s*esc to interrupt/.test(line) || /Context left until auto-compact/.test(line)) {
      // Extract context % if present
      const ctxMatch = line.match(/Context left until auto-compact:\s*(\d+)%/)
      if (ctxMatch) {
        sections.push({ type: 'context-pct', pct: parseInt(ctxMatch[1]), line })
      } else {
        sections.push({ type: 'statusbar', line })
      }
      i++
      continue
    }

    // Tool call: ⏺ ToolName(args...) or ⏺ server - tool (MCP)(args...)
    if (/^\s*⏺\s/.test(line)) {
      const mcpMatch = line.match(/⏺\s+(\S+)\s*-\s*(\S+)\s*\(MCP\)\s*\(?(.*?)\)?\s*$/)
      const plainMatch = line.match(/⏺\s+([\w]+)\s*\((.*)\)\s*$/)
      const bareMatch = line.match(/⏺\s+(.+)$/)
      let toolName, args = '', isMcp = false, server = null

      if (mcpMatch) {
        server = mcpMatch[1]
        toolName = mcpMatch[2]
        isMcp = true
        args = mcpMatch[3] || ''
      } else if (plainMatch) {
        toolName = plainMatch[1]
        args = plainMatch[2] || ''
      } else if (bareMatch) {
        toolName = bareMatch[1].trim()
      } else {
        toolName = line.replace(/^\s*⏺\s+/, '').trim()
      }
      i++

      // Collect body: indented lines until next section boundary
      const bodyLines = []
      while (i < lines.length) {
        const next = lines[i]
        if (/^\s*⏺\s/.test(next)) break
        if (/^❯/.test(next)) break
        if (/^[✻✶✢]/.test(next)) break
        if (/^[─\s▪]{6,}$/.test(next)) break
        if (next.length > 0 && !/^\s/.test(next) && !/^[⎿]/.test(next)) break
        bodyLines.push(next)
        i++
      }

      const isMutation = MUTATION_TOOLS.has(toolName)
      const isInfo = INFO_TOOLS.has(toolName)
      const defaultCollapsed = isInfo || isMcp

      sections.push({ type: 'tool', toolName, args, isMcp, server, isMutation, defaultCollapsed, body: bodyLines })
      continue
    }

    // Thinking/status: ✻ ✶ ✢
    if (/^[✻✶✢]/.test(line)) {
      sections.push({ type: 'thinking', line })
      i++
      continue
    }

    // Prompt: ❯
    if (/^❯/.test(line)) {
      sections.push({ type: 'prompt', line })
      i++
      continue
    }

    // Collapsed marker: … +N lines
    if (/^\s*…\s*\+\d+\s*lines/.test(line)) {
      sections.push({ type: 'collapsed-marker', line })
      i++
      continue
    }

    // Skip blank lines
    if (line.trim() === '') { i++; continue }

    // Narrative text
    sections.push({ type: 'narrative', line })
    i++
  }

  return sections
}

function renderTerminalSections(sections) {
  const parts = []
  for (const s of sections) {
    switch (s.type) {
      case 'banner':
      case 'statusbar':
      case 'context-pct':
        // hidden via CSS
        parts.push('<div class="term-' + s.type + '"></div>')
        break

      case 'tool': {
        const cls = s.isMutation ? ' term-mutation' : s.isMcp ? ' term-mcp' : ''
        const collapsed = s.defaultCollapsed
        const arrow = collapsed ? '▸' : '▾'

        let nameHtml
        if (s.isMcp) {
          nameHtml = '<span class="term-tool-name">' + esc(s.server) + '→' + esc(s.toolName) + '</span>'
        } else {
          nameHtml = '<span class="term-tool-name">' + esc(s.toolName) + '</span>'
        }
        const argsHtml = s.args ? '<span class="term-tool-args">(' + esc(s.args) + ')</span>' : ''

        // Extract file path from Write/Edit args
        let filePath = ''
        if ((s.toolName === 'Write' || s.toolName === 'Edit') && s.args) {
          filePath = s.args.replace(/[()]/g, '').trim()
        }

        // Detect if tool body contains code (for Write/Edit/Bash tools)
        const isCodeTool = ['Write', 'Edit', 'Bash'].includes(s.toolName)
        const bodyText = s.body.join('\n')
        const hasDiffLines = s.body.some(l => /^\s*\d+\s*[+-]/.test(l) || /^\s*[+-][^─\s]/.test(l.trimStart()))
        const lang = isCodeTool && !hasDiffLines ? langFromFilePath(filePath) || detectLang('', bodyText) : ''

        const bodyHtml = s.body.map(line => {
          const trimmed = line.trimStart()
          if (/^\s*\d+\s*\+/.test(line) || /^\s*\+/.test(trimmed)) {
            const content = esc(line)
            return '<div class="term-diff-add">' + (lang ? highlightSyntax(content, lang) : content) + '</div>'
          }
          if (/^\s*\d+\s*-[^─]/.test(line) || /^\s*-[^─\s]/.test(trimmed)) {
            return '<div class="term-diff-del">' + esc(line) + '</div>'
          }
          if (/^\s*…\s*\+\d+\s*lines/.test(line)) {
            return '<div class="term-collapsed-marker">' + esc(line) + '</div>'
          }
          const content = esc(line)
          return '<div class="term-result-line">' + (lang && isCodeTool ? highlightSyntax(content, lang) : content) + '</div>'
        }).join('')

        // File path header for Write/Edit
        let fileHeader = ''
        if (filePath) {
          const shortPath = filePath.split('/').slice(-3).join('/')
          fileHeader = '<span class="code-block-file" title="' + esc(filePath) + '" onclick="navigator.clipboard.writeText(\'' + esc(filePath).replace(/'/g, "\\'") + '\')">' + esc(shortPath) + '</span>'
        }

        // Fold large code bodies
        const bodyLineCount = s.body.filter(l => l.trim()).length
        const shouldFoldBody = bodyLineCount > 10 && isCodeTool

        parts.push(
          '<div class="term-tool-block' + cls + '">' +
            '<div class="term-tool-header">' +
              '<span class="term-fold-indicator">' + arrow + '</span>' +
              nameHtml + argsHtml +
              (fileHeader ? ' ' + fileHeader : '') +
              (lang ? ' <span class="code-block-lang">' + esc(lang) + '</span>' : '') +
            '</div>' +
            '<div class="term-tool-body' + (collapsed ? ' collapsed' : '') + '">' + bodyHtml + '</div>' +
          '</div>'
        )
        break
      }

      case 'thinking':
        parts.push('<div class="term-thinking">' + esc(s.line) + '</div>')
        break

      case 'prompt':
        parts.push('<div class="term-prompt">' + esc(s.line) + '</div>')
        break

      case 'collapsed-marker':
        parts.push('<div class="term-collapsed-marker">' + esc(s.line) + '</div>')
        break

      case 'narrative':
        parts.push('<div class="term-narrative">' + esc(s.line) + '</div>')
        break
    }
  }
  return parts.join('')
}

// --- Terminal parser & renderer ---



function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
}

function renderToolBody(bodyLines) {
  return bodyLines.map(line => {
    const trimmed = line.trimStart()
    // Diff add lines: line numbers followed by + marker
    if (/^\s*\d+\s*\+/.test(line) || /^\+/.test(trimmed)) {
      return `<div class="term-diff-add">${escHtml(line)}</div>`
    }
    // Diff remove lines
    if (/^\s*\d+\s*-/.test(line) || /^-/.test(trimmed)) {
      return `<div class="term-diff-del">${escHtml(line)}</div>`
    }
    // Collapsed marker inside tool body
    if (/^\s*…\s*\+\d+\s+lines/.test(line)) {
      return `<div class="term-collapsed-marker">${escHtml(line)}</div>`
    }
    // Result indicator ⎿
    if (trimmed.startsWith('⎿')) {
      return `<div class="term-result-line">${escHtml(line)}</div>`
    }
    return `<div class="term-result-line">${escHtml(line)}</div>`
  }).join('')
}

function renderSections(sections) {
  return sections.map((s, idx) => {
    switch (s.type) {
      case 'banner':
        return `<div class="term-banner">${s.lines.map(escHtml).join('\n')}</div>`

      case 'statusbar':
        return `<div class="term-statusbar">${s.lines.map(escHtml).join('\n')}</div>`

      case 'context-pct':
        return `<div class="term-statusbar">${s.lines.map(escHtml).join('\n')}</div>`

      case 'thinking':
        return `<div class="term-thinking">${s.lines.map(escHtml).join('\n')}</div>`

      case 'prompt':
        return `<div class="term-prompt">${s.lines.map(escHtml).join('\n')}</div>`

      case 'tool': {
        const classes = ['term-tool-block']
        if (s.isMutation) classes.push('term-mutation')
        if (s.isMcp) classes.push('term-mcp')
        const collapsed = s.defaultCollapsed ? ' collapsed' : ''
        const arrow = s.defaultCollapsed ? '▸' : '▾'
        const bodyHtml = renderToolBody(s.bodyLines)
        return `<div class="${classes.join(' ')}" data-idx="${idx}">` +
          `<div class="term-tool-header" onclick="this.nextElementSibling.classList.toggle('collapsed');this.querySelector('.term-fold-indicator').textContent=this.nextElementSibling.classList.contains('collapsed')?'▸':'▾'">` +
          `<span class="term-fold-indicator">${arrow}</span>` +
          `<span class="term-tool-name">${escHtml(s.toolName)}</span>` +
          (s.args ? `<span class="term-tool-args">(${escHtml(s.args)})</span>` : '') +
          `</div>` +
          `<div class="term-tool-body${collapsed}">${bodyHtml}</div>` +
          `</div>`
      }

      case 'collapsed-marker':
        return `<div class="term-collapsed-marker">${s.lines.map(escHtml).join('\n')}</div>`

      case 'narrative': {
        const text = s.lines.join('\n')
        if (!text.trim()) return ''
        return `<div class="term-narrative">${escHtml(text)}</div>`
      }

      default:
        return `<div>${s.lines.map(escHtml).join('\n')}</div>`
    }
  }).join('')
}
