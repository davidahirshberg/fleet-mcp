function createPlaybackWidget(container, params) {
  container.classList.add('playback-widget')
  container.innerHTML = `
    <div class="playback-controls" style="display:none">
      <button class="pb-play">Play</button>
      <input type="range" class="playback-scrubber" min="0" max="1000" value="0">
      <span class="playback-time">0:00 / 0:00</span>
      <span class="playback-speed" title="Click to cycle speed">1x</span>
    </div>
    <div class="playback-picker">
      <select class="pb-select"><option value="">Select a playback...</option></select>
      <div class="picker-info"></div>
    </div>
    <div class="playback-events"></div>
  `

  const pbState = {
    playback: null,
    playing: false,
    currentT: 0,
    speed: 1,
    speeds: [1, 2, 4, 8],
    speedIdx: 0,
    animFrame: null,
    lastTick: null,
  }
  container._pbState = pbState

  const controls = container.querySelector('.playback-controls')
  const playBtn = container.querySelector('.pb-play')
  const scrubber = container.querySelector('.playback-scrubber')
  const timeDisplay = container.querySelector('.playback-time')
  const speedBtn = container.querySelector('.playback-speed')
  const selectEl = container.querySelector('.pb-select')
  const pickerInfo = container.querySelector('.picker-info')
  const eventsDiv = container.querySelector('.playback-events')

  function fmtTime(ms) {
    const s = Math.floor(ms / 1000)
    const m = Math.floor(s / 60)
    return `${m}:${String(s % 60).padStart(2, '0')}`
  }

  function typeLabel(type) {
    const labels = {
      user_text: 'user', assistant_text: 'assistant', tool_call: 'tool',
      tool_result: 'result', chat: 'chat', delegate: 'delegate',
      task_done: 'done', annotation: 'ann', stroke: 'stroke', marker: 'marker'
    }
    return labels[type] || type
  }

  function eventSummary(ev) {
    const d = ev.data
    if (ev.type === 'user_text' || ev.type === 'assistant_text') {
      const txt = d.text || ''
      return txt.length > 200 ? txt.slice(0, 200) + '...' : txt
    }
    if (ev.type === 'tool_call') return `${d.tool}(${JSON.stringify(d.input || {}).slice(0, 100)})`
    if (ev.type === 'tool_result') return d.summary || '(result)'
    if (ev.type === 'chat') return d.text || ''
    if (ev.type === 'delegate') return `${d.description}: ${(d.text || '').slice(0, 100)}`
    if (ev.type === 'task_done') return d.description || 'done'
    if (ev.type === 'annotation') return `[${d.shapeType}] ${d.text || ''}`
    if (ev.type === 'marker') return d.text || ''
    return JSON.stringify(d).slice(0, 100)
  }

  function renderEvents() {
    if (!pbState.playback) return
    const events = pbState.playback.events
    const html = events.map((ev, i) => {
      const summary = esc(eventSummary(ev))
      return `<div class="playback-event" data-type="${ev.type}" data-idx="${i}">
        <span class="ev-time">${fmtTime(ev.t)}</span>
        <span class="ev-type">${typeLabel(ev.type)}</span>
        <div class="ev-content collapsed">${summary}</div>
      </div>`
    }).join('')
    eventsDiv.innerHTML = html

    eventsDiv.querySelectorAll('.ev-content').forEach(el => {
      el.addEventListener('click', () => el.classList.toggle('collapsed'))
    })

    eventsDiv.querySelectorAll('.playback-event').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('ev-content')) return
        const idx = parseInt(el.dataset.idx)
        const ev = events[idx]
        if (ev) {
          _lastActiveIdx = -1
          pbState.currentT = ev.t
          updatePlaybackUI()
          updateEventHighlight()
        }
      })
    })
  }

  // Track which event index is currently "active" to avoid full DOM scans
  let _lastActiveIdx = -1

  function updatePlaybackUI() {
    if (!pbState.playback) return
    const pb = pbState.playback
    const dur = pb.duration_ms || 1

    scrubber.value = Math.round((pbState.currentT / dur) * 1000)
    timeDisplay.textContent = `${fmtTime(pbState.currentT)} / ${fmtTime(dur)}`
    playBtn.textContent = pbState.playing ? 'Pause' : 'Play'
    playBtn.classList.toggle('active', pbState.playing)
    speedBtn.textContent = pbState.speed + 'x'
  }

  // Heavier DOM update — called less often (every 200ms during playback)
  function updateEventHighlight() {
    if (!pbState.playback) return
    const events = pbState.playback.events

    // Binary search for the last event at or before currentT
    let lo = 0, hi = events.length - 1, activeIdx = -1
    while (lo <= hi) {
      const mid = (lo + hi) >> 1
      if (events[mid].t <= pbState.currentT) { activeIdx = mid; lo = mid + 1 }
      else hi = mid - 1
    }

    if (activeIdx === _lastActiveIdx) return
    const oldIdx = _lastActiveIdx
    _lastActiveIdx = activeIdx

    // Only touch the changed elements
    const eventEls = eventsDiv.children
    if (oldIdx >= 0 && oldIdx < eventEls.length) {
      eventEls[oldIdx].classList.remove('active')
      eventEls[oldIdx].classList.add('past')
    }
    // Update newly passed events (between old and new active)
    if (activeIdx > oldIdx) {
      const start = Math.max(oldIdx + 1, 0)
      for (let i = start; i < activeIdx; i++) {
        if (i < eventEls.length) eventEls[i].classList.add('past')
      }
    } else if (activeIdx < oldIdx) {
      // Scrubbed backward — remove past from events after activeIdx
      for (let i = activeIdx + 1; i <= oldIdx && i < eventEls.length; i++) {
        eventEls[i].classList.remove('active', 'past')
      }
    }

    if (activeIdx >= 0 && activeIdx < eventEls.length) {
      eventEls[activeIdx].classList.remove('past')
      eventEls[activeIdx].classList.add('active')
      const rect = eventEls[activeIdx].getBoundingClientRect()
      const parentRect = eventsDiv.getBoundingClientRect()
      if (rect.bottom > parentRect.bottom || rect.top < parentRect.top) {
        eventEls[activeIdx].scrollIntoView({ block: 'center', behavior: 'smooth' })
      }
    }
  }

  function tick() {
    if (!pbState.playing || !pbState.playback) return
    const now = performance.now()
    if (pbState.lastTick) {
      const delta = (now - pbState.lastTick) * pbState.speed
      pbState.currentT = Math.min(pbState.currentT + delta, pbState.playback.duration_ms)
      if (pbState.currentT >= pbState.playback.duration_ms) {
        pbState.playing = false
      }
    }
    pbState.lastTick = now
    updatePlaybackUI()
    updateEventHighlight()
    if (pbState.playing) {
      pbState.animFrame = setTimeout(tick, 100) // 10fps — plenty for event-level playback
    }
  }

  playBtn.addEventListener('click', () => {
    pbState.playing = !pbState.playing
    if (pbState.playing) {
      if (pbState.currentT >= (pbState.playback?.duration_ms || 0)) pbState.currentT = 0
      pbState.lastTick = null
      tick()
    } else {
      if (pbState.animFrame) clearTimeout(pbState.animFrame)
      pbState.lastTick = null
    }
    updatePlaybackUI()
  })

  scrubber.addEventListener('input', () => {
    if (!pbState.playback) return
    _lastActiveIdx = -1 // force full recalc on scrub
    pbState.currentT = (parseInt(scrubber.value) / 1000) * pbState.playback.duration_ms
    pbState.lastTick = null
    updatePlaybackUI()
    updateEventHighlight()
  })

  speedBtn.addEventListener('click', () => {
    pbState.speedIdx = (pbState.speedIdx + 1) % pbState.speeds.length
    pbState.speed = pbState.speeds[pbState.speedIdx]
    updatePlaybackUI()
  })

  async function loadPlaybackList() {
    try {
      const resp = await fetch('/api/playbacks')
      const list = await resp.json()
      selectEl.innerHTML = '<option value="">Select a playback...</option>'
      for (const pb of list) {
        const opt = document.createElement('option')
        opt.value = pb.id
        opt.textContent = `${pb.title} (${pb.event_count} events, ${fmtTime(pb.duration_ms)})`
        selectEl.appendChild(opt)
      }
    } catch (e) {
      pickerInfo.textContent = 'Failed to load playbacks'
    }
  }

  selectEl.addEventListener('change', async () => {
    const id = selectEl.value
    if (!id) {
      pbState.playback = null
      controls.style.display = 'none'
      eventsDiv.innerHTML = ''
      pickerInfo.textContent = ''
      return
    }
    try {
      const resp = await fetch(`/api/playbacks/${id}`)
      const pb = await resp.json()
      pbState.playback = pb
      pbState.currentT = 0
      pbState.playing = false
      controls.style.display = 'flex'
      const counts = {}
      for (const e of pb.events) counts[e.type] = (counts[e.type] || 0) + 1
      pickerInfo.textContent = `${pb.events.length} events | ${Object.entries(counts).map(([k,v]) => `${k}:${v}`).join(', ')}`
      _lastActiveIdx = -1
      renderEvents()
      updatePlaybackUI()
      updateEventHighlight()
    } catch (e) {
      pickerInfo.textContent = 'Failed to load playback'
    }
  })

  loadPlaybackList()
}
function updatePlaybackWidget() {}

const ANN_COLORS = { red: '#c85050', orange: '#c8956a', yellow: '#c8b060', green: '#7ab8a0', blue: '#7a9ec8', violet: '#9370db', grey: '#6b6b88', black: '#c8c8d8', white: '#f0f0f0', 'light-red': '#d88888', 'light-green': '#a0d8b8', 'light-blue': '#a0c0e0', 'light-violet': '#b8a0d8' }

async function loadDocsAnnotations(container) {
  const sel = container.querySelector('.docs-project-select')
  const list = container.querySelector('.docs-list')
  if (!sel) return
  const project = sel.value
  if (!project) {
    list.innerHTML = '<div style="color:var(--text-dim);padding:12px;text-align:center">Select a document to see annotations</div>'
    return
  }
  container._docsProject = project
  localStorage.setItem('fleet-docs-project', project)
  list.innerHTML = '<div style="color:var(--text-dim);padding:12px">Loading...</div>'

  try {
    const res = await fetch('/api/tlda/' + encodeURIComponent(project) + '/annotations')
    const data = await res.json()
    container._annotations = data.annotations || []
    if (container._annotations.length === 0) {
      list.innerHTML = '<div style="color:var(--text-dim);padding:12px">No annotations</div>'
      return
    }
    container._annotations.sort((a, b) => a.y - b.y)
    renderDocsAnnotations(container)
  } catch (e) {
    list.innerHTML = `<div style="color:var(--text-dim);padding:12px">Error: ${e.message}</div>`
  }

function renderDocsAnnotations(container) {
  const list = container.querySelector('.docs-list')
  const project = container._docsProject
  const annotations = container._annotations
  if (!list || !annotations.length) return

  list.innerHTML = annotations.map((ann, i) => {
    const dotColor = ANN_COLORS[ann.color] || 'var(--text-dim)'
    const anchor = ann.anchor ? `${ann.anchor.file || ''}:${ann.anchor.line || ''}` : ''
    const doneClass = ann.done ? ' ann-done' : ''
    let displayText = ann.text
    if (ann.tabs && ann.tabs.length > 1) displayText = ann.tabs[ann.activeTab || 0] || ann.text

    return `<div class="ann-card${doneClass}" data-ann-idx="${i}" draggable="true" style="cursor:grab">
      <div class="ann-header">
        <span class="ann-color" style="background:${dotColor}"></span>
        ${anchor ? `<span class="ann-anchor" data-scroll-idx="${i}" title="Jump to location">${esc(anchor)}</span>` : ''}
        ${ann.createdBy ? `<span style="font-size:10px;color:var(--text-dim)">${esc(ann.createdBy)}</span>` : ''}
        <span style="margin-left:auto;font-size:10px;color:var(--text-dim)">${ann.createdAt ? timeShort(ann.createdAt) : ''}</span>
      </div>
      <div class="ann-text">${esc(displayText)}</div>
      <div class="ann-actions">
        <button class="ann-action-btn" data-share-idx="${i}" title="Share in chat">share</button>
        <button class="ann-action-btn" data-done-idx="${i}" title="${ann.done ? 'Mark undone' : 'Mark done'}">${ann.done ? 'undone' : 'done'}</button>
      </div>
    </div>`
  }).join('')

  list.querySelectorAll('.ann-anchor').forEach(el => {
    el.addEventListener('click', () => scrollToDocsAnnotation(container, parseInt(el.dataset.scrollIdx, 10)))
  })
  list.querySelectorAll('[data-share-idx]').forEach(el => {
    el.addEventListener('click', () => {
      const ann = annotations[parseInt(el.dataset.shareIdx, 10)]
      if (!ann) return
      const anchor = ann.anchor ? ` (${ann.anchor.file}:${ann.anchor.line})` : ''
      const text = `[${project}${anchor}] ${ann.text}`
      if (lastFocusedChat) {
        const input = lastFocusedChat.querySelector('.chat-input')
        if (input) { input.value = text; input.focus() }
      }
    })
  })
  list.querySelectorAll('[data-done-idx]').forEach(el => {
    el.addEventListener('click', async () => {
      const idx = parseInt(el.dataset.doneIdx, 10)
      const ann = annotations[idx]
      if (!ann || !project) return
      try {
        await fetch(`/api/tlda/${encodeURIComponent(project)}/annotations/${encodeURIComponent(ann.id)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ done: !ann.done }),
        })
        loadDocsAnnotations(container)
      } catch {}
    })
  })

  // Drag annotations to chat
  list.querySelectorAll('.ann-card[draggable]').forEach(card => {
    card.addEventListener('dragstart', e => {
      const idx = parseInt(card.dataset.annIdx, 10)
      const ann = annotations[idx]
      if (!ann) return
      const displayText = ann.tabs && ann.tabs.length > 1 ? (ann.tabs[ann.activeTab || 0] || ann.text) : ann.text
      const item = {
        type: 'tlda',
        snippet: displayText.substring(0, 200),
        source: `tlda:${project}/${ann.id || ''}`,
        timestamp: ''
      }
      e.dataTransfer.setData('application/x-chat-attachment', JSON.stringify(item))
      const tldaPayload = { _tlda: true, text: displayText, color: ann.color || 'yellow', sourceDoc: project, sourceShapeId: ann.id || '' }
      e.dataTransfer.setData('application/x-tlda-note', JSON.stringify(tldaPayload))
      e.dataTransfer.setData('text/plain', JSON.stringify({ _fleet: true, ...item, _tlda: true, text: displayText, color: ann.color || 'yellow', sourceDoc: project }))
      e.dataTransfer.effectAllowed = 'copy'
    })
  })
}

async function scrollToDocsAnnotation(container, idx) {
  const ann = container._annotations[idx]
  const project = container._docsProject
  if (!ann || !project) return
  try {
    await fetch('/api/tlda/' + encodeURIComponent(project) + '/scroll', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ x: ann.x, y: ann.y }),
    })
  } catch {}
}

function updateDocsWidget() { /* docs is user-driven via project select */ }

// --- Per-panel state persistence ---
function savePanelState(panelId, key, value) {
  try {
    const store = JSON.parse(localStorage.getItem('fleet-panel-state') || '{}')
    if (!store[panelId]) store[panelId] = {}
    store[panelId][key] = value
    localStorage.setItem('fleet-panel-state', JSON.stringify(store))
  } catch {}
}
function loadPanelState(panelId, key) {
  try {
    const store = JSON.parse(localStorage.getItem('fleet-panel-state') || '{}')
    return store[panelId]?.[key] ?? null
  } catch { return null }
}

// --- Widget registry ---
const WIDGETS = {
  chat: { create: createChatWidget, update: updateChatWidget },
  agents: { create: createAgentsWidget, update: updateAgentsWidget },
  tasks: { create: createTasksWidget, update: updateTasksWidget },
  terminal: { create: createTerminalWidget, update: updateTerminalWidget },
  search: { create: createSearchWidget, update: updateSearchWidget },
  timeline: { create: createTimelineWidget, update: updateTimelineWidget },
  playback: { create: createPlaybackWidget, update: updatePlaybackWidget },
  docs: { create: createDocsWidget, update: updateDocsWidget },
}

// --- Dockview init ---
const panelInstances = new Map()

const dv = new DockviewComponent(document.getElementById('app'), {
  createComponent(options) {
    const widget = WIDGETS[options.name]
    if (!widget) {
      const el = document.createElement('div')
      el.innerHTML = `<div class="widget-placeholder">Unknown widget: ${options.name}</div>`
      return { element: el }
    }

    const element = document.createElement('div')
    element.className = `widget widget-${options.name}`
    element.style.cssText = 'width:100%;height:100%;overflow:hidden;'

    return {
      element,
      init(params) {
        const widgetParams = params.params || {}
        element._panelId = params.api.id
        panelInstances.set(params.api.id, { widget, container: element, params: widgetParams })
        widget.create(element, widgetParams)
        if (currentState) widget.update(element, widgetParams, currentState)
      },
      dispose() {
        for (const [id, inst] of panelInstances) {
          if (inst.container === element) { panelInstances.delete(id); break }
        }
      },
    }
  },
  className: 'fleet-dockview',
})

// --- Default layout ---
function setupDefaultLayout() {
  const chat = dv.addPanel({ id: 'chat', component: 'chat', title: 'Chat' })

  dv.addPanel({ id: 'search', component: 'search', title: 'Search',
    position: { referencePanel: chat, direction: 'within' } })

  dv.addPanel({ id: 'terminal', component: 'terminal', title: 'Terminal',
    position: { referencePanel: chat, direction: 'within' } })

  dv.addPanel({ id: 'timeline', component: 'timeline', title: 'Timeline',
    position: { referencePanel: chat, direction: 'within' } })

  const agents = dv.addPanel({ id: 'agents', component: 'agents', title: 'Agents',
    position: { referencePanel: chat, direction: 'right' } })

  dv.addPanel({ id: 'tasks', component: 'tasks', title: 'Tasks',
    position: { referencePanel: agents, direction: 'within' } })

  // Activate chat tab
  chat.api.setActive()
}

// Try restore saved layout, fall back to default
const saved = localStorage.getItem('fleet-layout-v2')
if (saved) {
  try {
    dv.fromJSON(JSON.parse(saved))
  } catch (e) {
    console.warn('Failed to restore layout, using default:', e)
    setupDefaultLayout()
  }
} else {
  setupDefaultLayout()
}

// Persist layout on changes
dv.onDidLayoutChange(() => {
  try { localStorage.setItem('fleet-layout-v2', JSON.stringify(dv.toJSON())) } catch {}
})

// --- SSE ---
function broadcastUpdate(state) {
  currentState = state
  for (const [id, inst] of panelInstances) {
    try { inst.widget.update(inst.container, inst.params, state) } catch (e) {
      console.warn(`Widget update error (${id}):`, e)
    }
  }
}

function connectSSE() {
  const evtSource = new EventSource('/events')
  evtSource.onmessage = (e) => {
    try {
      const state = JSON.parse(e.data)
      broadcastUpdate(state)
    } catch {}
  }
  evtSource.onerror = () => {
    evtSource.close()
    setTimeout(connectSSE, 3000)
  }
}

// Initial state fetch
fetch('/api/state').then(r => r.json()).then(broadcastUpdate).catch(() => {})
connectSSE()

// --- Commands ---
const WIDGET_NAMES = Object.keys(WIDGETS)

function executeCommand(cmd) {
  const parts = cmd.trim().split(/\s+/)
  const name = parts[0].toLowerCase()
  const widget = parts[1] || 'chat'
  const active = dv.activePanel

  if (name === '/sp' || name === '/split') {
    if (!WIDGET_NAMES.includes(widget)) return `Unknown widget: ${widget}. Available: ${WIDGET_NAMES.join(', ')}`
    const id = `${widget}-${Date.now()}`
    const title = widget.charAt(0).toUpperCase() + widget.slice(1)
    dv.addPanel({ id, component: widget, title,
      position: active ? { referencePanel: active, direction: 'below' } : undefined })
    return null
  }

  if (name === '/vsp' || name === '/vsplit') {
    if (!WIDGET_NAMES.includes(widget)) return `Unknown widget: ${widget}. Available: ${WIDGET_NAMES.join(', ')}`
    const id = `${widget}-${Date.now()}`
    const title = widget.charAt(0).toUpperCase() + widget.slice(1)
    dv.addPanel({ id, component: widget, title,
      position: active ? { referencePanel: active, direction: 'right' } : undefined })
    return null
  }

  if (name === '/tab' || name === '/add') {
    if (!WIDGET_NAMES.includes(widget)) return `Unknown widget: ${widget}. Available: ${WIDGET_NAMES.join(', ')}`
    const id = `${widget}-${Date.now()}`
    const title = widget.charAt(0).toUpperCase() + widget.slice(1)
    dv.addPanel({ id, component: widget, title,
      position: active ? { referencePanel: active, direction: 'within' } : undefined })
    return null
  }

  if (name === '/close') {
    if (active) dv.removePanel(active)
    return null
  }

  if (name === '/only') {
    const panels = dv.panels.filter(p => p !== active)
    for (const p of panels) dv.removePanel(p)
    return null
  }

  if (name === '/reset') {
    localStorage.removeItem('fleet-layout-v2')
    location.reload()
    return null
  }

  if (name === '/help') {
    return 'Commands: /sp [widget], /vsp [widget], /tab [widget], /close, /only, /reset\nWidgets: ' + WIDGET_NAMES.join(', ')
  }

  return null // not a command, send as chat
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.metaKey && e.shiftKey && e.key === 's') {
    e.preventDefault()
    executeCommand('/sp chat')
  }
  if (e.metaKey && e.shiftKey && e.key === 'v') {
    e.preventDefault()
    executeCommand('/vsp terminal')
  }
  if (e.metaKey && e.key === 'w') {
    e.preventDefault()
    executeCommand('/close')
  }
})
</script>
