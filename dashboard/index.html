    }
  } catch {}
})

// --- SSE ---
let _lastStateHash = ''
function broadcastUpdate(state) {
  // Merge local (optimistic) messages: if a local message matches an incoming one, drop the local copy
  // Keep unconfirmed local messages (not yet delivered by SSE)
  if (currentState?.messages) {
    const locals = currentState.messages.filter(m => m._local)
    if (locals.length) {
      const incoming = state.messages || []
      for (const lm of locals) {
        const match = incoming.find(sm =>
          sm.text === lm.text && sm.to === lm.to &&
          Math.abs(new Date(sm.timestamp) - new Date(lm.timestamp)) < 10000
        )
        if (match) {
          // SSE confirmed — drop local copy
          lm._local = false
        } else {
          // Not yet confirmed or failed — keep in state (failed shows ⚠ indicator)
          incoming.push(lm)
        }
      }
      state.messages = incoming
    }
  }
  // Track compacting/unreachable transitions client-side (server doesn't send timestamps)
  const prevAgents = currentState?.agents || []
  for (const a of (state.agents || [])) {
    const prev = prevAgents.find(p => p.id === a.id)
    if (a.compacting) {
      a.compacting_since = prev?.compacting_since || new Date().toISOString()
    }
    if (!a.compacting && a.last_seen && !isActive(a)) {
      a.unreachable_since = prev?.unreachable_since || a.last_seen
    }
  }
  currentState = state
  // Quick hash — skip widget updates if state hasn't materially changed
  const msgs = state.messages || []
  const agents = state.agents || []
  const tasks = state.tasks || []
  const lastMsg = msgs[msgs.length - 1]
  const taskStatuses = tasks.map(t => t.status || '').join(',')
  const agentNames = agents.map(a => (a.friendly_name || '') + (a.labels?.join('') || '') + (a.compacting ? 'C' : '') + (a.last_seen || '').slice(-6)).join(',')
  const hash = msgs.length + ':' + agents.length + ':' + tasks.length + ':' + (lastMsg?.timestamp || '') + ':' + (lastMsg?.text?.slice(0, 50) || '') + ':' + taskStatuses + ':' + agentNames
  if (hash === _lastStateHash) return
  _lastStateHash = hash
  for (const [id, inst] of panelInstances) {
    // Skip panels bound to a playback stream — they get updates from playbackCtrl
    if (inst.container._streamSource) continue
    try { inst.widget.update(inst.container, inst.params, state) } catch (e) {
      console.warn(`Widget update error (${id}):`, e)
    }
  }
  // Update tab badges
  updateTabBadges(state)
}

// Push synth state to all panels bound to a given playback controller
function broadcastPlaybackState(ctrl) {
  if (!ctrl.synthState) return
  for (const [id, inst] of panelInstances) {
    if (inst.container._streamSource !== ctrl) continue
    try { inst.widget.update(inst.container, inst.params, ctrl.synthState) } catch (e) {
      console.warn(`Playback widget update error (${id}):`, e)
    }
  }
}

function updateTabBadges(state) {
  const userId = state?.user || 'user'
  const userAliases = new Set(['web', 'skip', 'human', 'user', userId])
  const msgs = state.messages || []
  const tasks = state.tasks || []

  // Count agents with unseen messages (same logic as per-agent badges)
  const agentsWithUnseen = new Set()
  for (const m of msgs) {
    if (m.from && userAliases.has(m.to) && m.timestamp > getAgentSeenTs(m.from)) agentsWithUnseen.add(m.from)
  }
  // Only count registered agents
  const agentIds = new Set((state.agents || []).map(a => a.id))
  let unseenAgentCount = 0
  for (const id of agentsWithUnseen) {
    if (agentIds.has(id)) unseenAgentCount++
  }

  const pendingTasks = tasks.filter(t => t.status === 'pending' || t.status === 'blocked').length
  const activeTasks = tasks.filter(t => t.status !== 'done').length

  for (const [id, inst] of panelInstances) {
    try {
      const panel = dv.panels.find(p => p.id === id)
      if (!panel) continue
      if (inst.widget === WIDGETS.agents) {
        panel.api.setTitle(unseenAgentCount > 0 ? `Agents (${unseenAgentCount})` : 'Agents')
      } else if (inst.widget === WIDGETS.tasks) {
        panel.api.setTitle('Tasks')
      }
    } catch {}
  }
}

function connectSSE() {
  const evtSource = new EventSource('/events')
  // Auto-retry failed messages on reconnect
  evtSource.onopen = () => {
    const queue = window._failedMessages || []
    if (queue.length) {
      window._failedMessages = []
      for (const payload of queue) {
        fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        }).then(res => {
          if (res.ok) {
            // Clear failed flag on retried local messages
            if (currentState?.messages) {
              for (const m of currentState.messages) {
                if (m._failed && m.text === payload.message && m.to === payload.to) {
                  m._failed = false
                  m._local = true // will be deduped by next SSE update
                }
              }
            }
          }
        }).catch(() => {
          // Re-queue if still failing
          window._failedMessages = window._failedMessages || []
          window._failedMessages.push(payload)
        })
      }
    }
  }
  evtSource.onmessage = (e) => {
    try {
      const state = JSON.parse(e.data)
      broadcastUpdate(state)
    } catch {}
  }
  // Tick countdown for sleeping agents (1s interval, only active when someone is sleeping)
  setInterval(() => {
    if (currentState?.agents?.some(a => a._sleep)) broadcastUpdate(currentState)
  }, 1000)
  // Queue auto-flush: check every 3s if queued messages can be sent to idle agents
  setInterval(() => {
    for (const [, inst] of panelInstances) {
      if (inst.widget !== WIDGETS?.chat || !inst.container._queueMode) continue
      const ctr = inst.container
      const targets = ctr._modeTargets
      if (!targets || targets.size === 0) continue
      const buf = ctr._queueBuffer || []
      if (buf.length === 0) continue
      for (const t of [...targets]) {
        const agent = (currentState?.agents || []).find(a => a.id === t)
        const ago = agent?.last_seen ? Math.floor((Date.now() - new Date(agent.last_seen).getTime()) / 1000) : Infinity
        if (ago >= 15) {
          // Target is idle — flush queued messages
          for (const item of buf) {
            const payload = { message: item.msg, to: t }
            if (item.isRaw) payload._raw = true
            if (item.attachments?.length) payload.attachments = item.attachments
            fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }).catch(() => {})
          }
          targets.delete(t)
        }
      }
      // If all targets flushed, turn off queue mode
      if (targets.size === 0) {
        ctr._queueMode = false
        ctr._modeTargets = null
        ctr._queueBuffer = []
        ctr.querySelector('.chat-input-bar')?.classList.remove('queue-mode')
        const pillGhost = ctr.querySelector('.chat-target-ghost')
        if (pillGhost) pillGhost.classList.remove('has-mode')
        const chatLog = ctr.querySelector('.chat-log')
        if (chatLog) for (const el of chatLog.querySelectorAll('.chat-queued')) { el.style.opacity = '1'; el.classList.remove('chat-queued') }
        if (currentState) try { updateChatWidget(ctr, ctr._widgetParams, currentState) } catch {}
      }
    }
  }, 3000)
  // Session updates: new JSONL events from agent sessions (replaces polling)
  evtSource.addEventListener('session', (e) => {
    try {
      const { agent, events } = JSON.parse(e.data)
      if (!agent || !events?.length) return
      const cache = window._sessionCache || {}
      const existing = cache[agent]
      if (existing?.data) {
        // Deduplicate: skip events already in cache.
        // Can't rely on timestamp alone (multiple events share timestamps within a turn).
        // Use count of events at the boundary timestamp to handle overlaps.
        const lastTs = existing.data.events[existing.data.events.length - 1]?.timestamp
        let newEvents
        if (!lastTs) {
          newEvents = events
        } else {
          const cachedAtBoundary = existing.data.events.filter(ev => ev.timestamp === lastTs).length
          let seenAtBoundary = 0
          newEvents = events.filter(ev => {
            if (ev.timestamp > lastTs) return true
            if (ev.timestamp === lastTs) return ++seenAtBoundary > cachedAtBoundary
            return false // older than cache
          })
        }
        if (newEvents.length === 0) return
        // Append new events to existing cache, cap at 2000 to prevent unbounded growth
        existing.data.events.push(...newEvents)
        if (existing.data.events.length > 2000) {
          existing.data.events = existing.data.events.slice(-1500)
        }
        existing.data.total += events.length
        // Update hash so getActivityEvents re-extracts
        const last = existing.data.events[existing.data.events.length - 1]
        existing.hash = existing.data.total + ':' + existing.data.events.length + ':' + (last?.timestamp || '')
        existing.fetchedAt = Date.now()
      } else {
        // First data for this agent — create cache entry
        cache[agent] = {
          data: { events, total: events.length, label: agent },
          hash: events.length + ':' + events.length + ':' + (events[events.length - 1]?.timestamp || ''),
          fetchedAt: Date.now(),
        }
        window._sessionCache = cache
      }
      // Update agent's context_pct from latest usage data
      const lastWithUsage = [...events].reverse().find(ev => ev.usage)
      if (lastWithUsage?.usage && currentState) {
        const agentEntry = (currentState.agents || []).find(a => a.id === agent)
        if (agentEntry) {
          agentEntry.context_pct = Math.round((lastWithUsage.usage.input / 200000) * 100)
        }
      }
      // Directly update chat and terminal widgets showing this agent
      for (const [, inst] of panelInstances) {
        if (inst.container._streamSource) continue
        if (inst.widget === WIDGETS.chat && currentState) {
          // Chat widget re-render picks up new activity from session cache
          try { inst.widget.update(inst.container, inst.params, currentState) } catch {}
        } else if (inst.widget === WIDGETS.terminal && inst.container._termAgent === agent) {
          const body = inst.container.querySelector('.terminal-body')
          if (!body) continue
          const cached = window._sessionCache[agent]
          if (!cached?.data) continue
          const hash = cached.hash
          if (body._termHash === hash) continue
          body._termHash = hash
          const wasAtBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 30
          body.innerHTML = renderSessionEvents(cached.data.events)
          if (wasAtBottom && inst.container._autoScroll !== false) body.scrollTop = body.scrollHeight
        }
      }
    } catch {}
  })
  evtSource.addEventListener('reload', () => { location.reload() })
  evtSource.onerror = () => {
    evtSource.close()
    setTimeout(connectSSE, 3000)
  }
}

// Initial state fetch and SSE — skip in demo mode
if (!_isDemoMode) {
  fetch('/api/state').then(r => r.json()).then(state => {

    // Fetch context_pct for all agents on startup
    for (const a of state.agents || []) {
      fetchSessionLite(a.id)
    }
  }).catch(() => {})
  connectSSE()
}

// --- Commands ---
const WIDGET_NAMES = Object.keys(WIDGETS)

function executeCommand(cmd) {
  const parts = cmd.trim().split(/\s+/)
  const name = parts[0].toLowerCase()
  const widget = parts[1] || 'chat'
  const active = dv.activePanel

  if (name === '/sp' || name === '/split') {
    if (!WIDGET_NAMES.includes(widget)) return `Unknown widget: ${widget}. Available: ${WIDGET_NAMES.join(', ')}`
    const id = `${widget}-${Date.now()}`
    const title = widget.charAt(0).toUpperCase() + widget.slice(1)
    dv.addPanel({ id, component: widget, title,
      position: active ? { referencePanel: active, direction: 'below' } : undefined })
    trackUI('panel_add', { panelId: id, widget, position: 'below' })
    return null
  }

  if (name === '/vsp' || name === '/vsplit') {
    if (!WIDGET_NAMES.includes(widget)) return `Unknown widget: ${widget}. Available: ${WIDGET_NAMES.join(', ')}`
    const id = `${widget}-${Date.now()}`
    const title = widget.charAt(0).toUpperCase() + widget.slice(1)
    dv.addPanel({ id, component: widget, title,
      position: active ? { referencePanel: active, direction: 'right' } : undefined })
    trackUI('panel_add', { panelId: id, widget, position: 'right' })
    return null
  }

  if (name === '/tab' || name === '/add') {
    if (!WIDGET_NAMES.includes(widget)) return `Unknown widget: ${widget}. Available: ${WIDGET_NAMES.join(', ')}`
    const id = `${widget}-${Date.now()}`
    const title = widget.charAt(0).toUpperCase() + widget.slice(1)
    dv.addPanel({ id, component: widget, title,
      position: active ? { referencePanel: active, direction: 'within' } : undefined })
    trackUI('panel_add', { panelId: id, widget, position: 'within' })
    return null
  }

  if (name === '/close') {
    if (active) {
      trackUI('panel_close', { panelId: active.id })
      dv.removePanel(active)
    }
    return null
  }

  if (name === '/only') {
    const panels = dv.panels.filter(p => p !== active)
    for (const p of panels) dv.removePanel(p)
    return null
  }

  if (name === '/reset') {
    localStorage.removeItem('fleet-layout-v2')
    location.reload()
    return null
  }

  if (name === '/save') {
    const layoutName = parts.slice(1).join(' ')
    if (!layoutName) return 'Usage: /save <name>'
    const layouts = JSON.parse(localStorage.getItem('fleet-layouts') || '{}')
    layouts[layoutName] = dv.toJSON()
    localStorage.setItem('fleet-layouts', JSON.stringify(layouts))
    return `Layout "${layoutName}" saved`
  }

  if (name === '/load') {
    const layoutName = parts.slice(1).join(' ')
    if (!layoutName) return 'Usage: /load <name>'
    const layouts = JSON.parse(localStorage.getItem('fleet-layouts') || '{}')
    if (!layouts[layoutName]) return `No layout named "${layoutName}". Use /layouts to list.`
    try {
      dv.fromJSON(layouts[layoutName])
      return `Layout "${layoutName}" loaded`
    } catch (e) {
      return `Failed to load layout "${layoutName}": ${e.message}`
    }
  }

  if (name === '/layouts') {
    const layouts = JSON.parse(localStorage.getItem('fleet-layouts') || '{}')
    const names = Object.keys(layouts)
    if (!names.length) return 'No saved layouts. Use /save <name> to save one.'
    return 'Saved layouts: ' + names.join(', ')
  }

  if (name === '/delete') {
    const layoutName = parts.slice(1).join(' ')
    if (!layoutName) return 'Usage: /delete <name>'
    const layouts = JSON.parse(localStorage.getItem('fleet-layouts') || '{}')
    if (!layouts[layoutName]) return `No layout named "${layoutName}"`
    delete layouts[layoutName]
    localStorage.setItem('fleet-layouts', JSON.stringify(layouts))
    return `Layout "${layoutName}" deleted`
  }

  if (name === '/play') {
    const query = parts.slice(1).join(' ')
    if (!query) return 'Usage: /play <title or id>'
    // Find or create playback widget, then load the recording
    fetch('/api/playbacks').then(r => r.json()).then(list => {
      const match = list.find(pb =>
        pb.id === query || pb.id.startsWith(query) ||
        pb.title.toLowerCase().includes(query.toLowerCase())
      )
      if (!match) {
        // Show feedback in chat
        const chatLog = lastFocusedChat?.querySelector('.chat-log')
        if (chatLog) chatLog.innerHTML += `<div class="chat-line" style="color:var(--orange)">No playback matching "${esc(query)}"</div>`
        return
      }
      fetch(`/api/playbacks/${match.id}`).then(r => r.json()).then(pb => {
        playbackCtrl.load(pb)
        // Find or create a playback widget
        let pbWidget = null
        for (const [, inst] of panelInstances) {
          if (inst.widget.create === createPlaybackWidget) { pbWidget = inst; break }
        }
        if (!pbWidget) {
          // Open a playback tab
          const id = `playback-${Date.now()}`
          const active = dv.activePanel
          dv.addPanel({ id, component: 'playback', title: 'Playback',
            position: active ? { referencePanel: active, direction: 'within' } : undefined })
          // Widget will pick up the active playbackCtrl on next update
        }
        // Notify any existing playback widgets to pick up the loaded recording
        for (const [, inst] of panelInstances) {
          if (inst.widget.create === createPlaybackWidget && inst.container._pbState) {
            const pbs = inst.container._pbState
            pbs.playback = pb
            pbs.currentT = 0
            pbs.playing = false
            pbs.timewarp = null
            // Load timewarps from edits
            pbs.timewarps = []
            if (pb.edits) {
              for (const edit of pb.edits) {
                if (edit.op === 'timewarp' && edit.timewarp) pbs.timewarps.push(edit.timewarp)
              }
            }
            if (pbs.timewarps.length > 0) {
              pbs.timewarp = pbs.timewarps.find(t => t.name === 'edits') || pbs.timewarps[0]
            }
            if (inst.container._resetInnerLayout) inst.container._resetInnerLayout()
            if (inst.container._drawTimewarpOverlay) inst.container._drawTimewarpOverlay()
            if (inst.container._updatePlaybackUI) inst.container._updatePlaybackUI()
            const search = inst.container.querySelector('.pb-search')
            if (search) search.value = pb.title || ''
          }
        }
        const chatLog = lastFocusedChat?.querySelector('.chat-log')
        if (chatLog) chatLog.innerHTML += `<div class="chat-line" style="color:var(--green)">Loaded: ${esc(match.title)} (${match.event_count} events)</div>`
      })
    })
    return null
  }

  if (name === '/recordings') {
    fetch('/api/playbacks').then(r => r.json()).then(list => {
      const chatLog = lastFocusedChat?.querySelector('.chat-log')
      if (!chatLog) return
      if (!list.length) {
        chatLog.innerHTML += `<div class="chat-line" style="color:var(--text-dim)">No recordings</div>`
        return
      }
      const lines = list.map(pb => {
        const dur = Math.floor(pb.duration_ms / 1000)
        const m = Math.floor(dur / 60)
        const s = dur % 60
        return `<div class="chat-line"><span style="color:var(--accent)">${esc(pb.title)}</span> <span style="color:var(--text-dim)">(${pb.event_count} events, ${m}:${String(s).padStart(2,'0')}) ${pb.id.slice(0,8)}</span></div>`
      })
      chatLog.innerHTML += lines.join('')
      chatLog.scrollTop = chatLog.scrollHeight
    })
    return null
  }

  if (name === '/share') {
    const filePath = parts.slice(1).join(' ')
    if (!filePath) return 'Usage: /share <path> — share a scratch file as a tlda doc'
    const chatLog = lastFocusedChat?.querySelector('.chat-log')
    // Create/update tlda project from the file
    fetch('/api/tlda/share', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: filePath })
    }).then(r => r.json()).then(data => {
      if (data.error) {
        if (chatLog) chatLog.innerHTML += `<div class="chat-line" style="color:var(--orange)">/share error: ${esc(data.error)}</div>`
        return
      }
      // Show local confirmation
      const action = data.created ? 'Created' : 'Updated'
      if (chatLog) chatLog.innerHTML += `<div class="chat-line" style="color:var(--green)">${action} tlda doc "${esc(data.title)}" (${data.lines} lines) — <a href="${esc(data.openUrl)}" target="_blank" style="color:var(--accent)">open in tlda</a></div>`
      // Also send as a chat message with [doc:] and [tlda] markers
      const target = lastFocusedChat?._chatTarget
      if (target) {
        // Create a share snapshot for inline preview too
        fetch('/api/share', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: filePath })
        }).then(r => r.json()).then(shareData => {
          const msg = `[doc:${shareData.id}] ${data.file} (${data.lines} lines)\n[tlda] ${data.title} (from tlda:${data.project})\n${filePath}`
          fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg, to: target })
          })
        }).catch(() => {
          // Fallback: send without inline preview
          const msg = `[tlda] ${data.title} (from tlda:${data.project})\n${filePath}`
          fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg, to: target })
          })
        })
      }
    }).catch(e => {
      if (chatLog) chatLog.innerHTML += `<div class="chat-line" style="color:var(--orange)">/share error: ${e.message}</div>`
    })
    return null
  }

  if (name === '/entermode') {
    const modes = ['enter', 'cmd-enter']
    const mode = parts[1]
    if (!mode) return `Enter mode: ${localStorage.getItem('fleet-enter-mode') || 'enter'}. Usage: /entermode [${modes.join('|')}]`
    if (!modes.includes(mode)) return `Unknown mode: ${mode}. Available: ${modes.join(', ')}`
    localStorage.setItem('fleet-enter-mode', mode)
    return `Enter mode set to: ${mode}`
  }

  if (name === '/help') {
    return 'Commands: /sp [widget], /vsp [widget], /tab [widget], /close, /only, /reset, /save <name>, /load <name>, /layouts, /delete <name>, /play <query>, /recordings, /share <path>, /entermode [enter|cmd-enter]\nWidgets: ' + WIDGET_NAMES.join(', ')
  }

  return null // not a command, send as chat
}


// --- Apply config settings ---
loadFleetConfig().then(() => {
  // Apply sendKey preference
  if (fleetConfig.sendKey) {
    window._fleetSendKey = fleetConfig.sendKey
  }
  // Apply theme overrides
  if (fleetConfig.theme) {
    const root = document.documentElement
    for (const [key, val] of Object.entries(fleetConfig.theme)) {
      if (key && val) root.style.setProperty(`--${key}`, val)
    }
  }
  // Apply sizing config
  const root = document.documentElement
  if (fleetConfig.activityCardHeight) root.style.setProperty('--activity-card-height', fleetConfig.activityCardHeight)
  if (fleetConfig.terminalCardHeight) root.style.setProperty('--terminal-card-height', fleetConfig.terminalCardHeight)
  if (fleetConfig.chatPageSize) CHAT_PAGE_SIZE = parseInt(fleetConfig.chatPageSize)
  // Inject custom CSS from ~/.fleet/custom.css
  if (fleetConfig._customCSS) {
    const style = document.createElement('style')
    style.textContent = fleetConfig._customCSS
    document.head.appendChild(style)
  }
})

// --- Keymap Engine (tinykeys) ---

function focusWidget(name) {
  for (const panel of dv.panels) {
    if (panel.id === name || panel.id.startsWith(name + '-')) {
      panel.api.setActive()
      const inst = panelInstances.get(panel.id)
      if (inst) {
        const input = inst.container.querySelector('input, textarea')
        if (input) setTimeout(() => input.focus(), 50)
      }
      return
    }
  }
}

function toggleCommandPalette() {
  const overlay = document.getElementById('command-palette')
  if (overlay.classList.contains('open')) { window.closePalette() } else { window.openPalette() }
}

// Default keymap — overridden by ~/.fleet/keymap.json
const DEFAULT_KEYMAP = {
  '$mod+Shift+KeyS': 'split-chat',
  '$mod+Shift+KeyV': 'vsplit-terminal',
  '$mod+KeyW': 'close-panel',
  '$mod+KeyK': 'command-palette',
  'g g': 'focus-agents',
  'g c': 'focus-chat',
  'g s': 'focus-search',
  'g t': 'focus-terminal',
}

const ACTIONS = {
  'split-chat': () => executeCommand('/sp chat'),
  'vsplit-terminal': () => executeCommand('/vsp terminal'),
  'close-panel': () => executeCommand('/close'),
  'command-palette': () => toggleCommandPalette(),
  'focus-agents': () => focusWidget('agents'),
  'focus-chat': () => focusWidget('chat'),
  'focus-search': () => focusWidget('search'),
  'focus-terminal': () => focusWidget('terminal'),
  'focus-tasks': () => focusWidget('tasks'),
  'reset-layout': () => executeCommand('/reset'),
  'only': () => executeCommand('/only'),
}

let _keymapUnsubscribe = null

function initKeymap() {
  if (_keymapUnsubscribe) _keymapUnsubscribe()

  const userBindings = fleetConfig._keymap?.bindings || {}
  const timeout = fleetConfig._keymap?.timeout || 300
  const merged = { ...DEFAULT_KEYMAP, ...userBindings }

  const bindings = {}
  for (const [keys, action] of Object.entries(merged)) {
    const handler = typeof action === 'string' ? ACTIONS[action] : null
    if (handler) {
      bindings[keys] = (e) => {
        // Don't intercept if typing in an input/textarea (unless it's a $mod combo)
        const tag = document.activeElement?.tagName
        if ((tag === 'INPUT' || tag === 'TEXTAREA') && !keys.includes('$mod')) return
        e.preventDefault()
        handler()
      }
    }
  }

  _keymapUnsubscribe = tinykeys(window, bindings, { timeout })
}

// Init keymap after config loads
loadFleetConfig().then(() => initKeymap())

// --- Command Palette ---

// Build reverse map from action name to shortcut string for display
function shortcutForAction(actionName) {
  const userBindings = fleetConfig._keymap?.bindings || {}
  const merged = { ...DEFAULT_KEYMAP, ...userBindings }
  for (const [keys, action] of Object.entries(merged)) {
    if (action === actionName) {
      return keys.replace('$mod', '⌘').replace('Shift+', '⇧').replace('Key', '')
    }
  }
  return ''
}

{
  const overlay = document.getElementById('command-palette')
  const input = overlay.querySelector('input')
  const list = overlay.querySelector('.cmd-palette-list')
  let actions = []
  let selectedIdx = 0

  window.openPalette = openPalette
  window.closePalette = closePalette

  function openPalette() {
    buildActions()
    input.value = ''
    renderList('')
    overlay.classList.add('open')
    input.focus()
  }

  function closePalette() {
    overlay.classList.remove('open')
  }

  function buildActions() {
    actions = []

    // Panel actions
    for (const name of WIDGET_NAMES) {
      const title = name.charAt(0).toUpperCase() + name.slice(1)
      actions.push({ title: `Open ${title}`, section: 'Panels', handler: () => executeCommand(`/sp ${name}`) })
      actions.push({ title: `VSplit ${title}`, section: 'Panels', handler: () => executeCommand(`/vsp ${name}`) })
      actions.push({ title: `Tab ${title}`, section: 'Panels', handler: () => executeCommand(`/tab ${name}`) })
    }

    // Agent actions
    for (const a of (currentState?.agents || [])) {
      const label = a.friendly_name || a.name || a.id?.substring(0, 8)
      actions.push({ title: `Chat with ${label}`, section: 'Agents', handler: () => {
        selectedAgent = a.id
        localStorage.setItem('fleet-selected-agent', a.id)
        if (currentState) broadcastUpdate(currentState)
      }})
      actions.push({ title: `Terminal: ${label}`, section: 'Agents', handler: () => {
        dv.addPanel({ id: `terminal-${Date.now()}`, component: 'terminal', title: `Terminal: ${label}`, params: { agentId: a.id } })
      }})
      if (a.kitty_win) {
        actions.push({ title: `Interrupt ${label}`, section: 'Agents', handler: () =>
          fetch('/api/interrupt', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ agent: a.id }) })
        })
      }
    }

    // Layout commands
    actions.push({ title: 'Reset layout', section: 'Layout', handler: () => executeCommand('/reset') })
    actions.push({ title: 'Close other panels', section: 'Layout', handler: () => executeCommand('/only') })
    const savedLayouts = JSON.parse(localStorage.getItem('fleet-layouts') || '{}')
    for (const name of Object.keys(savedLayouts)) {
      actions.push({ title: `Load layout: ${name}`, section: 'Layout', handler: () => executeCommand(`/load ${name}`) })
    }

    // Navigation — show tinykeys shortcuts
    actions.push({ title: 'Focus chat', section: 'Navigation', shortcut: shortcutForAction('focus-chat'), handler: () => focusWidget('chat') })
    actions.push({ title: 'Focus agents', section: 'Navigation', shortcut: shortcutForAction('focus-agents'), handler: () => focusWidget('agents') })
    actions.push({ title: 'Focus search', section: 'Navigation', shortcut: shortcutForAction('focus-search'), handler: () => focusWidget('search') })
    actions.push({ title: 'Focus terminal', section: 'Navigation', shortcut: shortcutForAction('focus-terminal'), handler: () => focusWidget('terminal') })
  }

  function renderList(query) {
    const q = query.toLowerCase()
    const filtered = q ? actions.filter(a => a.title.toLowerCase().includes(q) || (a.section||'').toLowerCase().includes(q)) : actions
    selectedIdx = 0
    list.innerHTML = ''
    let lastSection = ''
    filtered.forEach((action, i) => {
      if (action.section && action.section !== lastSection) {
        lastSection = action.section
        const sec = document.createElement('div')
        sec.className = 'cmd-palette-section'
        sec.textContent = action.section
        list.appendChild(sec)
      }
      const item = document.createElement('div')
      item.className = 'cmd-palette-item' + (i === 0 ? ' selected' : '')
      item.innerHTML = `<span>${esc(action.title)}</span>${action.shortcut ? `<span class="shortcut">${action.shortcut}</span>` : ''}`
      item.addEventListener('click', () => { closePalette(); action.handler() })
      item.addEventListener('mouseenter', () => {
        list.querySelectorAll('.cmd-palette-item').forEach(el => el.classList.remove('selected'))
        item.classList.add('selected')
        selectedIdx = i
      })
      item._action = action
      item._idx = i
      list.appendChild(item)
    })
  }

  input.addEventListener('input', () => renderList(input.value))

  input.addEventListener('keydown', (e) => {
    const items = list.querySelectorAll('.cmd-palette-item')
    if (e.key === 'ArrowDown') { e.preventDefault(); selectedIdx = Math.min(selectedIdx + 1, items.length - 1) }
    else if (e.key === 'ArrowUp') { e.preventDefault(); selectedIdx = Math.max(selectedIdx - 1, 0) }
    else if (e.key === 'Enter') {
      e.preventDefault()
      if (items[selectedIdx]?._action) { closePalette(); items[selectedIdx]._action.handler() }
      return
    } else if (e.key === 'Escape') { closePalette(); return }
    else return
    items.forEach((el, i) => el.classList.toggle('selected', i === selectedIdx))
    items[selectedIdx]?.scrollIntoView({ block: 'nearest' })
  })

  overlay.addEventListener('click', (e) => { if (e.target === overlay) closePalette() })
}

// --- UI Event Collector ---
const _uiEventBuffer = [];
function trackUI(eventType, detail) {
  _uiEventBuffer.push({ timestamp: new Date().toISOString(), event_type: eventType, detail: detail || {} });
}
setInterval(() => {
  if (!_uiEventBuffer.length) return;
  const batch = _uiEventBuffer.splice(0);
  fetch('/api/ui-events', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(batch) }).catch(() => {});
}, 3000);
</script>
